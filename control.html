<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stream Queue Control</title>
    <style>
        body { background: #111; color: white; font-family: Arial, sans-serif; text-align: center; padding: 20px; }
        .container { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; margin-top: 20px; }
        .panel { flex: 1; min-width: 350px; max-width: 600px; background: #1a1a1a; padding: 20px; border-radius: 10px; border: 1px solid #333; display: none; }
        .queueItem { background: #222; padding: 12px; margin: 10px 0; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #f1c40f; }
        button { background: #e74c3c; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        #login-box { background: #222; padding: 30px; border-radius: 10px; display: inline-block; margin-top: 50px; border: 1px solid #444; width: 300px; }
        #login-box input { display: block; width: 100%; margin: 10px 0; padding: 12px; box-sizing: border-box; background: #333; border: 1px solid #555; color: white; border-radius: 4px; }
        #login-box button { width: 100%; padding: 12px; background: #f1c40f; color: #111; font-size: 16px; }
    </style>
</head>
<body>

<h1>Stream Queue Control</h1>

<div id="login-box">
    <h2>Admin Login</h2>
    <input type="email" id="email" placeholder="Admin Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p id="status" style="color: #f1c40f; font-size: 14px; margin-top: 10px;">Loading System...</p>
</div>

<div class="container">
    <div id="admin-panel" class="panel">
        <h2>Website Requests</h2>
        <button onclick="nextSong()" style="background: #2ecc71; padding: 12px 20px; margin-bottom: 10px;">⏭️ Next Song</button>
        <button onclick="clearQueue()" style="background: #555; margin-left: 10px;">🗑️ Clear All</button>
        <div id="queue">Loading requests...</div>
        <br><button onclick="logout()" style="background:#444; margin-top: 20px; width: 100%;">Logout</button>
    </div>
</div>

<!-- 🔹 Load from jsDelivr (High compatibility) -->
<script src="https://cdn.jsdelivr.net"></script>
<script src="https://cdn.jsdelivr.net"></script>
<script src="https://cdn.jsdelivr.net"></script>

<script>
    const config = {
        apiKey: "AIzaSyCc7XBAOY4bCDAdKt-tKnNn8xo4Xfj5yw4",
        authDomain: "rocksmith-requests.firebaseapp.com",
        databaseURL: "https://rocksmith-requests-default-rtdb.firebaseio.com",
        projectId: "rocksmith-requests",
        storageBucket: "rocksmith-requests.firebasestorage.app",
        messagingSenderId: "267279660992",
        appId: "1:267279660992:web:41c3976abef3712a34ba25"
    };

    function startApp() {
        if (typeof firebase === 'undefined') {
            document.getElementById("status").innerText = "Critical: Library blocked by DNS.";
            document.getElementById("status").style.color = "red";
            return;
        }

        firebase.initializeApp(config);
        document.getElementById("status").innerText = "Ready to Login";
        document.getElementById("status").style.color = "green";

        firebase.auth().onAuthStateChanged(user => {
            const loginBox = document.getElementById("login-box");
            const adminPanel = document.getElementById("admin-panel");
            const queueDiv = document.getElementById("queue");

            if (user && user.uid === 'IF6pmcBswAUEM87hr4uGJBeZeXR2') {
                loginBox.style.display = "none";
                adminPanel.style.display = "block";
                firebase.database().ref("/queue").on("value", snap => {
                    queueDiv.innerHTML = "";
                    const data = snap.val();
                    if (!data) { queueDiv.innerHTML = "Queue empty."; return; }
                    Object.entries(data).forEach(([key, s], i) => {
                        const item = document.createElement("div");
                        item.className = "queueItem";
                        item.innerHTML = `<span><strong>${i+1}.</strong> ${s.artist} - ${s.song}</span>
                                          <button onclick="removeItem('${key}')">Remove</button>`;
                        queueDiv.appendChild(item);
                    });
                });
            } else {
                loginBox.style.display = "inline-block";
                adminPanel.style.display = "none";
            }
        });
    }

    window.login = () => {
        const e = document.getElementById("email").value;
        const p = document.getElementById("password").value;
        firebase.auth().signInWithEmailAndPassword(e, p).catch(err => alert(err.message));
    };

    window.logout = () => firebase.auth().signOut();
    window.removeItem = (k) => firebase.database().ref("/queue/" + k).remove();
    window.clearQueue = () => { if(confirm("Clear all?")) firebase.database().ref("/queue").remove(); };
    window.nextSong = () => {
        firebase.database().ref("/queue").orderByKey().limitToFirst(1).once("value", s => {
            if(s.exists()) firebase.database().ref("/queue/" + Object.keys(s.val())[0]).remove();
        });
    };

    // Run start check
    window.onload = startApp;
</script>
</body>
</html>
