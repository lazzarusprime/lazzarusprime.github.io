<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stream Queue Control</title>
<style>
body { background: #111; color: white; font-family: Arial, sans-serif; text-align: center; padding: 20px; }
.container { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; margin-top: 20px; }
.panel { flex: 1; min-width: 350px; max-width: 600px; background: #1a1a1a; padding: 20px; border-radius: 10px; border: 1px solid #333; }
.queueItem { background: #222; padding: 12px; margin: 10px 0; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #f1c40f; }
button { background: #e74c3c; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }
button:hover { opacity: 0.8; }
.next-btn { background: #2ecc71; padding: 12px 20px; font-size: 16px; margin-bottom: 10px; }
.clear-btn { background: #555; margin-left: 10px; }
h1, h2 { color: #f1c40f; margin-bottom: 15px; }
#loginForm { position: fixed; top:0; left:0; width:100%; height:100%; background:#111; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; z-index:9999; }
#loginForm input { padding:10px; border-radius:6px; border:none; width:220px; }
#loginForm button { padding:10px 20px; border-radius:6px; border:none; cursor:pointer; }
#loginError { color:#ff5555; font-size:14px; }
</style>
</head>
<body>

<div id="loginForm">
  <h1>Admin Login</h1>
  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <div id="loginError"></div>
</div>

<h1>Stream Queue Control</h1>

<div class="container">
  <div class="panel">
    <h2>Website Requests</h2>
    <button class="next-btn" onclick="nextSong()">⏭️ Next Song</button>
    <button class="clear-btn" onclick="clearQueue()">🗑️ Clear All</button>
    <div id="queue">Loading requests...</div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.30.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.30.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.30.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyCc7XBAOY4bCDAdKt-tKnNn8xo4Xfj5yw4",
    authDomain: "rocksmith-requests.firebaseapp.com",
    databaseURL: "https://rocksmith-requests-default-rtdb.firebaseio.com",
    projectId: "rocksmith-requests",
    storageBucket: "rocksmith-requests.firebasestorage.app",
    messagingSenderId: "267279660992",
    appId: "1:267279660992:web:41c3976abef3712a34ba25",
    measurementId: "G-JWN29ZF9SR"
};
firebase.initializeApp(firebaseConfig);

const ALLOWED_UID = "IF6pmcBswAUEM87hr4uGJBeZeXR2";
let userUID = null;

const queueDiv = document.getElementById("queue");
const queueRef = firebase.database().ref("/queue");

// 🔹 Login
async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const loginError = document.getElementById("loginError");
    loginError.innerText = "";
    try {
        const userCredential = await firebase.auth().signInWithEmailAndPassword(email,password);
        userUID = userCredential.user.uid;
        if (userUID !== ALLOWED_UID) {
            loginError.innerText = "Access denied.";
            firebase.auth().signOut();
            return;
        }
        document.getElementById("loginForm").style.display="none";
        initQueue();
    } catch(e) {
        loginError.innerText = "Login failed: " + e.message;
        console.error(e);
    }
}

// 🔹 Initialize queue after login
function initQueue() {
    queueRef.on("value", snapshot => {
        const data = snapshot.val();
        renderQueue(data);
    });
}

// 🔹 Render queue
function renderQueue(data) {
    queueDiv.innerHTML = "";
    if (!data) { queueDiv.innerHTML = "<p style='color:#888'>Queue is empty.</p>"; return; }
    Object.entries(data).forEach(([key, s], i) => {
        const item = document.createElement("div");
        item.className = "queueItem";
        item.innerHTML = `
            <span><strong>${i+1}.</strong> ${s.artist} - ${s.song}</span>
            <button onclick="removeItem('${key}')">Remove</button>
        `;
        queueDiv.appendChild(item);
    });
}

// 🔹 Queue actions
function removeItem(key) { queueRef.child(key).remove(); }
function nextSong() {
    queueRef.orderByKey().limitToFirst(1).once("value", snapshot => {
        const firstKey = Object.keys(snapshot.val() || {})[0];
        if (firstKey) queueRef.child(firstKey).remove();
    });
}
function clearQueue() {
    if (!confirm("Are you sure you want to delete EVERY request?")) return;
    queueRef.remove();
}
</script>
</body>
</html>
