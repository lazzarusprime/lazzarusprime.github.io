<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stream Queue Control</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { background: #111; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .queueItem { background: #222; padding: 12px; margin: 10px auto; width: 80%; max-width: 500px; display: flex; justify-content: space-between; border-left: 4px solid #f1c40f; }
        button { background: #e74c3c; color: white; border: none; padding: 8px 12px; cursor: pointer; }
        .next-btn { background: #27ae60; padding: 15px; font-size: 18px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>Queue Control</h1>
    <button class="next-btn" onclick="nextSong()">NEXT SONG (Pop Queue)</button>
    <div id="adminQueue"></div>

    <script>
        const firebaseConfig = { databaseURL: "https://lazzarus-prime-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref("queue").on("value", (snap) => {
            const data = snap.val();
            const div = document.getElementById("adminQueue");
            div.innerHTML = "";
            if (!data) return;

            Object.entries(data).forEach(([key, s], i) => {
                const item = document.createElement("div");
                item.className = "queueItem";
                item.innerHTML = `<span>${i+1}. ${s.artist} - ${s.song}</span>
                                  <button onclick="removeItem('${key}')">✕</button>`;
                div.appendChild(item);
            });
        });

        window.removeItem = (key) => db.ref("queue/" + key).remove();

        window.nextSong = () => {
            db.ref("queue").limitToFirst(1).once("value", s => {
                if (s.exists()) {
                    const key = Object.keys(s.val())[0];
                    db.ref("queue/" + key).remove();
                }
            });
        };
    </script>
</body>
</html>
