<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Rocksmith Queue Control</title>

<style>

body{

background:#111;
color:white;
font-family:Arial;
text-align:center;

}

.queueItem{

background:#222;
margin:10px auto;
padding:10px;
width:50%;

}

button{

padding:6px 10px;
margin:4px;

}

</style>

</head>

<body>

<h1>Stream Queue Control</h1>

<div id="queue"></div>

<button onclick="nextSong()">Next Song</button>
<button onclick="clearQueue()">Clear Queue</button>

<script>

let queue=[]

function loadQueue(){

let stored=localStorage.getItem("rocksmithQueue")

if(stored){

queue=JSON.parse(stored)

}

render()

}

function save(){

localStorage.setItem("rocksmithQueue",JSON.stringify(queue))

render()

}

function render(){

let div=document.getElementById("queue")

div.innerHTML=""

queue.forEach((s,i)=>{

let item=document.createElement("div")

item.className="queueItem"

item.innerHTML=`
${i+1}. ${s.artist} - ${s.song}
<button onclick="remove(${i})">Remove</button>
`

div.appendChild(item)

})

}

function remove(i){

queue.splice(i,1)

save()

}

function nextSong(){

queue.shift()

save()

}

function clearQueue(){

queue=[]

save()

}

loadQueue()

</script>

</body>

</html>
