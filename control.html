<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stream Queue Control</title>
    <style>
        body {
            background: #111;
            color: white;
            font-family: 'Inter', Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }
        h1 { color: #f1c40f; }
        .container { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .panel { flex: 1; min-width: 400px; background: #1a1a1a; padding: 15px; border-radius: 10px; }
        #queue { max-width: 100%; margin: 20px auto; }
        .queueItem {
            background: #222;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #333;
            font-size: 14px;
        }
        button {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .next-btn { background: #2ecc71; margin-bottom: 10px; padding: 12px 20px; }
        .clear-btn { background: #555; margin-left: 10px; }
        iframe { border-radius: 10px; background: white; }
    </script>
</head>
<body>

    <h1>Stream Queue Control</h1>

    <div class="container">
        <!-- LEFT PANEL: CUSTOM FIREBASE QUEUE -->
        <div class="panel">
            <h2>Website Requests</h2>
            <button class="next-btn" onclick="nextSong()">⏭️ Next Song</button>
            <button class="clear-btn" onclick="clearQueue()">🗑️ Clear List</button>
            <div id="queue">Loading...</div>
        </div>

        <!-- RIGHT PANEL: RS PLAYLIST INTEGRATION -->
        <div class="panel">
            <h2>RS Playlist Live</h2>
            <iframe 
                src="https://rsplaylist.com" 
                width="100%" 
                height="600px" 
                style="border:none;">
            </iframe>
        </div>
    </div>

    <script>
        // FIXED URL: Ensure no double dots or missing slashes
        const DB_BASE = "https://rocksmith-requests-default-rtdb.firebaseio.com";

        async function listen() {
            try {
                const response = await fetch(`${DB_BASE}.json`);
                const data = await response.json();
                const div = document.getElementById("queue");
                div.innerHTML = "";

                if (!data) {
                    div.innerHTML = "<p style='color: #888;'>No website requests yet.</p>";
                    return;
                }

                const entries = Object.entries(data);
                entries.forEach(([key, s], i) => {
                    let item = document.createElement("div");
                    item.className = "queueItem";
                    item.innerHTML = `
                        <span><strong>${i + 1}.</strong> ${s.artist} - ${s.song}</span>
                        <button onclick="removeItem('${key}')">Remove</button>
                    `;
                    div.appendChild(item);
                });
            } catch (e) {
                console.error("Fetch Error:", e);
                document.getElementById("queue").innerText = "Connection Error. Check URL.";
            }
        }

        async function removeItem(key) {
            await fetch(`${DB_BASE}/${key}.json`, { method: 'DELETE' });
            listen();
        }

        async function nextSong() {
            // Get the first item based on Firebase keys
            const response = await fetch(`${DB_BASE}.json?orderBy="$key"&limitToFirst=1`);
            const data = await response.json();
            if (data) {
                const firstKey = Object.keys(data)[0];
                await fetch(`${DB_BASE}/${firstKey}.json`, { method: 'DELETE' });
                listen();
            }
        }

        async function clearQueue() {
            if (!confirm("Wipe the entire website request list?")) return;
            await fetch(`${DB_BASE}.json`, { method: 'DELETE' });
            listen();
        }

        listen();
        setInterval(listen, 5000);
    </script>
</body>
</html>
