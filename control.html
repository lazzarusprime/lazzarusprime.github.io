<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Queue Control</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>

body{

background:#111;
color:white;
font-family:Arial;
text-align:center;

}

.queueItem{

background:#222;
padding:10px;
margin:10px auto;
width:50%;

}

</style>

</head>

<body>

<h1>Stream Queue Control</h1>

<div id="queue"></div>

<button onclick="nextSong()">Next Song</button>
<button onclick="clearQueue()">Clear Queue</button>

<script>

const firebaseConfig={
databaseURL:"YOUR_FIREBASE_DB_URL"
}

firebase.initializeApp(firebaseConfig)

const db=firebase.database()

function listen(){

db.ref("queue").on("value",(snap)=>{

let data=snap.val()

let div=document.getElementById("queue")

div.innerHTML=""

if(!data)return

Object.entries(data).forEach(([key,s],i)=>{

let item=document.createElement("div")

item.className="queueItem"

item.innerHTML=`
${i+1}. ${s.artist} - ${s.song}
<button onclick="remove('${key}')">Remove</button>
`

div.appendChild(item)

})

})

}

function remove(key){

db.ref("queue/"+key).remove()

}

function nextSong(){

db.ref("queue").limitToFirst(1).once("value",(snap)=>{

snap.forEach(child=>{

child.ref.remove()

})

})

}

function clearQueue(){

db.ref("queue").remove()

}

listen()

</script>

</body>

</html>
