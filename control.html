<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stream Control — Lazzarus Prime</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#0a0a0a;color:white;font-family:'Inter',Segoe UI,Arial;margin:0;min-height:100vh}

/* ── TITLE BAR ── */
.titleBar{display:flex;justify-content:space-between;align-items:center;background:#141414;padding:10px 16px;border-bottom:2px solid #222;flex-wrap:wrap;gap:8px}
.titleLeft{display:flex;align-items:center;gap:12px}
.titleBar .site-logo{width:44px;height:44px;object-fit:contain;flex-shrink:0;filter:drop-shadow(0 0 6px rgba(241,196,15,.4))}
.titleLeft h2{margin:0;font-family:'Bebas Neue',sans-serif;font-size:clamp(18px,3vw,28px);letter-spacing:2px;background:linear-gradient(to bottom,#fff 20%,#f1c40f 45%,#b8860b 85%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 5px rgba(241,196,15,.5))}
.live-dot{width:8px;height:8px;border-radius:50%;background:#e74c3c;display:inline-block;margin-right:6px;box-shadow:0 0 6px #e74c3c;animation:livePulse 1.4s ease-in-out infinite}
@keyframes livePulse{0%,100%{opacity:1;box-shadow:0 0 6px #e74c3c}50%{opacity:.5;box-shadow:0 0 12px #e74c3c}}

/* ── NAV ── */
.topBar{display:flex;gap:6px;padding:8px 10px;background:#111;flex-wrap:wrap;justify-content:flex-start;align-items:center;border-bottom:1px solid #1e1e1e}
.nav-btn{background:#1e1e1e;color:#aaa;border:1px solid #2a2a2a;padding:7px 12px;border-radius:6px;cursor:pointer;font-weight:700;text-transform:uppercase;font-size:11px;transition:.2s;white-space:nowrap}
.nav-btn:hover{background:#2a2a2a;border-color:#f1c40f;color:#f1c40f}

/* ── LOGIN ── */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 120px);padding:20px}
#login-box{background:#141414;padding:32px;border-radius:14px;border:1px solid #222;width:100%;max-width:360px;box-shadow:0 8px 40px rgba(0,0,0,.8)}
#login-box h2{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:3px;color:#f1c40f;margin:0 0 20px;text-align:center}
#login-box input{display:block;width:100%;margin:10px 0;padding:13px 14px;background:#1a1a1a;border:1px solid #2a2a2a;color:white;border-radius:8px;font-family:'Inter',sans-serif;font-size:14px;transition:.2s}
#login-box input:focus{outline:none;border-color:#f1c40f;background:#1e1e1e}
.login-btn{width:100%;padding:14px;background:linear-gradient(135deg,#f1c40f,#b8860b);color:#111;font-size:15px;font-weight:900;border-radius:8px;border:none;cursor:pointer;letter-spacing:1px;font-family:'Inter',sans-serif;transition:.2s;margin-top:8px}
.login-btn:hover{filter:brightness(1.1);transform:translateY(-1px)}
#status{color:#555;font-size:12px;margin-top:14px;text-align:center;letter-spacing:.5px}
#status.ok{color:#4caf50}
#status.err{color:#e74c3c}

/* ── ADMIN LAYOUT ── */
#admin-screen{display:none;padding:16px;max-width:800px;margin:0 auto}

/* ── STAT CARDS ── */
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.stat-card{background:#141414;border:1px solid #1e1e1e;border-radius:10px;padding:14px;text-align:center;transition:.2s}
.stat-card:hover{border-color:#f1c40f22}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:40px;color:#f1c40f;line-height:1;filter:drop-shadow(0 0 6px rgba(241,196,15,.3))}
.stat-label{font-size:10px;color:#444;text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-top:2px}

/* ── SECTION TITLES ── */
.section-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:#666;margin:20px 0 10px;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:#1e1e1e}

/* ── ACTION BUTTONS ── */
.action-row{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.action-btn{flex:1;padding:14px 16px;border:none;border-radius:8px;cursor:pointer;font-weight:900;font-size:14px;font-family:'Inter',sans-serif;transition:.2s;display:flex;align-items:center;justify-content:center;gap:7px;min-width:140px}
.action-btn:hover{filter:brightness(1.15);transform:translateY(-1px)}
.action-btn:active{transform:translateY(0)}
.btn-next{background:linear-gradient(135deg,#2ecc71,#27ae60);color:#fff}
.btn-played{background:linear-gradient(135deg,#3498db,#2980b9);color:#fff}
.btn-clear{background:#1e1e1e;color:#888;border:1px solid #2a2a2a}
.btn-clear:hover{border-color:#e74c3c;color:#e74c3c;background:#1e1e1e;filter:none}

/* ── NOW PLAYING SETTER ── */
.now-playing-box{background:#141414;border:1px solid #1e1e1e;border-radius:10px;padding:14px;margin-bottom:14px}
.np-label{font-size:10px;font-weight:700;color:#f1c40f;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.np-display{font-family:'Bebas Neue',sans-serif;font-size:22px;color:#fff;letter-spacing:1px;margin-bottom:8px;min-height:28px}
.np-display.empty{color:#333;font-size:16px;letter-spacing:1px}

/* ── QUEUE LIST ── */
#queue-list{display:flex;flex-direction:column;gap:6px;min-height:40px}
.queue-empty{color:#333;font-size:13px;text-align:center;padding:30px 0;font-style:italic}

.queue-item{background:#141414;border:1px solid #1e1e1e;border-radius:8px;display:flex;align-items:center;gap:10px;padding:10px 12px;transition:.2s;position:relative;overflow:hidden}
.queue-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:#f1c40f}
.queue-item:hover{border-color:#2a2a2a;background:#181818}
.queue-item.new-item{animation:itemPop .4s cubic-bezier(.2,1,.3,1)}
@keyframes itemPop{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}

.q-num{font-family:'Bebas Neue',sans-serif;font-size:22px;color:#2a2a2a;width:28px;flex-shrink:0;text-align:center;line-height:1}
.q-info{flex:1;min-width:0}
.q-song{font-weight:700;font-size:14px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.q-artist{font-size:11px;color:#f1c40f;font-weight:600;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.q-badges{display:flex;gap:6px;margin-top:4px;align-items:center}
.q-badge{font-size:9px;font-weight:700;padding:1px 6px;border-radius:4px;text-transform:uppercase;letter-spacing:.5px}
.badge-owned{background:#1a3a1a;color:#4caf50;border:1px solid #2d5a2d}
.badge-notowned{background:#3a1a1a;color:#e74c3c;border:1px solid #5a2d2d}
.q-time{font-size:10px;color:#333;flex-shrink:0;font-weight:600}

.q-actions{display:flex;gap:5px;flex-shrink:0}
.q-btn{background:#1e1e1e;border:1px solid #2a2a2a;color:#666;padding:6px 9px;border-radius:5px;cursor:pointer;font-size:11px;font-weight:700;transition:.2s;font-family:'Inter',sans-serif}
.q-btn:hover{border-color:#f1c40f;color:#f1c40f}
.q-btn.remove:hover{border-color:#e74c3c;color:#e74c3c}
.q-btn.play-now{background:#1a3a1a;border-color:#2d5a2d;color:#4caf50}
.q-btn.play-now:hover{background:#2d5a2d;color:#7ddd80}

/* ── SLOPSMITH TOGGLE ── */
.slop-box{background:linear-gradient(135deg,#160800,#201000);border:1px solid rgba(255,85,0,.3);border-radius:10px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:16px;transition:.2s}
.slop-box:hover{border-color:rgba(255,85,0,.5)}
.slop-title{font-family:'Bebas Neue',sans-serif;font-size:20px;color:#ff7733;letter-spacing:2px}
.slop-sub{font-size:11px;color:#553322;margin-top:2px}
.toggle-switch{position:relative;width:52px;height:28px;flex-shrink:0}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:#1e1e1e;border-radius:28px;cursor:pointer;transition:.3s;border:1px solid #333}
.toggle-slider:before{content:'';position:absolute;width:20px;height:20px;left:3px;bottom:3px;background:#444;border-radius:50%;transition:.3s}
input:checked + .toggle-slider{background:#ff5500;border-color:#ff7700;box-shadow:0 0 10px rgba(255,85,0,.4)}
input:checked + .toggle-slider:before{transform:translateX(24px);background:#fff}

/* ── TOAST ── */
#toast{position:fixed;bottom:24px;right:24px;background:#141414;border:1px solid #2a2a2a;border-radius:10px;padding:12px 16px;z-index:9999;opacity:0;transform:translateY(10px);transition:.25s;pointer-events:none;max-width:300px;box-shadow:0 4px 20px rgba(0,0,0,.6)}
#toast.show{opacity:1;transform:translateY(0)}
#toast-title{font-weight:700;font-size:13px;color:#4caf50;margin-bottom:2px}
#toast-msg{font-size:11px;color:#666;line-height:1.4}

/* ── LOGOUT ── */
.logout-btn{background:transparent;color:#333;font-size:11px;border:1px solid #1e1e1e;border-radius:6px;padding:6px 12px;cursor:pointer;font-family:'Inter',sans-serif;transition:.2s;margin-top:20px}
.logout-btn:hover{color:#888;border-color:#333}

@media(max-width:500px){
  .stat-row{grid-template-columns:repeat(3,1fr)}
  .stat-num{font-size:30px}
  .action-row{flex-direction:column}
  .action-btn{min-width:unset}
}
</style>
</head>
<body>

<div class="titleBar">
  <div class="titleLeft">
    <img class="site-logo" src="guitar.png" alt="Lazzarus Prime">
    <h2><span class="live-dot"></span>Stream Control</h2>
  </div>
</div>

<div class="topBar">
  <button class="nav-btn" onclick="location.href='index.html?nosplash=1'">🏠 Home</button>
  <button class="nav-btn" onclick="location.href='artists.html'">🎸 Artists</button>
  <button class="nav-btn" onclick="location.href='stats.html'">📊 Stats</button>
  <button class="nav-btn" onclick="location.href='gear.html'">🎛️ Gear</button>
  <button class="nav-btn" onclick="location.href='charity.html'">❤️ CMAM</button>
</div>

<!-- ── LOGIN ── -->
<div id="login-screen">
  <div id="login-box">
    <h2>Admin Login</h2>
    <input type="email" id="email" placeholder="Email" autocomplete="username">
    <input type="password" id="password" placeholder="Password" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()">
    <button class="login-btn" onclick="login()">Login</button>
    <p id="status">Connecting to Firebase...</p>
  </div>
</div>

<!-- ── ADMIN ── -->
<div id="admin-screen">

  <!-- Stats row -->
  <div class="stat-row">
    <div class="stat-card"><div class="stat-num" id="qTotal">0</div><div class="stat-label">In Queue</div></div>
    <div class="stat-card"><div class="stat-num" id="qOwned">0</div><div class="stat-label">Owned</div></div>
    <div class="stat-card"><div class="stat-num" id="qNotOwned">0</div><div class="stat-label">Not Owned</div></div>
  </div>

  <!-- Now Playing -->
  <div class="section-title">🎸 Now Playing</div>
  <div class="now-playing-box">
    <div class="np-label">▶ Currently on stream</div>
    <div class="np-display empty" id="nowPlayingDisplay">Nothing set — click ▶ Play Next or pick from queue</div>
  </div>

  <!-- Actions -->
  <div class="action-row">
    <button class="action-btn btn-next" onclick="nextSong()">⏭️ Play Next</button>
    <button class="action-btn btn-played" onclick="markPlayed()">✅ Mark Played</button>
    <button class="action-btn btn-clear" onclick="clearQueue()">🗑️ Clear All</button>
  </div>

  <!-- Queue -->
  <div class="section-title">📋 Request Queue</div>
  <div id="queue-list"><div class="queue-empty">Queue is empty</div></div>

  <!-- Slopsmith -->
  <div class="slop-box">
    <div>
      <div class="slop-title">🤘 Slopsmith Mode</div>
      <div class="slop-sub">Activates banner on site + OBS overlay indicator</div>
    </div>
    <label class="toggle-switch">
      <input type="checkbox" id="slopToggle" onchange="toggleSlopsmith(this.checked)">
      <span class="toggle-slider"></span>
    </label>
  </div>

  <div style="text-align:center">
    <button class="logout-btn" onclick="logout()">Sign out</button>
  </div>

</div>

<!-- Toast -->
<div id="toast"><div id="toast-title"></div><div id="toast-msg"></div></div>

<script>
const FIREBASE_LIBS = [
  "aHR0cHM6Ly9jZG4uanNkZWxpdnIubmV0L25wbS9maXJlYmFzZUA4LjEwLjEvZmlyZWJhc2UtYXBwLmpz",
  "aHR0cHM6Ly9jZG4uanNkZWxpdnIubmV0L25wbS9maXJlYmFzZUA4LjEwLjEvZmlyZWJhc2UtYXV0aC5qcw==",
  "aHR0cHM6Ly9jZG4uanNkZWxpdnIubmV0L25wbS9maXJlYmFzZUA4LjEwLjEvZmlyZWJhc2UtZGF0YWJhc2UuanM="
];

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCc7XBAOY4bCDAdKt-tKnNn8xo4Xfj5yw4",
  authDomain: "rocksmith-requests.firebaseapp.com",
  databaseURL: "https://rocksmith-requests-default-rtdb.firebaseio.com",
  projectId: "rocksmith-requests"
};

const ADMIN_UID = 'IF6pmcBswAUEM87hr4uGJBeZeXR2';

let db, currentNowPlaying = null;

// ── BOOTSTRAP ──
async function start() {
  const statusEl = document.getElementById("status");
  try {
    for (const b64 of FIREBASE_LIBS) {
      await new Promise((res, rej) => {
        const s = document.createElement('script');
        s.src = atob(b64); s.onload = res; s.onerror = rej;
        document.head.appendChild(s);
      });
    }
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.database();
    statusEl.textContent = "Ready — please log in";
    statusEl.className = "ok";
    initAuth();
  } catch (e) {
    statusEl.textContent = "Failed to connect. Check your internet.";
    statusEl.className = "err";
  }
}

// ── AUTH ──
function initAuth() {
  firebase.auth().onAuthStateChanged(user => {
    if (user && user.uid === ADMIN_UID) {
      document.getElementById("login-screen").style.display = "none";
      document.getElementById("admin-screen").style.display = "block";
      loadQueue();
      loadNowPlaying();
      loadSlopState();
    } else {
      document.getElementById("login-screen").style.display = "flex";
      document.getElementById("admin-screen").style.display = "none";
    }
  });
}

function login() {
  const e = document.getElementById("email").value.trim();
  const p = document.getElementById("password").value;
  if (!e || !p) return;
  const statusEl = document.getElementById("status");
  statusEl.textContent = "Logging in..."; statusEl.className = "";
  firebase.auth().signInWithEmailAndPassword(e, p).catch(err => {
    statusEl.textContent = err.message; statusEl.className = "err";
  });
}

function logout() { firebase.auth().signOut(); }

// ── QUEUE ──
function loadQueue() {
  db.ref("/queue").orderByChild("timestamp").on("value", snap => {
    const data = snap.val();
    const listEl = document.getElementById("queue-list");
    listEl.innerHTML = "";

    let total = 0, owned = 0, notOwned = 0;

    if (!data) {
      listEl.innerHTML = '<div class="queue-empty">Queue is empty — requests will appear here</div>';
      updateStats(0, 0, 0);
      return;
    }

    const entries = Object.entries(data).sort((a,b) => a[1].timestamp - b[1].timestamp);
    entries.forEach(([key, s], i) => {
      total++;
      if (s.owned === true) owned++;
      else notOwned++;

      const timeStr = s.timestamp ? formatTime(s.timestamp) : '';
      const badgeHtml = s.owned === false
        ? '<span class="q-badge badge-notowned">Not Owned</span>'
        : '<span class="q-badge badge-owned">Owned</span>';

      const item = document.createElement("div");
      item.className = "queue-item new-item";
      item.dataset.key = key;
      item.innerHTML = `
        <div class="q-num">${i+1}</div>
        <div class="q-info">
          <div class="q-song">${esc(s.song)}</div>
          <div class="q-artist">${esc(s.artist)}</div>
          <div class="q-badges">${badgeHtml}</div>
        </div>
        <div class="q-time">${timeStr}</div>
        <div class="q-actions">
          <button class="q-btn play-now" onclick="playThisSong('${key}','${esc(s.artist)}','${esc(s.song)}')" title="Set as Now Playing">▶</button>
          <button class="q-btn remove" onclick="removeItem('${key}')" title="Remove">✕</button>
        </div>`;
      listEl.appendChild(item);
    });

    updateStats(total, owned, notOwned);
  });
}

function updateStats(total, owned, notOwned) {
  document.getElementById('qTotal').textContent = total;
  document.getElementById('qOwned').textContent = owned;
  document.getElementById('qNotOwned').textContent = notOwned;
}

function formatTime(ts) {
  const d = new Date(ts);
  return d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}

// ── NOW PLAYING ──
function loadNowPlaying() {
  db.ref("/nowPlaying").on("value", snap => {
    const val = snap.val();
    const el = document.getElementById("nowPlayingDisplay");
    if (val && val.song) {
      el.textContent = `${val.artist} — ${val.song}`;
      el.classList.remove("empty");
      currentNowPlaying = val;
    } else {
      el.textContent = "Nothing set — click ▶ Play Next or pick from queue";
      el.classList.add("empty");
      currentNowPlaying = null;
    }
  });
}

function setNowPlaying(artist, song) {
  db.ref("/nowPlaying").set({ artist, song, timestamp: Date.now() });
}

function playThisSong(key, artist, song) {
  setNowPlaying(artist, song);
  db.ref("/queue/" + key).remove();
  showToast("▶ Now Playing", `${artist} — ${song}`);
}

// ── ACTIONS ──
function nextSong() {
  db.ref("/queue").orderByChild("timestamp").limitToFirst(1).once("value", snap => {
    if (!snap.exists()) { showToast("Queue Empty", "No more requests", "⚠️"); return; }
    const key = Object.keys(snap.val())[0];
    const s = Object.values(snap.val())[0];
    setNowPlaying(s.artist, s.song);
    db.ref("/queue/" + key).remove();
    showToast("▶ Now Playing", `${s.artist} — ${s.song}`);
  });
}

function markPlayed() {
  if (!currentNowPlaying) { showToast("Nothing Playing", "Set a song first"); return; }
  db.ref("/nowPlaying").remove();
  showToast("✅ Marked Played", `${currentNowPlaying.artist} — ${currentNowPlaying.song}`);
}

function removeItem(k) { db.ref("/queue/" + k).remove(); }

function clearQueue() {
  if (confirm("Delete ALL requests from the queue?")) {
    db.ref("/queue").remove();
    showToast("🗑️ Cleared", "All requests removed");
  }
}

function loadSlopState() {
  db.ref("/slopsmith").once("value", snap => {
    if (snap.val()) document.getElementById('slopToggle').checked = true;
  });
}

function toggleSlopsmith(enabled) {
  db.ref("/slopsmith").set(enabled);
  showToast(enabled ? "🤘 SLOPSMITH ON" : "Slopsmith Off", enabled ? "Banner visible on site + overlay" : "Normal mode restored");
}

// ── TOAST ──
let toastTimer;
function showToast(title, msg) {
  document.getElementById('toast-title').textContent = title;
  document.getElementById('toast-msg').textContent = msg || '';
  const t = document.getElementById('toast');
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

function esc(s) { return s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;') : ''; }

start();
</script>
</body>
</html>
