<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stream Queue Control</title>
<style>
/* ... keep your existing CSS ... */
</style>
</head>
<body>

<!-- Login Form -->
<div id="loginForm">
  <h1>Login to Control Queue</h1>
  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <div id="loginError"></div>
</div>

<!-- Main Content -->
<div id="mainContent" style="display:none;">
<h1>Stream Queue Control</h1>
<div class="container">
    <div class="panel">
        <h2>Website Requests</h2>
        <button class="next-btn" onclick="nextSong()">⏭️ Next Song</button>
        <button class="clear-btn" onclick="clearQueue()">🗑️ Clear All</button>
        <div id="queue">Loading requests...</div>
    </div>
</div>
</div>

<!-- Firebase Scripts (must be first!) -->
<script src="https://www.gstatic.com/firebasejs/9.30.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.30.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.30.0/firebase-database-compat.js"></script>

<script>
// wait until window loads
window.onload = () => {

const firebaseConfig = {
    apiKey: "AIzaSyCc7XBAOY4bCDAdKt-tKnNn8xo4Xfj5yw4",
    authDomain: "rocksmith-requests.firebaseapp.com",
    databaseURL: "https://rocksmith-requests-default-rtdb.firebaseio.com",
    projectId: "rocksmith-requests",
    storageBucket: "rocksmith-requests.firebasestorage.app",
    messagingSenderId: "267279660992",
    appId: "1:267279660992:web:41c3976abef3712a34ba25",
    measurementId: "G-JWN29ZF9SR"
};

// initialize Firebase
firebase.initializeApp(firebaseConfig);

const DB = firebase.database();
const ALLOWED_UID = "IF6pmcBswAUEM87hr4uGJBeZeXR2";
let userUID = null;

const queueRef = DB.ref("/queue");
const queueDiv = document.getElementById("queue");
const mainContent = document.getElementById("mainContent");
const loginForm = document.getElementById("loginForm");
const loginError = document.getElementById("loginError");

// Login function
async function login() {
    loginError.innerText = "";
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    try {
        const userCredential = await firebase.auth().signInWithEmailAndPassword(email,password);
        userUID = userCredential.user.uid;
        if(userUID !== ALLOWED_UID){
            loginError.innerText = "Access denied";
            firebase.auth().signOut();
            return;
        }
        loginForm.style.display="none";
        mainContent.style.display="block";
        loadQueue();
        queueRef.on("value", snapshot => renderQueue(snapshot.val()));
    } catch(e){
        console.error(e);
        loginError.innerText = "Login failed: "+e.message;
    }
}

// Render queue
function renderQueue(data){
    queueDiv.innerHTML = "";
    if(!data){ queueDiv.innerHTML="<p style='color:#888'>Queue is empty.</p>"; return; }
    const entries = Object.entries(data);
    entries.forEach(([key,s],i)=>{
        const item = document.createElement("div");
        item.className="queueItem";
        item.innerHTML=`<span><strong>${i+1}.</strong> ${s.artist} - ${s.song}</span>
                        <button onclick="removeItem('${key}')">Remove</button>`;
        queueDiv.appendChild(item);
    });
}

// Remove item
window.removeItem = function(key){ DB.ref("/queue/"+key).remove(); }
window.nextSong = function(){ 
    queueRef.orderByKey().limitToFirst(1).once("value", snapshot=>{
        const firstKey = Object.keys(snapshot.val()||{})[0];
        if(firstKey) DB.ref("/queue/"+firstKey).remove();
    });
}
window.clearQueue = function(){
    if(!confirm("Are you sure you want to delete EVERY request?")) return;
    queueRef.remove();
}

// Initial load
function loadQueue(){ queueRef.once("value").then(snapshot => renderQueue(snapshot.val())); }

};
</script>

</body>
</html>
