<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',Segoe UI,Arial;background:#0f0f0f;color:white;margin:0;overflow-x:hidden}

/* ── TITLE BAR ── */
.titleBar{display:flex;justify-content:space-between;align-items:center;background:#141414;padding:10px 14px;border-bottom:2px solid #222;flex-wrap:wrap;gap:8px}
.titleLeft{display:flex;align-items:center;gap:12px}
.titleBar .site-logo{width:44px;height:44px;object-fit:contain;flex-shrink:0;filter:drop-shadow(0 0 6px rgba(241,196,15,.4))}
.titleLeft h2{margin:0;font-weight:900;text-transform:uppercase;font-size:clamp(14px,2.5vw,22px);background:linear-gradient(to bottom,#fff 20%,#f1c40f 45%,#b8860b 85%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 5px rgba(241,196,15,.6))}
.socialLinks{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.socialLinks a{color:#aaa;text-decoration:none;font-size:13px;transition:.15s;white-space:nowrap;padding:4px 9px;border-radius:4px;border:1px solid transparent}
.socialLinks a:hover{color:#f1c40f;border-color:#333;background:#1a1a1a}

/* ── NAV ── */
.topBar{display:flex;gap:6px;padding:8px 10px;background:#181818;position:sticky;top:0;z-index:100;flex-wrap:wrap;align-items:center;border-bottom:1px solid #333}
.nav-btn{background:#2a2a2a;color:white;border:1px solid #444;padding:9px 14px;border-radius:6px;cursor:pointer;font-weight:700;text-transform:uppercase;font-size:12px;transition:.2s;white-space:nowrap;text-decoration:none;display:inline-flex;align-items:center}
.nav-btn:hover,.nav-btn:active{background:#444;border-color:#f1c40f;color:#f1c40f}
.nav-btn.active-page{border-color:#f1c40f55;color:#f1c40f;background:#1a1800}
.clearBtn{display:none;background:#333;color:white;border:none;padding:9px 12px;border-radius:6px;cursor:pointer;font-size:14px}
@media(max-width:660px){.nav-btn{padding:7px 9px;font-size:10px}.topBar{gap:4px;padding:6px 8px}.socialLinks{display:none}.titleBar .site-logo{width:36px;height:36px}}

/* ── MAIN LAYOUT ── */
.page-wrap{max-width:1100px;margin:0 auto;padding:18px 14px;position:relative}
.controls-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:18px;align-items:flex-end;position:relative;z-index:10}
.ctrl-group{display:flex;flex-direction:column;gap:4px;position:relative;z-index:10}
.ctrl-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#666}
select{background:#1e1e1e;color:white;border:1px solid #444;padding:9px 12px;border-radius:6px;font-size:14px;font-family:inherit;cursor:pointer;min-width:110px;position:relative;z-index:10}
select:focus{outline:none;border-color:#f1c40f}
.mode-toggle{display:flex;gap:0;position:relative;z-index:10}
.mode-btn{background:#1e1e1e;color:#888;border:1px solid #444;padding:9px 18px;cursor:pointer;font-weight:700;font-size:12px;text-transform:uppercase;transition:.2s;font-family:'Inter',sans-serif;line-height:1}
.mode-btn:first-child{border-radius:6px 0 0 6px}
.mode-btn:last-child{border-radius:0 6px 6px 0;border-left:none}
.mode-btn.active{background:#f1c40f22;color:#f1c40f;border-color:#f1c40f}
.mode-btn:hover{background:#333;color:#f1c40f}

/* ── DIAGRAMS GRID ── */
.diagrams-grid{display:flex;flex-wrap:wrap;gap:16px;justify-content:flex-start}
.diagram-card{background:#141414;border:1px solid #222;border-radius:10px;padding:14px 16px;min-width:160px;flex:0 0 auto}
.diagram-card h3{margin:0 0 10px;font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:1px;color:#f1c40f}
.fret-svg{display:block}

/* ── SCALE DISPLAY ── */
.scale-wrap{background:#141414;border:1px solid #222;border-radius:10px;padding:18px}
.scale-header{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:16px}
.scale-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:#f1c40f}
.scale-notes{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.note-pill{background:#1e1e1e;border:1px solid #333;border-radius:20px;padding:6px 14px;font-size:13px;font-weight:700;transition:.2s;cursor:pointer;user-select:none}
.note-pill:hover{border-color:#888;color:#fff;background:#2a2a2a}
.note-pill.root{background:#f1c40f22;border-color:#f1c40f;color:#f1c40f}
.note-pill.root:hover{background:#f1c40f44}
.note-pill.active-pill{background:#f1c40f;color:#000;border-color:#f1c40f;box-shadow:0 0 12px rgba(241,196,15,.5)}
.note-pill.root.active-pill{background:#f1c40f;color:#000}
.fretboard-wrap{overflow-x:auto;padding-bottom:4px}

/* ── INFO BOX ── */
.info-box{background:#181818;border:1px solid #2a2a2a;border-radius:8px;padding:12px 16px;margin-top:14px;font-size:13px;color:#888;line-height:1.6}
.info-box strong{color:#ccc}

/* ── FOOTER ── */
footer{text-align:center;padding:18px;color:#444;font-size:12px;border-top:1px solid #1a1a1a;margin-top:30px}
footer a{color:#555;text-decoration:none;transition:.15s}
footer a:hover{color:#f1c40f}
.footer-sep{margin:0 6px;color:#2a2a2a}
</style>

<script>
// ── NOTE DATA ──
const NOTES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

function noteIdx(name) {
  const n = name.split('/')[0];
  return NOTES.indexOf(n);
}

// intervals in semitones from root

  major:    [0,4,7],

  min7:     [0,3,7,10],
  sus2:     [0,2,7],

};

const CHORD_NAMES = {
  major:'Major', minor:'Minor', dom7:'Dominant 7th', maj7:'Major 7th',
  min7:'Minor 7th', sus2:'Sus2', sus4:'Sus4', dim:'Diminished', aug:'Augmented', power:'Power (5th)'
};

const CHORD_INFO = {

  dom7:'Bluesy tension. Adds a minor 7th to a major chord — wants to resolve. Essential for blues and funk.',
  maj7:'Dreamy, jazzy. Softer than dominant 7th. Common in jazz, R&B, and shoegaze.',
  min7:'Smooth and melancholic. Minor chord with a minor 7th. Soul, funk, jazz staple.',

};

const SCALE_INFO = {
  major:'The foundation of Western music. Bright and resolved. 7 notes, whole-whole-half-whole-whole-whole-half pattern.',

function setMode(m) {
  mode = m;

  document.getElementById('chordTypeGroup').style.display = m==='chords' ? '' : 'none';
  document.getElementById('scaleTypeGroup').style.display = m==='scales' ? '' : 'none';
  render();
}

// ── SVG CHORD DIAGRAM ──
function chordSVG(frets, stringCount) {
  // frets: array low→high, -1=mute, 0=open, n=fret number
  const W = 120, H = 140;
  const strCount = stringCount || frets.length;
  const FRETS_SHOWN = 5;
  const PAD_L = 22, PAD_T = 30, PAD_R = 14, PAD_B = 16;
  const gridW = W - PAD_L - PAD_R;
  const gridH = H - PAD_T - PAD_B;
  const strSpacing = gridW / (strCount - 1);
  const fretSpacing = gridH / FRETS_SHOWN;

  // Find the min fret (ignoring mutes/opens) to decide start fret
  const playedFrets = frets.filter(f => f > 0);
  let startFret = 1;
  if (playedFrets.length > 0) {
    const minF = Math.min(...playedFrets);
    const maxF = Math.max(...playedFrets);
    if (maxF > FRETS_SHOWN) {
      startFret = minF;
    }
  }

  let svg = `<svg class="fret-svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;

  // Nut or position marker
  if (startFret === 1) {
    svg += `<rect x="${PAD_L}" y="${PAD_T - 4}" width="${gridW}" height="4" fill="#aaa" rx="1"/>`;
  } else {
    svg += `<text x="${PAD_L - 4}" y="${PAD_T + fretSpacing * 0.6}" text-anchor="end" fill="#888" font-size="9" font-family="Inter,sans-serif">${startFret}</text>`;
  }

  // Fret lines
  for (let f = 0; f <= FRETS_SHOWN; f++) {
    const y = PAD_T + f * fretSpacing;
    svg += `<line x1="${PAD_L}" y1="${y}" x2="${PAD_L + gridW}" y2="${y}" stroke="#333" stroke-width="${f===0?1.5:1}"/>`;
  }

  // String lines
  for (let s = 0; s < strCount; s++) {
    const x = PAD_L + s * strSpacing;
    svg += `<line x1="${x}" y1="${PAD_T}" x2="${x}" y2="${PAD_T + gridH}" stroke="#555" stroke-width="1.2"/>`;
  }

  // Dots and mute/open markers
  frets.forEach((fret, si) => {
    const x = PAD_L + si * strSpacing;
    const markerY = PAD_T - 11;
    if (fret === -1) {
      // mute X
      svg += `<text x="${x}" y="${markerY + 8}" text-anchor="middle" fill="#555" font-size="11" font-family="Inter,sans-serif">✕</text>`;
    } else if (fret === 0) {
      // open circle
      svg += `<circle cx="${x}" cy="${markerY + 4}" r="4" fill="none" stroke="#666" stroke-width="1.2"/>`;
    } else {
      const relFret = fret - startFret + 1;
      if (relFret >= 1 && relFret <= FRETS_SHOWN) {
        const dotY = PAD_T + (relFret - 0.5) * fretSpacing;
        svg += `<circle cx="${x}" cy="${dotY}" r="7" fill="#f1c40f"/>`;
      }
    }
  });

  // Barre detection: same fret on 2+ consecutive strings
  const fretGroups = {};
  frets.forEach((f, i) => {
    if (f > 0) { if (!fretGroups[f]) fretGroups[f]=[]; fretGroups[f].push(i); }
  });
  Object.entries(fretGroups).forEach(([f, indices]) => {
    const relFret = parseInt(f) - startFret + 1;
    if (indices.length >= 2 && relFret >= 1 && relFret <= FRETS_SHOWN) {
      const first = indices[0], last = indices[indices.length-1];
      if (last - first >= 1) {
        const barY = PAD_T + (relFret - 0.5) * fretSpacing;
        const x1 = PAD_L + first * strSpacing;
        const x2 = PAD_L + last * strSpacing;
        svg += `<rect x="${x1-7}" y="${barY-7}" width="${x2-x1+14}" height="14" rx="7" fill="#f1c40f"/>`;
      }
    }
  });

  svg += '</svg>';
  return svg;
}

// ── FRETBOARD SCALE SVG ── (top-down view: low E at top, high e at bottom)
function scaleFretboardSVG(openTuning, scaleNotes, rootNote, numFrets, soloNoteIdx) {
  // Reverse so index 0 (low E) is drawn at top
  const strCount = openTuning.length;
  const displayTuning = [...openTuning].reverse(); // high string at bottom, low at top
  numFrets = numFrets || 12;
  const W = Math.min(900, window.innerWidth - 60);
  const ROW_H = 36;
  const PAD_L = 32, PAD_T = 18, PAD_R = 14, PAD_B = 22;
  const H = strCount * ROW_H + PAD_T + PAD_B;
  const gridW = W - PAD_L - PAD_R;
  const gridH = strCount * ROW_H;
  const strSpacing = ROW_H;
  const fretSpacing = gridW / numFrets;

  const rootIdx = noteIdx(rootNote);

  let svg = `<svg class="fret-svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="max-width:100%">`;

  // Fretboard background
  svg += `<rect x="${PAD_L}" y="${PAD_T}" width="${gridW}" height="${gridH}" fill="#111" rx="4"/>`;

  // Nut
  svg += `<rect x="${PAD_L}" y="${PAD_T}" width="4" height="${gridH}" fill="#999" rx="1"/>`;

  // Fret lines (vertical)
  for (let f = 1; f <= numFrets; f++) {
    const x = PAD_L + f * fretSpacing;
    const isMarker = [3,5,7,9,12].includes(f);
    svg += `<line x1="${x}" y1="${PAD_T}" x2="${x}" y2="${PAD_T + gridH}" stroke="${isMarker?'#2e2e2e':'#1e1e1e'}" stroke-width="${isMarker?1.5:1}"/>`;
  }

  // Position inlay dots (between string rows)
  [3,5,7,9].forEach(f => {
    const x = PAD_L + (f - 0.5) * fretSpacing;
    const y = PAD_T + gridH / 2;
    svg += `<circle cx="${x}" cy="${y}" r="4" fill="#1a1a1a" stroke="#222" stroke-width="1"/>`;
  });
  // Double dot at 12
  const x12 = PAD_L + (12 - 0.5) * fretSpacing;
  svg += `<circle cx="${x12}" cy="${PAD_T + gridH * 0.33}" r="4" fill="#1a1a1a" stroke="#222" stroke-width="1"/>`;
  svg += `<circle cx="${x12}" cy="${PAD_T + gridH * 0.67}" r="4" fill="#1a1a1a" stroke="#222" stroke-width="1"/>`;

  // String lines (horizontal) — variable thickness (low E thickest)
  for (let s = 0; s < strCount; s++) {
    const y = PAD_T + s * strSpacing + strSpacing / 2;
    const thickness = 1 + (s / (strCount - 1)) * 2; // thin at top (low E reversed = high e), wait — displayTuning is reversed so s=0 is low E
    // displayTuning[0] = openTuning[strCount-1] = high e (thinnest)
    // displayTuning[strCount-1] = openTuning[0] = low E (thickest)
    const stringThickness = 0.8 + (s / (strCount - 1)) * 2.2;
    svg += `<line x1="${PAD_L}" y1="${y}" x2="${PAD_L + gridW}" y2="${y}" stroke="#555" stroke-width="${stringThickness.toFixed(1)}"/>`;
  }

      // Notes on strings
  for (let s = 0; s < strCount; s++) {
    const y = PAD_T + s * strSpacing + strSpacing / 2;
    const open = displayTuning[s];
    for (let f = 0; f <= numFrets; f++) {
      const noteI = (open + f) % 12;
      if (scaleNotes.includes(noteI)) {
        const x = f === 0 ? PAD_L - 12 : PAD_L + (f - 0.5) * fretSpacing;
        const isRoot = noteI === rootIdx;
        const isSolo = soloNoteIdx === undefined || soloNoteIdx === null;
        const isHighlighted = isSolo || noteI === soloNoteIdx;
        const opacity = isHighlighted ? '0.95' : '0.15';
        const fill = isRoot ? '#f1c40f' : '#2a6496';
        const textFill = isRoot ? '#000' : '#fff';
        svg += `<circle cx="${x}" cy="${y}" r="${isRoot?10:8}" fill="${fill}" opacity="${opacity}"/>`;
        if (isHighlighted) {
          svg += `<text x="${x}" y="${y+4}" text-anchor="middle" fill="${textFill}" font-size="${isRoot?'8':'7.5'}" font-weight="800" font-family="Inter,sans-serif">${NOTE_DISPLAY[noteI].split('/')[0]}</text>`;
        }
      }
    }
  }

  // String name labels (left side)
  const STRING_NAMES_GUITAR = ['e','B','G','D','A','E']; // high to low (top to bottom)
  const STRING_NAMES_BASS   = ['G','D','A','E'];
  const strNames = displayTuning.length === 4 ? STRING_NAMES_BASS : STRING_NAMES_GUITAR;
  for (let s = 0; s < strCount; s++) {
    const y = PAD_T + s * strSpacing + strSpacing / 2;
    svg += `<text x="14" y="${y+4}" text-anchor="middle" fill="#555" font-size="9" font-weight="700" font-family="Inter,sans-serif">${strNames[s]}</text>`;
  }

  // Fret number labels along bottom
  for (let f = 1; f <= numFrets; f++) {
    if ([3,5,7,9,12].includes(f)) {
      const x = PAD_L + (f - 0.5) * fretSpacing;
      svg += `<text x="${x}" y="${H - 4}" text-anchor="middle" fill="#444" font-size="9" font-family="Inter,sans-serif">${f}</text>`;
    }
  }

  svg += '</svg>';
  return svg;
}

// ── AUDIO ──
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

// NOTE_FREQS: midi note 60 = C4 = 261.63 Hz
const NOTE_FREQS_BASE = [261.63,277.18,293.66,311.13,329.63,349.23,369.99,392.00,415.30,440.00,466.16,493.88];

function playNote(noteIdx12) {
  try {
    const ctx = getAudioCtx();
    if (ctx.state === 'suspended') ctx.resume();
    const freq = NOTE_FREQS_BASE[noteIdx12]; // play in octave 4

    // Plucked string sound: sawtooth through lowpass, fast decay
    const osc1 = ctx.createOscillator();
    const osc2 = ctx.createOscillator();
    const gainNode = ctx.createGain();
    const filter = ctx.createBiquadFilter();

    osc1.type = 'sawtooth';
    osc2.type = 'triangle';
    osc1.frequency.value = freq;
    osc2.frequency.value = freq * 2.001; // slight detune for richness

    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(3000, ctx.currentTime);
    filter.frequency.exponentialRampToValueAtTime(400, ctx.currentTime + 0.4);
    filter.Q.value = 1;

    gainNode.gain.setValueAtTime(0.35, ctx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.2);

    osc1.connect(filter);
    osc2.connect(filter);
    filter.connect(gainNode);
    gainNode.connect(ctx.destination);

    osc1.start(ctx.currentTime);
    osc2.start(ctx.currentTime);
    osc1.stop(ctx.currentTime + 1.3);
    osc2.stop(ctx.currentTime + 1.3);
  } catch(e) { /* audio not available */ }
}

// ── PILL CLICK STATE ──
let activePillIdx = null; // null = show all, number = solo that note

function pillClick(noteIdx12, pillEl) {
  // Toggle: clicking active pill resets to show-all
  if (activePillIdx === noteIdx12) {
    activePillIdx = null;
    document.querySelectorAll('.note-pill').forEach(p => p.classList.remove('active-pill'));
  } else {
    activePillIdx = noteIdx12;
    document.querySelectorAll('.note-pill').forEach(p => p.classList.remove('active-pill'));
    pillEl.classList.add('active-pill');
  }
  playNote(noteIdx12);
  refreshFretboard();
}

// Redraw just the fretboard SVG without full re-render
function refreshFretboard() {
  const fb = document.getElementById('fretboard-container');
  if (!fb) return;
  const instr = document.getElementById('instrSel').value;
  const openTuning = instr === 'bass' ? BASS_OPEN : GUITAR_OPEN;
  const noteIdxsStr = fb.dataset.noteIdxs;
  const rootNote = fb.dataset.root;
  const noteIdxs = noteIdxsStr.split(',').map(Number);
  fb.innerHTML = scaleFretboardSVG(openTuning, noteIdxs, rootNote, 12, activePillIdx);
}

function render() {
  activePillIdx = null; // reset highlight on any control change
  const rootSel = document.getElementById('rootSel').value;
  const rootKey = rootSel.split('/')[0];
  const instr = document.getElementById('instrSel').value;
  const out = document.getElementById('output');

  const INTERVAL_LABELS = ['(R)','(b2)','(2nd)','(b3)','(3rd)','(4th)','(b5)','(5th)','(b6)','(6th)','(b7)','(7th)'];

  if (mode === 'chords') {
    const chordType = document.getElementById('chordTypeSel').value;
    const voicings = (GUITAR_VOICINGS[rootKey] && GUITAR_VOICINGS[rootKey][chordType]) || [];
    const intervals = CHORD_INTERVALS[chordType];
    const rootIdx2 = noteIdx(rootKey);
    const chordNoteIdxs = intervals.map(i => (rootIdx2 + i) % 12);
    const noteNames = chordNoteIdxs.map(i => NOTE_DISPLAY[i]);
    const intervalLabels = [' (R)',' (3rd)',' (5th)',' (7th)'];

    let html = `<div class="scale-wrap">
      <div class="scale-header">
        <span class="scale-title">${rootSel} ${CHORD_NAMES[chordType]}</span>
        <span style="color:#555;font-size:12px;margin-left:4px">click a note to isolate &amp; play it</span>
      </div>
      <div class="scale-notes">`;
    noteNames.forEach((n,i) => {
      const ni = chordNoteIdxs[i];
      html += `<span class="note-pill ${i===0?'root':''}" data-note-idx="${ni}" onclick="pillClick(${ni},this)">${n}${intervalLabels[i]||''}</span>`;
    });
    html += `</div>`;

    if (instr === 'guitar' && voicings.length > 0) {
      html += `<div class="diagrams-grid">`;
      voicings.forEach(v => {
        html += `<div class="diagram-card"><h3>${v.name}</h3>${chordSVG(v.frets, 6)}</div>`;
      });
      html += `</div>`;
      // Also show fretboard for guitar so pill clicks work
      html += `<p style="color:#555;font-size:12px;margin:14px 0 6px">🟡 = root &nbsp; 🔵 = chord tone &nbsp; click a pill above to isolate</p>`;
      html += `<div class="fretboard-wrap"><div id="fretboard-container" data-note-idxs="${chordNoteIdxs.join(',')}" data-root="${rootKey}">${scaleFretboardSVG(instr==='bass'?BASS_OPEN:GUITAR_OPEN, chordNoteIdxs, rootKey, 12, null)}</div></div>`;
    } else if (instr === 'bass') {
      html += `<p style="color:#666;font-size:13px;margin:0 0 8px">Chord tones on bass — click a pill to isolate a note:</p>`;
      html += `<div class="fretboard-wrap"><div id="fretboard-container" data-note-idxs="${chordNoteIdxs.join(',')}" data-root="${rootKey}">${scaleFretboardSVG(BASS_OPEN, chordNoteIdxs, rootKey, 12, null)}</div></div>`;
    } else if (voicings.length === 0) {
      html += `<p style="color:#555;font-size:13px">Chord diagram coming soon for this voicing.</p>`;
      html += `<div class="fretboard-wrap"><div id="fretboard-container" data-note-idxs="${chordNoteIdxs.join(',')}" data-root="${rootKey}">${scaleFretboardSVG(GUITAR_OPEN, chordNoteIdxs, rootKey, 12, null)}</div></div>`;
    }

    html += `<div class="info-box"><strong>About ${CHORD_NAMES[chordType]}:</strong> ${CHORD_INFO[chordType]}</div>`;
    html += `</div>`;
    out.innerHTML = html;

  } else {
    // SCALES mode
    const scaleType = document.getElementById('scaleTypeSel').value;
    const rootIdx2 = noteIdx(rootKey);
    const intervals = SCALE_INTERVALS[scaleType];
    const scaleNoteIdxs = intervals.map(i => (rootIdx2 + i) % 12);
    const noteNames = scaleNoteIdxs.map(i => NOTE_DISPLAY[i]);
    const openTuning = instr === 'bass' ? BASS_OPEN : GUITAR_OPEN;

    let html = `<div class="scale-wrap">
      <div class="scale-header">
        <span class="scale-title">${rootSel} ${SCALE_NAMES[scaleType]}</span>
        <span style="color:#555;font-size:12px;margin-left:4px">click a note to isolate &amp; play it</span>
      </div>
      <div class="scale-notes">`;
    noteNames.forEach((n,i) => {
      const ni = scaleNoteIdxs[i];
      html += `<span class="note-pill ${i===0?'root':''}" data-note-idx="${ni}" onclick="pillClick(${ni},this)">${n}</span>`;
    });
    html += `</div>
      <p style="color:#555;font-size:12px;margin:0 0 8px">🟡 = root &nbsp; 🔵 = scale tone &nbsp; click a pill to isolate</p>
      <div class="fretboard-wrap"><div id="fretboard-container" data-note-idxs="${scaleNoteIdxs.join(',')}" data-root="${rootKey}">${scaleFretboardSVG(openTuning, scaleNoteIdxs, rootKey, 12, null)}</div></div>
      <div class="info-box"><strong>About ${SCALE_NAMES[scaleType]}:</strong> ${SCALE_INFO[scaleType]}</div>
    </div>`;
    out.innerHTML = html;
  }
}

// ── EVENT LISTENERS ──
['rootSel','chordTypeSel','scaleTypeSel','instrSel'].forEach(id => {
  document.getElementById(id).addEventListener('change', render);
});

// Initial render
render();
</script>
