<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;900&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: transparent;
      overflow: hidden;
      font-family: 'Inter', Arial, sans-serif;
      padding: 12px;
      width: 520px;
    }

    /* ── MAIN CARD ── */
    #mainCard {
      display: none;
      flex-direction: column;
      gap: 0;
      background: rgba(8, 8, 8, 0.92);
      border: 1px solid rgba(241,196,15,0.3);
      border-left: 4px solid #f1c40f;
      border-radius: 10px;
      overflow: hidden;
      backdrop-filter: blur(12px);
      box-shadow: 0 4px 32px rgba(0,0,0,0.8), 0 0 0 1px rgba(241,196,15,0.05);
      animation: slideIn .35s cubic-bezier(.2,1,.3,1);
    }
    #mainCard.visible { display: flex; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-20px) scale(.97); }
      to   { opacity: 1; transform: translateX(0) scale(1); }
    }
    @keyframes slideOut {
      from { opacity: 1; transform: translateX(0) scale(1); }
      to   { opacity: 0; transform: translateX(-20px) scale(.97); }
    }
    .card-exit { animation: slideOut .3s ease forwards; }

    /* ── NOW PLAYING ROW ── */
    .now-playing-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px 10px;
    }

    .guitar-icon {
      font-size: 28px;
      flex-shrink: 0;
      filter: drop-shadow(0 0 6px rgba(241,196,15,.5));
      animation: iconPulse 3s ease-in-out infinite;
    }
    @keyframes iconPulse {
      0%,100% { transform: scale(1) rotate(-3deg); }
      50%      { transform: scale(1.08) rotate(3deg); }
    }

    .now-text { flex: 1; min-width: 0; }

    .now-label {
      font-size: 8px;
      font-weight: 700;
      color: #f1c40f;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 2px;
      opacity: .8;
    }

    .now-song {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      color: #fff;
      letter-spacing: 1.5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1;
      text-shadow: 0 0 20px rgba(241,196,15,.25);
    }

    .now-artist {
      font-size: 13px;
      font-weight: 700;
      color: #f1c40f;
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-shadow: 0 0 8px rgba(241,196,15,.3);
    }

    /* ── PROGRESS BAR (animated, decorative) ── */
    .progress-bar {
      height: 2px;
      background: rgba(241,196,15,.12);
      position: relative;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #b8860b, #f1c40f, #fff8, #f1c40f, #b8860b);
      background-size: 200%;
      animation: shimmerBar 2s linear infinite;
      width: 100%;
    }
    @keyframes shimmerBar {
      0%   { background-position: 200%; }
      100% { background-position: -200%; }
    }

    /* ── FOOTER ROW (queue count + slopsmith) ── */
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 16px 8px;
      gap: 8px;
    }

    .queue-pill {
      font-size: 10px;
      font-weight: 700;
      color: #555;
      letter-spacing: .5px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .queue-pill .q-dots {
      display: flex;
      gap: 3px;
    }
    .queue-pill .q-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #333;
    }
    .queue-pill .q-dot.active { background: #f1c40f; }

    #slopIndicator {
      display: none;
      font-size: 9px;
      font-weight: 700;
      color: #ff7733;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 2px 8px;
      background: rgba(255,85,0,.15);
      border: 1px solid rgba(255,85,0,.3);
      border-radius: 10px;
      animation: slopPulse 1.5s ease-in-out infinite;
    }
    @keyframes slopPulse {
      0%,100% { opacity: 1; }
      50%      { opacity: .6; }
    }

    /* ── UP NEXT ROW ── */
    #upNextRow {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 7px 16px 10px;
      border-top: 1px solid rgba(255,255,255,.04);
    }
    #upNextRow.visible { display: flex; }
    .up-next-label {
      font-size: 8px;
      font-weight: 700;
      color: #444;
      letter-spacing: 2px;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .up-next-text {
      font-size: 11px;
      font-weight: 700;
      color: #666;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body>

<div id="mainCard">
  <div class="now-playing-row">
    <div class="guitar-icon">🎸</div>
    <div class="now-text">
      <div class="now-label" id="now-label">▶ Up Next</div>
      <div class="now-song" id="songName">Loading...</div>
      <div class="now-artist" id="artistName">—</div>
    </div>
  </div>

  <div class="progress-bar"><div class="progress-fill"></div></div>

  <div class="card-footer">
    <div class="queue-pill">
      <div class="q-dots" id="qDots"></div>
      <span id="queueCount"></span>
    </div>
    <div id="slopIndicator">🤘 SLOPSMITH</div>
  </div>

  <div id="upNextRow">
    <div class="up-next-label">Then</div>
    <div class="up-next-text" id="upNextText"></div>
  </div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCc7XBAOY4bCDAdKt-tKnNn8xo4Xfj5yw4",
    authDomain: "rocksmith-requests.firebaseapp.com",
    databaseURL: "https://rocksmith-requests-default-rtdb.firebaseio.com",
    projectId: "rocksmith-requests"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  let lastSongKey = null;

  // Watch nowPlaying node first (set manually via control panel)
  db.ref("nowPlaying").on("value", npSnap => {
    const np = npSnap.val();
    if (np && np.song) {
      document.getElementById("now-label").textContent = "▶ NOW PLAYING";
      document.getElementById("songName").textContent = np.song;
      document.getElementById("artistName").textContent = np.artist;
      document.getElementById("mainCard").classList.add('visible');
    }
  });

  db.ref("queue").orderByChild("timestamp").on("value", snap => {
    const card = document.getElementById("mainCard");
    const data = snap.val();

    if (!data) {
      card.classList.add('card-exit');
      setTimeout(() => { card.classList.remove('visible','card-exit'); }, 300);
      return;
    }

    const entries = Object.entries(data).sort((a,b) => a[1].timestamp - b[1].timestamp);
    const first = entries[0];
    const firstKey = first[0];
    const firstSong = first[1];

    // Animate out and back in when song changes
    if (lastSongKey && lastSongKey !== firstKey) {
      card.classList.add('card-exit');
      setTimeout(() => {
        card.classList.remove('card-exit');
        card.style.animation = 'none';
        void card.offsetWidth;
        card.style.animation = '';
        updateCard(firstSong, entries);
      }, 300);
    } else {
      updateCard(firstSong, entries);
      if (!card.classList.contains('visible')) card.classList.add('visible');
    }
    lastSongKey = firstKey;
  });

  function updateCard(song, entries) {
    const card = document.getElementById("mainCard");
    card.classList.add('visible');

    document.getElementById("songName").textContent = song.song;
    document.getElementById("artistName").textContent = song.artist;

    const total = entries.length;
    const countEl = document.getElementById("queueCount");
    countEl.textContent = total === 1 ? "1 in queue" : `${total} in queue`;

    // Dot indicators (show up to 8)
    const dots = document.getElementById("qDots");
    dots.innerHTML = "";
    const dotCount = Math.min(total, 8);
    for (let i = 0; i < dotCount; i++) {
      const d = document.createElement("div");
      d.className = "q-dot" + (i === 0 ? " active" : "");
      dots.appendChild(d);
    }

    // Up Next row
    const upNextRow = document.getElementById("upNextRow");
    if (entries.length > 1) {
      const next = entries[1][1];
      document.getElementById("upNextText").textContent = `${next.artist} — ${next.song}`;
      upNextRow.classList.add("visible");
    } else {
      upNextRow.classList.remove("visible");
    }
  }

  // Slopsmith flag
  db.ref("slopsmith").on("value", snap => {
    document.getElementById("slopIndicator").style.display = snap.val() ? "block" : "none";
  });
</script>
</body>
</html>
