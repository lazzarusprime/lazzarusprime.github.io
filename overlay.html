<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<style>

body{

background:transparent;
color:white;
font-family:Arial;
font-size:28px;

}

</style>

</head>

<body>

<div id="nowPlaying">Loading...</div>

<script>

async function load(){

let r=await fetch("queue.json")

let q=await r.json()

if(q.length>0){

document.getElementById("nowPlaying").innerText=
"Now Playing: "+q[0].artist+" - "+q[0].song

}

}

setInterval(load,3000)

load()

</script>

</body>

</html>
