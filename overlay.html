<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<style>

body{

background:transparent;
color:white;
font-family:Arial;

}

</style>

</head>

<body>

<h2 id="now">Queue Loading...</h2>

<script>

async function load(){

let r=await fetch("queue.json")

let q=await r.json()

if(q.length>0){

document.getElementById("now").innerText=
"Now Playing: "+q[0].artist+" - "+q[0].song

}

}

setInterval(load,5000)

load()

</script>

</body>

</html>
