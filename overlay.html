<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { background: transparent; color: white; font-size: 36px; font-family: Arial; text-shadow: 2px 2px 4px #000; }
    </style>
</head>
<body>
    <div id="nowPlaying">Waiting for requests...</div>

    <script>
        // Note: Ensure NO trailing slash in the databaseURL
        const firebaseConfig = {
            databaseURL: "https://lazzarus-prime-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref("queue").limitToFirst(1).on("value", (snap) => {
            const data = snap.val();
            const display = document.getElementById("nowPlaying");
            
            if (!data) {
                display.innerText = "No requests";
                return;
            }
            
            // Extract the first item from the object
            const firstKey = Object.keys(data)[0];
            const song = data[firstKey];
            display.innerText = song.artist + " - " + song.song;
        }, (error) => {
            console.error("Firebase Error:", error);
        });
    </script>
</body>
</html>
