<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lazzarus Prime - Songs Requests</title>
<style>
*{box-sizing:border-box}
body{font-family:Segoe UI,Arial;background:#0f0f0f;color:white;margin:0}

/* ── RETRO ARCADE & SCANLINE GLOBAL OVERLAYS ── */
body::before {
  content: " ";
  display: block;
  position: fixed;
  top: 0; left: 0; bottom: 0; right: 0;
  background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
              linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
  z-index: 99999;
  background-size: 100% 4px, 6px 100%;
  pointer-events: none;
}

/* Flame Particle Action Feedback */
.flame-particle {
  position: fixed;
  pointer-events: none;
  width: 8px;
  height: 8px;
  background: radial-gradient(circle, #fff, #ff5500, #ffaa00);
  border-radius: 50%;
  box-shadow: 0 0 8px #ff5500, 0 0 15px #ffaa00;
  z-index: 10000;
  animation: flyAndFade 0.6s ease-out forwards;
}

@keyframes flyAndFade {
  0% { transform: translate(0, 0) scale(1); opacity: 1; }
  100% { transform: translate(var(--mx), var(--my)) scale(0.2); opacity: 0; }
}

/* Arcade Cabinet Roulette Modal */
.arcade-modal {
  display: none;
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0, 0, 0, 0.85);
  z-index: 9999;
  justify-content: center;
  align-items: center;
}

.arcade-cabinet {
  background: #111;
  border: 4px solid #ff5500;
  padding: 30px;
  border-radius: 12px;
  width: 90%;
  max-width: 500px;
  text-align: center;
  box-shadow: 0 0 30px rgba(255, 85, 0, 0.5), inset 0 0 20px rgba(0,0,0,0.9);
  position: relative;
}

.arcade-screen {
  background: #050505;
  border: 3px solid #333;
  padding: 40px 20px;
  margin: 20px 0;
  border-radius: 6px;
  min-height: 120px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  box-shadow: inset 0 0 15px rgba(0,255,255,0.2), 0 0 10px rgba(255,85,0,0.2);
}

.arcade-title {
  font-family: Segoe UI, Arial, sans-serif;
  font-weight: 900;
  font-size: 24px;
  color: #f1c40f;
  letter-spacing: 2px;
  text-shadow: 0 0 5px rgba(241,196,15,0.5);
}

.roulette-display {
  font-size: 20px;
  font-weight: bold;
  color: #fff;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.roulette-display.winner {
  color: #ff5500;
  animation: winnerFlash 0.15s ease-in-out infinite alternate;
}

@keyframes winnerFlash {
  from { text-shadow: 0 0 5px #fff, 0 0 10px #ff5500; transform: scale(1); }
  to { text-shadow: 0 0 15px #ff5500, 0 0 30px #ffaa00; transform: scale(1.03); }
}

/* ── TITLE BAR ── */
.titleBar{display:flex;justify-content:space-between;align-items:center;background:#141414;padding:10px 14px;border-bottom:2px solid #222;flex-wrap:wrap;gap:8px}
.titleLeft{display:flex;align-items:center;gap:10px}
.titleBar img{width:36px;height:36px}
.titleLeft h2{margin:0;font-weight:900;text-transform:uppercase;font-size:clamp(14px,2.5vw,22px);background:linear-gradient(to bottom,#fff 20%,#f1c40f 45%,#b8860b 85%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 5px rgba(241,196,15,.6));animation:neonPulse 2s infinite alternate;}

@keyframes neonPulse {
  from { filter: drop-shadow(0 0 4px rgba(241,196,15,0.6)); }
  to { filter: drop-shadow(0 0 12px rgba(255,85,0,0.9)); }
}

.socialLinks{display:flex;gap:10px;flex-wrap:wrap}
.socialLinks a{color:#aaa;text-decoration:none;font-size:13px;transition:.15s;white-space:nowrap}
.socialLinks a:hover{color:#f1c40f;text-shadow:0 0 5px #f1c40f}

/* ── TOP BAR ── */
.topBar{display:flex;gap:6px;padding:8px 10px;background:#181818;position:sticky;top:0;z-index:100;flex-wrap:wrap;justify-content:center;align-items:center;border-bottom:1px solid #333}
.topBar input{flex:1;padding:9px 12px;border-radius:6px;border:none;min-width:150px;background:white;color:black;font-size:14px}
.nav-btn{background:#2a2a2a;color:white;border:1px solid #444;padding:9px 14px;border-radius:6px;cursor:pointer;font-weight:700;text-transform:uppercase;font-size:12px;transition:.2s;white-space:nowrap}
.nav-btn:hover,.nav-btn:active{background:#444;border-color:#f1c40f;color:#f1c40f}
.clearBtn{display:none;background:#333;color:white;border:none;padding:9px 12px;border-radius:6px;cursor:pointer;font-size:14px}

/* ── GENRE BAR ── */
#genreBar{display:flex;flex-wrap:wrap;gap:5px;padding:8px 10px;background:#141414;border-bottom:1px solid #222;justify-content:center}
.genre-btn{background:#1e1e1e;color:#bbb;border:1px solid #333;padding:5px 12px;border-radius:16px;cursor:pointer;font-size:11px;font-weight:600;transition:.2s;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
.genre-btn:hover{border-color:#f1c40f;color:#f1c40f}
.genre-btn.active{background:#f1c40f22;border-color:#f1c40f;color:#f1c40f}

/* ── ALPHABET ── */
#alphabet{display:flex;flex-wrap:wrap;gap:4px;padding:8px 10px;justify-content:center}

/* ── ARTIST STATS ── */
#artistStats{background:#151515;border-bottom:1px solid #222;transition:.3s}
#artistToggle{cursor:pointer;margin:0;padding:10px 14px;font-size:14px;font-weight:700}
#artistList{display:none;padding:10px 14px;border-top:1px solid #222;animation:slideDown .3s ease-out;columns:2;gap:20px}
@media(max-width:500px){#artistList{columns:1}}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
#artistList div{padding:4px 0;cursor:pointer;transition:.15s;break-inside:avoid}
#artistList div:hover{color:#f1c40f;padding-left:4px}
.flame-effect{animation:warmPulse .6s ease-out}
@keyframes warmPulse{0%{box-shadow:0 0 0 transparent}50%{box-shadow:inset 0 0 30px rgba(241,196,15,.15);border-color:#f1c40f}100%{box-shadow:0 0 0 transparent}}

/* ── ACTIVE FILTER BANNER ── */
#activeFilters{display:none;padding:7px 12px;background:#181818;border-bottom:1px solid #222;font-size:13px;color:#888;text-align:center}
#activeFilters span{color:#f1c40f}
#activeFilters button{background:transparent;color:#888;border:1px solid #444;padding:2px 8px;border-radius:4px;cursor:pointer;font-size:12px;margin-left:8px}

/* ── SONG LIST ── */
.listHeader{display:flex;justify-content:space-between;align-items:center;padding:6px 12px;border-bottom:1px solid #1a1a1a}
.listHeader h3{margin:0;font-size:13px;color:#666;letter-spacing:.5px}
.resultsCount{font-size:12px;color:#555}

.song{display:flex;align-items:center;padding:8px 12px;border-bottom:1px solid #1e1e1e;transition:.15s;gap:10px}
.song:hover{background:#161616}
.song.highlight{background:#1a1a1a;box-shadow:0 0 6px rgba(241,196,15,.3)}

/* Art thumbnail in song row */
.songArt{width:42px;height:42px;border-radius:4px;object-fit:cover;flex-shrink:0;background:#222}
.songArtPlaceholder{width:42px;height:42px;border-radius:4px;background:#1e1e1e;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;color:#333}

.songInfo{display:flex;flex-direction:column;flex:1;min-width:0}
.songTitle{font-weight:700;font-size:15px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.songArtist{font-size:12px;font-weight:600;color:#f1c40f;cursor:pointer;margin-top:2px;transition:.15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.songArtist:hover{text-shadow:0 0 4px #f1c40f}
.songGenre{font-size:11px;color:#555;margin-top:2px}

.req-btn{background:#1a3a1a;color:#4caf50;border:1px solid #2d5a2d;padding:7px 13px;border-radius:6px;cursor:pointer;font-weight:700;font-size:12px;transition:.2s;white-space:nowrap;flex-shrink:0}
.req-btn:hover,.req-btn:active{background:#2d5a2d;color:#7ddd80;border-color:#4caf50}

/* ── PAGINATION ── */
.pagination{padding:12px;text-align:center;background:#111;border-bottom:1px solid #222}

/* ── MOBILE OVERRIDES ── */
@media(max-width:600px){
  .titleBar{padding:8px 10px}
  .socialLinks{gap:8px}
  .socialLinks a{font-size:12px}
  .topBar{gap:5px;padding:6px 8px}
  .nav-btn{padding:8px 10px;font-size:11px}
  .topBar input{font-size:13px;padding:8px 10px}
  .song{padding:7px 10px;gap:8px}
  .songArt,.songArtPlaceholder{width:38px;height:38px}
  .songTitle{font-size:14px}
  .req-btn{padding:6px 10px;font-size:11px}
  #alphabet{gap:2px;padding:6px}
  #alphabet .nav-btn{padding:5px 7px;font-size:10px}
}
</style>
</head>
<body>

<div id="arcadeModal" class="arcade-modal">
  <div class="arcade-cabinet">

<div class="titleBar">

<div id="songList"></div>

<script>
let songs = [], filteredSongs = [], currentPage = 1, songsPerPage = 40, activeGenre = null;
let artistArtMap = {};   // artist -> art url
let artistGenreMap = {}; // artist -> genre label

const GENRE_MAP = {
  "Metal": ["Metallica","Megadeth","Slayer","Pantera","Iron Maiden","Black Sabbath","Ozzy Osbourne","Judas Priest","Anthrax","Sepultura","Tool","System of A Down","Slipknot","Korn","Disturbed","Avenged Fold","Five Finger Death Punch","Killswitch Engage","Lamb of God","Gojira","Opeth","Dream Theater","Queensryche","Accept","Motorhead","Whitesnake","Dio","Rainbow","Deep Purple","Twisted Sister","Skid Row","Poison","Ratt","Motley Crue","White Zombie","Rob Zombie","Marilyn Manson","Alice in Chains","Soundgarden","Stone Temple Pilots","Audioslave","Velvet Revolver","Creed","Nickelback","Breaking Benjamin","Three Days Grace","Seether","Staind","Puddle Of Mudd","Mudvayne","Crossfade","Trapt","Nonpoint","Taproot","Cradle of Filth","Periphery","Animals As Leaders","DragonForce","Queens of the Stone Age","Royal Blood","Ghost","Volbeat","Airbourne","Rival Sons","Helmet","Alter Bridge","Danzig","Rage Against The Machine","Prophets of Rage","Muse","Bush","Fuel","Chevelle","Filter","The Tea Party","The Cult","Blue Oyster Cult","Rush","Godsmack","Papa Roach","Linkin Park","Limp Bizkit","Deftones","Incubus","Finger Eleven","Our Lady Peace","Theory of A Deadman","Shinedown","Hinder","Drowning Pool","P.O.D.","Rise Against","Pennywise","Bad Religion","Rancid","Sum 41","Billy Talent","Paramore","My Chemical Romance","Asking Alexandria","Ice Nine Kills","Suicidal Tendencies","Helmet","Primus","Alice Cooper","Warrant","Tesla","Extreme","Mr. Big","Winger","Dokken","Scorpions","Triumph","Kansas","Boston","Styx","Foghat","Bachman Turner Overdrive","Grand Funk Railroad","Mountain","Ted Nugent","Hoobastank","Shinedown","Sick Puppies","Saving Abel","Framing Hanley","Evans Blue","The Flatliners","Flatliners","NoFX","Operation Ivy","Husker Du","Descendents","Green Day","Offspring"],
  "Classic Rock": ["Led Zeppelin","The Rolling Stones","Rolling Stones","The Who","Pink Floyd","Aerosmith","Eagles","Fleetwood Mac","The Doors","Doors","Jimi Hendrix","Cream","Eric Clapton","Jeff Beck","Peter Frampton","Foreigner","Journey","REO Speedwagon","Heart","Cheap Trick","Tom Petty","Allman Brothers","Lynyrd Skynyrd","ZZ Top","Van Halen","Queen","AC/DC","ACDC","The Beatles","Beatles","David Bowie","Rod Stewart","Elton John","Bruce Springsteen","Bob Dylan","Neil Young","Paul Simon","Beach Boys","The Kinks","Kinks","T. Rex","Thin Lizzy","Bad Company","Free","Traffic","Steve Winwood","Genesis","Peter Gabriel","Phil Collins","Yes","King Crimson","Emerson Lake","Black Sabbath","Deep Purple","Rainbow","Whitesnake","Dio","Budgie","Mountain","Ted Nugent","Blue Oyster Cult","Styx","Kansas","Boston","Rush","Triumph","Steppenwolf","Foghat","Bachman Turner Overdrive","April Wine","Guess Who","Trooper","Loverboy","Kim Mitchell","Chilliwack","Sloan","Bryan Adams","Blue Rodeo","Tragically Hip","Matthew Good","Moist","Glorious Sons","Sheepdogs","Sass Jordan","Big Wreck","Jeff Healey","Santana","Steve Miller Band","Steely Dan","Toto","Chicago","Electric Light Orchestra","ELO","Golden Earring","Small Faces","Faces","Spencer Davis","Jethro Tull","Uriah Heep","Supertramp","Crosby Stills","Eagles","America","Jackson Browne","James Taylor","Gordon Lightfoot","Jim Croce","Simon Garfunkel"],
  "Pop": ["Taylor Swift","Katy Perry","Ariana Grande","Lady Gaga","Beyonce","Rihanna","Madonna","Michael Jackson","Britney Spears","Justin Timberlake","Ed Sheeran","Adele","Dua Lipa","Harry Styles","Olivia Rodrigo","Billie Eilish","Camila Cabello","Halsey","Shawn Mendes","Miley Cyrus","Sia","Ellie Goulding","Natasha Bedingfield","Alanis Morissette","Avril Lavigne","Kelly Clarkson","Kesha","Gwen Stefani","No Doubt","Pink","Christina Aguilera","Celine Dion","Whitney Houston","Mariah Carey","Cyndi Lauper","Duran Duran","INXS","Roxette","Backstreet Boys","One Direction","5 Seconds of Summer","Carly Rae Jepsen","Lorde","Vance Joy","Train","Matchbox Twenty","OneRepublic","Coldplay","Arcade Fire","Metric","City and Colour","Lumineers","Counting Crows","Gin Blossoms","BLACKPINK","BTS","YOASOBI","Lana Del Rey","Lana Del Ray","MGMT","Foster the People","Imagine Dragons","Twenty One Pilots","Gorillaz","Beck"],
  "R&B Soul": ["Marvin Gaye","Stevie Wonder","Aretha Franklin","James Brown","Otis Redding","Sam Cooke","Al Green","Ray Charles","Curtis Mayfield","Wilson Pickett","Isaac Hayes","Sly and The Family Stone","Earth Wind and Fire","Kool and The Gang","Tower of Power","Isley Brothers","Four Tops","Temptations","Commodores","Lionel Richie","Diana Ross","Gladys Knight","Tina Turner","Mary J Blige","Alicia Keys","John Legend","Bruno Mars","Anderson Paak","Thundercat","Vulfpeck","Khruangbin","Amy Winehouse","Sade","Lauryn Hill","Fugees","TLC","Janet Jackson","Donna Summer","Gloria Gaynor","Bee Gees"],
  "Hip Hop": ["Eminem","Jay-Z","Jay Z","Kendrick Lamar","Kanye West","Drake","Post Malone","2Pac","NWA","Ice Cube","Dr. Dre","Snoop Dogg","Nas","Biggie","Wu Tang Clan","Beastie Boys","Run DMC","Public Enemy","LL Cool J","Cypress Hill","DMX","Busta Rhymes","50 Cent","Fort Minor","Afroman","Coolio","Childish Gambino","Anderson Paak","Wiz Khalifa","Mac Miller","Cardi B","Limp Bizkit","Kid Rock","Puff Daddy","LMFAO","Flo Rida","Pitbull"],
  "Blues": ["BB King","B.B. King","Albert King","Muddy Waters","Howlin Wolf","Robert Johnson","John Lee Hooker","Eric Clapton","Jeff Beck","Stevie Ray Vaughan","Stevie Ray Vaughn","Jonny Lang","Kenny Wayne Shepherd","Buddy Guy","Joe Cocker","George Thorogood","Blues Brothers","Jack White","White Stripes","Black Keys","Ben Harper","John Mayer","Bonnie Raitt","Gary Clark Jr.","Derek Trucks"],
  "Country": ["Johnny Cash","Dolly Parton","Willie Nelson","Waylon Jennings","Garth Brooks","Alan Jackson","George Strait","Kenny Rogers","Hank Williams","Patsy Cline","Loretta Lynn","Glen Campbell","Alabama","Chris Stapleton","Kacey Musgraves","Luke Combs","Carrie Underwood","Rascal Flatts","Dixie Chicks","Brooks and Dunn","Shania Twain","Zac Brown Band","Sturgill Simpson","Gordon Lightfoot","Jim Croce","John Denver","Lumineers","Mumford and Sons"],
  "Funk Disco": ["James Brown","Sly and The Family Stone","Earth Wind and Fire","Kool and The Gang","Parliament","Funkadelic","Prince","Rick James","Ohio Players","Tower of Power","War","Commodores","Donna Summer","Gloria Gaynor","Bee Gees","KC and The Sunshine Band","Daft Punk","Jamiroquai","Bruno Mars","Mark Ronson","Vulfpeck","Khruangbin","Fatboy Slim"],
  "Indie Alt": ["Radiohead","Pixies","Sonic Youth","Modest Mouse","The Shins","Arcade Fire","Tame Impala","Mac DeMarco","Courtney Barnett","PJ Harvey","St. Vincent","Fiona Apple","Interpol","Bloc Party","Franz Ferdinand","The Strokes","Yeah Yeah Yeahs","Cage The Elephant","MGMT","Foster the People","Lorde","Gorillaz","Beck","Massive Attack","Portishead","American Football","Hot Mulligan","The Wonder Years","Death Cab for Cutie","Fleet Foxes","Bon Iver","Vampire Weekend","Foals","Alt-J","Royal Blood"],
  "Punk": ["Ramones","The Clash","Sex Pistols","Dead Kennedys","Black Flag","Misfits","Husker Du","Green Day","The Offspring","Blink 182","Menzingers","NOFX","NoFX","Bad Religion","Pennywise","Rancid","Operation Ivy","Rise Against","Sum 41","Simple Plan","Billy Talent","The Flatliners","Hot Water Music","Propagandhi","Anti-Flag","Social Distortion","Dropkick Murphys","Flogging Molly"],
  "Reggae": ["Bob Marley","Jimmy Cliff","Steel Pulse","UB40","Sublime","311","No Doubt","Ska-P","The Interrupters","Reel Big Fish","Less Than Jake","Streetlight Manifesto"]
};

const GENRE_EMOJI = { "Metal":"🤘","Classic Rock":"🎸","Pop":"🎤","R&B Soul":"🎵","Hip Hop":"🎤","Blues":"🟡","Country":"🌎","Funk Disco":"🕺","Indie Alt":"🌿","Punk":"🎙️","Reggae":"🌴" };

function assignGenre(artist) {
  const lower = artist.toLowerCase();
  for (const [genre, list] of Object.entries(GENRE_MAP)) {
    if (list.some(a => lower === a.toLowerCase() || lower.includes(a.toLowerCase()) || a.toLowerCase().includes(lower))) {
      return genre;
    }
  }
  return null;
}

async function init() {
  try {
    const resp = await fetch("songs.json");
    const raw = await resp.json();

    const seen = new Set();
    raw.forEach(s => {
      if (!seen.has(s.artist)) {
        seen.add(s.artist);
        if (s.art) artistArtMap[s.artist] = s.art;
        artistGenreMap[s.artist] = s.genre || assignGenre(s.artist);
      }
    });

    songs = raw.map(s => ({ ...s, displayName: s.song }));
    filteredSongs = songs;

    const urlParams = new URLSearchParams(window.location.search);
    const artistSearch = urlParams.get('search');
    if (artistSearch) {
      document.getElementById("searchBox").value = artistSearch;
      filteredSongs = songs.filter(s => s.artist === artistSearch);
      toggleClearButton();
    }

    buildGenreBar();
    buildAlphabet();
    buildArtistStats();
    renderSongs();
  } catch(e) { console.error("Load error:", e); }
}

function buildGenreBar() {
  const bar = document.getElementById("genreBar");
  bar.innerHTML = "";
  for (const genre of Object.keys(GENRE_MAP)) {
    const emoji = GENRE_EMOJI[genre] || "";
    const btn = document.createElement("button");
    btn.className = "genre-btn";
    btn.textContent = emoji + " " + genre;
    btn.onclick = () => toggleGenre(genre, btn);
    bar.appendChild(btn);
  }
}

function toggleGenre(genre, btn) {
  if (activeGenre === genre) { activeGenre = null; document.querySelectorAll('.genre-btn').forEach(b=>b.classList.remove('active')); clearSearch(); return; }
  activeGenre = genre;
  document.querySelectorAll('.genre-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById("searchBox").value = "";
  const list = GENRE_MAP[genre].map(a=>a.toLowerCase());
  filteredSongs = songs.filter(s => {
    const lower = s.artist.toLowerCase();
    return list.some(g => lower === g || lower.includes(g) || g.includes(lower));
  });
  currentPage = 1;
  document.getElementById("activeFilters").style.display = "block";
  document.getElementById("filterLabel").textContent = (GENRE_EMOJI[genre]||"") + " " + genre + " (" + filteredSongs.length + " songs)";
  renderSongs();
  toggleClearButton();
}

function renderSongs() {
  const list = document.getElementById("songList");
  list.innerHTML = "";
  const start = (currentPage - 1) * songsPerPage;
  const pageSongs = filteredSongs.slice(start, start + songsPerPage);
  document.getElementById("resultsCount").textContent =
    filteredSongs.length !== songs.length ? filteredSongs.length.toLocaleString() + " results" : songs.length.toLocaleString() + " songs";

  pageSongs.forEach(song => {
    const div = document.createElement("div");
    div.className = "song";
    div.dataset.artist = song.artist;

    const artUrl = song.art || artistArtMap[song.artist];
    const genre = artistGenreMap[song.artist];
    const emoji = genre ? (GENRE_EMOJI[genre] || "") : "";

    const artHtml = artUrl
      ? `<img class="songArt" src="${artUrl}" alt="" loading="lazy" onerror="this.style.display='none'">`
      : `<div class="songArtPlaceholder">🎵</div>`;

    const safeArtist = song.artist.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    const safeSong   = song.song.replace(/\\/g,'\\\\').replace(/'/g,"\\'");

    div.innerHTML = `
      ${artHtml}
      <div class="songInfo">
        <div class="songTitle">${esc(song.displayName)}</div>
        <div class="songArtist" onclick="filterArtist('${safeArtist}')">${esc(song.artist)}</div>
        ${genre ? `<div class="songGenre">${emoji} ${genre}</div>` : ""}
      </div>
      <button class="req-btn" onclick="requestSong('${safeArtist}','${safeSong}', event)">Request</button>
    `;
    list.appendChild(div);
  });
  renderPagination();
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderPagination() {
  const totalPages = Math.ceil(filteredSongs.length / songsPerPage) || 1;
  ["paginationTop","paginationBottom"].forEach(id => {
    const c = document.getElementById(id);
    c.innerHTML = "";
    if (currentPage > 1) {
      const p = document.createElement("button"); p.textContent = "Prev"; p.className = "nav-btn"; p.style.padding="6px 12px";
      p.onclick = () => { currentPage--; renderSongs(); window.scrollTo(0,0); };
      c.appendChild(p);
    }
    const lbl = document.createElement("span"); lbl.textContent = " Page " + currentPage + " / " + totalPages + " "; c.appendChild(lbl);
    if (currentPage < totalPages) {
      const n = document.createElement("button"); n.textContent = "Next"; n.className = "nav-btn"; n.style.padding="6px 12px";
      n.onclick = () => { currentPage++; renderSongs(); window.scrollTo(0,0); };
      c.appendChild(n);
    }
  });
}

function handleSearchInput() {
  activeGenre = null;
  document.querySelectorAll('.genre-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById("activeFilters").style.display = "none";
  const q = document.getElementById("searchBox").value.toLowerCase();
  filteredSongs = songs.filter(s => s.artist.toLowerCase().includes(q) || s.displayName.toLowerCase().includes(q));
  currentPage = 1; renderSongs(); toggleClearButton();
}

function toggleClearButton() {
  document.getElementById("clearBtn").style.display = (document.getElementById("searchBox").value || activeGenre) ? "inline-block" : "none";
}

function clearSearch() {
  document.getElementById("searchBox").value = "";
  filteredSongs = songs; currentPage = 1; activeGenre = null;
  document.querySelectorAll('.genre-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById("activeFilters").style.display = "none";
  renderSongs(); toggleClearButton();
  window.history.replaceState({}, document.title, window.location.pathname);
}

function filterArtist(artist) {
  activeGenre = null;
  document.querySelectorAll('.genre-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById("activeFilters").style.display = "none";
  document.getElementById("searchBox").value = artist;
  filteredSongs = songs.filter(s => s.artist === artist);
  currentPage = 1; renderSongs(); toggleClearButton();
  window.scrollTo({top:0,behavior:'smooth'});
}

function buildAlphabet() {
  const div = document.getElementById("alphabet"); div.innerHTML = "";
  "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(letter => {
    const b = document.createElement("button"); b.textContent = letter; b.className = "nav-btn";
    b.style.cssText = "padding:5px 9px;font-size:11px";
    b.onclick = () => jumpToLetter(letter); div.appendChild(b);
  });
}

function jumpToLetter(letter) {
  clearSearch();
  const idx = filteredSongs.findIndex(s => s.artist.toLowerCase().startsWith(letter.toLowerCase()));
  if (idx === -1) return;
  currentPage = Math.floor(idx / songsPerPage) + 1; renderSongs();
}

function buildArtistStats() {
  const map = {}; songs.forEach(s => { map[s.artist] = (map[s.artist]||0)+1; });
  const sorted = Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const list = document.getElementById("artistList");
  const sc   = document.getElementById("artistStats");
  list.innerHTML = "";
  sorted.forEach(([artist,count]) => {
    const row = document.createElement("div");
    row.textContent = artist + " (" + count + ")";
    row.onclick = () => filterArtist(artist);
    list.appendChild(row);
  });
  document.getElementById("artistToggle").onclick = () => {
    const hidden = list.style.display === "none" || list.style.display === "";
    sc.classList.remove("flame-effect"); void sc.offsetWidth; sc.classList.add("flame-effect");
    list.style.display = hidden ? "block" : "none";
    document.getElementById("artistToggle").querySelector('span:last-child').textContent = hidden ? "▼" : "▶";
  };
}

// ── FLAME BURST FEEDBACK ENGINE ──
function triggerFlameBurst(e) {
  const numParticles = 30;
  const x = e ? e.clientX : window.innerWidth / 2;
  const y = e ? e.clientY : window.innerHeight / 2;

  for (let i = 0; i < numParticles; i++) {
    const particle = document.createElement('div');
    particle.className = 'flame-particle';
    particle.style.left = `${x}px`;
    particle.style.top = `${y}px`;

    const angle = Math.random() * Math.PI * 2;
    const velocity = Math.random() * 90 + 30;
    const mx = Math.cos(angle) * velocity;
    const my = Math.sin(angle) * velocity - 40;

    particle.style.setProperty('--mx', `${mx}px`);
    particle.style.setProperty('--my', `${my}px`);

    document.body.appendChild(particle);
    setTimeout(() => particle.remove(), 600);
  }
}

async function requestSong(artist, song, event) {
  if (event) triggerFlameBurst(event);
  const cmd = `!request "${artist}" "${song}"`;
  try { 
    await navigator.clipboard.writeText(cmd); 
    console.log("Copied command: " + cmd);
  } catch { 
    console.log("Clipboard error for: " + cmd); 
  }
}

// ── RETRO ARCADE CAB ROULETTE RUNNER ──
function runSongRoulette() {
  if (!songs || !songs.length) return;
  
  const modal = document.getElementById("arcadeModal");
  const display = document.getElementById("rouletteText");
  modal.style.display = "flex";
  display.classList.remove("winner");

  let currentTick = 0;
  const totalTicks = 25; 
  let speed = 40; 

  function spin() {
    currentTick++;
    const randomTrack = songs[Math.floor(Math.random() * songs.length)];
    display.textContent = `${randomTrack.artist} - ${randomTrack.song}`;

    if (currentTick < totalTicks) {
      speed += currentTick * 0.8;
      setTimeout(spin, speed);
    } else {
      display.classList.add("winner");
      const safeArtist = randomTrack.artist.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      const safeSong = randomTrack.song.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      requestSong(safeArtist, safeSong, null);
    }
  }
  spin();
}

function closeArcadeModal() {
  document.getElementById("arcadeModal").style.display = "none";
}

function randomArtistFilter() {
  runSongRoulette();
}

function goHome() { clearSearch(); window.scrollTo({top:0,behavior:"smooth"}); }

init();
</script>
