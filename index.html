<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lazzarus Prime Rocksmith Requests</title>

<style>
body{
  font-family:Segoe UI,Arial;
  background:#0f0f0f;
  color:white;
  margin:0;
}

/* 🔥 TITLE BAR */
.titleBar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#141414;
  padding:12px;
  border-bottom:2px solid #222;
  flex-wrap:wrap;
}
.titleLeft{
  display:flex;
  align-items:center;
  gap:10px;
}
.titleBar img{
  width:40px;
}

/* 🔥 SOCIAL LINKS */
.socialLinks{
  display:flex;
  gap:15px;
  flex-wrap:wrap;
}
.socialLinks a{
  color:#aaa;
  text-decoration:none;
  font-size:14px;
  transition:.15s;
}
.socialLinks a:hover{
  color:#f1c40f;
  text-shadow:
    0 0 5px #f1c40f,
    0 0 10px #f1c40f,
    0 0 15px #f1c40f;
}

/* 🔥 TOP BAR */
.topBar{
  display:flex;
  gap:6px;
  padding:10px;
  background:#181818;
  position:sticky;
  top:0;
  z-index:100;
  flex-wrap:wrap;
  justify-content:center;
}
.topBar input{
  flex:1;
  padding:8px;
  border-radius:6px;
  border:none;
  min-width:180px;
}
.clearBtn{
  display:none;
  background:#333;
}
button{
  background:#272727;
  color:white;
  border:none;
  padding:7px 12px;
  border-radius:6px;
  cursor:pointer;
  transition:.15s;
}
button:hover{
  background:#444;
}

/* 🔹 ALPHABET NAV */
#alphabet{
  display:flex;
  flex-wrap:wrap;
  gap:5px;
  padding:10px;
  justify-content:center;
}

/* 🔹 SONG LIST */
.song{
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-bottom:1px solid #222;
  transition:.15s;
}
.songInfo{
  display:flex;
  flex-direction:column;
}

/* 🔹 UPDATED FONT STYLING */
.songTitle{
  font-weight:700;
  font-size:16px;
  color:#ffffff;  /* Song title in plain white */
}

.songArtist{
  font-size:14px;
  font-weight:600;
  color:#f1c40f; /* Amber color normally */
  cursor:pointer;
  transition:.2s;
}
.songArtist:hover{
  text-shadow:
    0 0 6px #f1c40f,
    0 0 12px #f1c40f,
    0 0 18px #f39c12;
  transform: scale(1.05);
}

/* 🔹 HIGHLIGHTED SONGS */
.song.highlight{
  background:#1a1a1a;
  box-shadow:0 0 6px rgba(241,196,15,.4);
}

#artistStats{
  padding:10px;
  background:#151515;
  border-top:1px solid #222;
  border-bottom:1px solid #222;
}

.pagination{
  padding:10px;
}
</style>
</head>

<body>

<!-- 🔥 TITLE BAR WITH GUITAR AND SOCIAL LINKS -->
<div class="titleBar">
  <div class="titleLeft">
    <img src="guitar.png">
    <h2>Lazzarus Prime Rocksmith Requests</h2>
  </div>
  <div class="socialLinks">
    <a href="https://www.twitch.tv/lazzarus_prime" target="_blank">🎸 Twitch</a>
    <a href="https://discord.gg/WCg5sktJNM" target="_blank">💬 Discord</a>
    <a href="https://lazzarus-prime-shop.fourthwall.com/" target="_blank">🛒 Merch</a>
    <a href="https://www.instagram.com/lazzarus__prime/" target="_blank">📸 Instagram</a>
    <a href="https://streamlabs.com/lazzarus_prime/tip" target="_blank">💰 Donations</a>
  </div>
</div>

<!-- 🔹 TOP BAR -->
<div class="topBar">
  <button onclick="goHome()">🏠 Home</button>
  <button onclick="window.location.href='artists.html'">🎤 Artists</button>
  <input id="searchBox" placeholder="Search artist or song..." oninput="handleSearchInput()">
  <button id="clearBtn" class="clearBtn" onclick="clearSearch()">✖</button>
  <button onclick="randomSong()">🎲 Random</button>
</div>

<!-- 🔹 ALPHABET NAV -->
<div id="alphabet"></div>

<!-- 🔹 STATS -->
<div id="stats"></div>

<div id="artistStats"></div>

<h3 style="padding:10px">Song Library</h3>

<!-- 🔹 PAGINATION TOP -->
<div id="paginationTop" class="pagination"></div>

<!-- 🔹 SONG LIST -->
<div id="songList"></div>

<!-- 🔹 PAGINATION BOTTOM -->
<div id="paginationBottom" class="pagination"></div>

<script>
// JS code remains the same as your previous index.html
// highlighting, filtering, pagination, search, requestSong, goHome...
</script>

</body>
</html>
