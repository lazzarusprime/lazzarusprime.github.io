<!DOCTYPE html>
<html>
<head>

<title>Lazzarus Prime Rocksmith Library</title>

<style>

body{
    font-family: Arial;
    background:#111;
    color:white;
    margin:40px;
}

h1{
    margin-bottom:10px;
}

.search-container{
    position:relative;
    width:320px;
    margin-bottom:20px;
}

#search{
    width:100%;
    padding:10px 35px 10px 10px;
    font-size:16px;
}

#clearSearch{
    position:absolute;
    right:8px;
    top:50%;
    transform:translateY(-50%);
    border:none;
    background:none;
    font-size:18px;
    cursor:pointer;
    color:#888;
    display:none;
}

#clearSearch:hover{
    color:white;
}

.song{
    padding:6px;
    border-bottom:1px solid #333;
}

.artist{
    color:#6cf;
}

details{
    margin-top:20px;
}

summary{
    cursor:pointer;
    font-size:18px;
}

.topArtist{
    padding:4px;
}

</style>

</head>

<body>

<h1>Lazzarus Prime Rocksmith Library</h1>

<div id="songCount">Loading...</div>

<br>

<div class="search-container">

<input 
type="text"
id="search"
placeholder="Search artist or song..."
oninput="filterSongs()"
/>

<button id="clearSearch" onclick="clearSearch()">✕</button>

</div>

<div id="songList"></div>

<details id="topArtistsSection">
<summary>Top Artists in Library</summary>
<div id="topArtists"></div>
</details>

<script>

let songs=[]
let filteredSongs=[]

async function loadSongs(){

    const response = await fetch("songs.json")
    songs = await response.json()

    songs.sort((a,b)=>{

        if(a.artist==b.artist)
            return a.song.localeCompare(b.song)

        return a.artist.localeCompare(b.artist)

    })

    filteredSongs=songs

    renderSongs()
    renderTopArtists()

    document.getElementById("songCount").innerText =
        songs.length + " songs in library"

}

function renderSongs(){

    const container=document.getElementById("songList")

    container.innerHTML=""

    filteredSongs.forEach(song=>{

        const div=document.createElement("div")
        div.className="song"

        div.innerHTML =
            "<span class='artist'>"+
            song.artist+
            "</span> - "+
            song.song

        container.appendChild(div)

    })

}

function filterSongs(){

    const search =
        document.getElementById("search")
        .value
        .toLowerCase()

    if(search===""){

        filteredSongs=songs

    }else{

        filteredSongs=songs.filter(song=>

            song.artist.toLowerCase().includes(search) ||
            song.song.toLowerCase().includes(search)

        )

    }

    renderSongs()

}

function clearSearch(){

    const input=document.getElementById("search")

    input.value=""
    filterSongs()

    document.getElementById("clearSearch").style.display="none"

}

document
.getElementById("search")
.addEventListener("input",function(){

    const clearBtn=document.getElementById("clearSearch")

    clearBtn.style.display =
        this.value.length ? "block" : "none"

})

function renderTopArtists(){

    const counts={}

    songs.forEach(song=>{

        if(!counts[song.artist])
            counts[song.artist]=0

        counts[song.artist]++

    })

    const sorted =
        Object.entries(counts)
        .sort((a,b)=>b[1]-a[1])
        .slice(0,25)

    const container=document.getElementById("topArtists")

    container.innerHTML=""

    sorted.forEach(a=>{

        const div=document.createElement("div")

        div.className="topArtist"

        div.innerText=
            a[0]+" ("+a[1]+" songs)"

        container.appendChild(div)

    })

}

loadSongs()

</script>

</body>
</html>
