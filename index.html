<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lazzarus Prime Rocksmith Requests</title>
<link rel="stylesheet" href="style.css">
<style>
body { background:#111; color:#fff; font-family:sans-serif; }
.collapsible { background:#222; color:white; cursor:pointer; padding:10px; border:none; width:100%; text-align:left; outline:none; margin:2px 0;}
.collapsible:after { content:'\25B6'; float:right; }
.collapsible.active:after { content:'\25BC'; }
.content { display:none; padding:0 10px; background:#111; overflow:hidden; }
.top-artist { cursor:pointer; color:#0f9; margin:2px 0; }
.song { padding:5px 0; border-bottom:1px solid #333; }
</style>
</head>
<body>

<h1>Lazzarus Prime Rocksmith Requests</h1>

<!-- Collapsible Panels -->
<button class="collapsible">🎸 Top Artists In Library</button>
<div class="content" id="topArtistsPanel"></div>

<button class="collapsible">⭐ Viewer Voting on Songs</button>
<div class="content" id="viewerVotingPanel"></div>

<button class="collapsible">⭐ Most Requested Songs</button>
<div class="content" id="mostRequestedPanel"></div>

<button class="collapsible">⭐ Recently Played Songs</button>
<div class="content" id="recentlyPlayedPanel"></div>

<button class="collapsible">🎨 Filters</button>
<div class="content">
    <div id="artistFilters"></div>
    <div id="genreFilters"></div>
</div>

<h2 id="libraryHeader">Song Library</h2>
<div id="songList"></div>

<script>
// Collapsible logic
document.querySelectorAll('.collapsible').forEach(btn=>{
    btn.addEventListener('click', ()=>{
        btn.classList.toggle('active');
        const content = btn.nextElementSibling;
        content.style.display = content.style.display==="block"?"none":"block";
    });
});

// Load songs.json
let songs = [];
fetch('songs.json')
  .then(res=>res.json())
  .then(data=>{
      songs = data;
      renderLibrary();
      renderTopArtists();
      renderFilters();
  });

// Render song library
function renderLibrary(){
    const list = document.getElementById('songList');
    list.innerHTML = "";
    songs.forEach(s=>{
        const div = document.createElement('div');
        div.className = "song";
        div.dataset.artist = s.artist;
        div.innerHTML = `<img src="${s.albumArt}" width=50 style="vertical-align:middle;"> <b>${s.artist}</b> - ${s.song}`;
        list.appendChild(div);
    });
}

// Render top artists panel
function renderTopArtists(){
    const panel = document.getElementById('topArtistsPanel');
    panel.innerHTML = "";
    // count songs per artist
    const artistCounts = {};
    songs.forEach(s=>artistCounts[s.artist] = (artistCounts[s.artist]||0)+1);
    const sorted = Object.keys(artistCounts).sort((a,b)=>artistCounts[b]-artistCounts[a]);
    sorted.slice(0,10).forEach(a=>{
        const div = document.createElement('div');
        div.className="top-artist";
        div.innerText = `${a} (${artistCounts[a]})`;
        div.onclick = ()=> scrollToArtist(a);
        panel.appendChild(div);
    });
}

function scrollToArtist(artist){
    const first = document.querySelector(`.song[data-artist="${artist}"]`);
    if(first) first.scrollIntoView({behavior:'smooth', block:'start'});
}

// Placeholder: viewer voting, most requested, recently played
function renderFilters(){
    const artistF = document.getElementById('artistFilters');
    const genreF = document.getElementById('genreFilters');
    // unique artists
    const artists = [...new Set(songs.map(s=>s.artist))].sort();
    artistF.innerHTML = "<b>Artist Filters:</b> "+artists.join(", ");
    // unique genres
    const genres = [...new Set(songs.map(s=>s.genre))].sort();
    genreF.innerHTML = "<b>Genre Filters:</b> "+genres.join(", ");
}
</script>

</body>
</html>
