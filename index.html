<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lazzarus Prime Rocksmith Requests</title>
    
    <!-- Using the standard Google APIs CDN (Highest trust level) -->
    <script src="https://www.gstatic.com"></script>
    <script src="https://www.gstatic.com"></script>

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com" rel="stylesheet">
</head>
<body>

    <div class="titleBar">
        <img src="guitar.png" class="titleGuitar" alt="Guitar">
        <h1>Lazzarus Prime Rocksmith Requests</h1>
    </div>

    <div class="topBar">
        <button onclick="goHome()">🏠 Home</button>
        <input id="searchBox" placeholder="Search artist or song..." onkeyup="searchSongs()">
        <button onclick="randomSong()">🎲 Random Song</button>
    </div>

    <div id="alphabet"></div>
    <div id="stats">Initializing...</div>

    <h2>Song Library</h2>
    <div id="songList"></div>
    <div id="pagination"></div>

    <h2>Request Queue</h2>
    <div id="queue"></div>

    <script>
        const firebaseConfig = {
            databaseURL: "https://rocksmith-requests-default-rtdb.firebaseio.com"
        };

        let db;
        let songs = [];
        let filteredSongs = [];
        let currentPage = 1;
        const songsPerPage = 25;

        // Use a simpler, faster check
        function startApp() {
            if (window.firebase && window.firebase.database) {
                console.log("Firebase found!");
                if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                db = firebase.database();
                loadSongs();
                listenQueue();
            } else {
                console.warn("Firebase still loading...");
                setTimeout(startApp, 500);
            }
        }

        async function loadSongs() {
            try {
                // Added a cache-buster to bypass CORB/Cache issues
                const response = await fetch("songs.json?v=" + Date.now());
                if (!response.ok) throw new Error("songs.json 404");
                songs = await response.json();
                filteredSongs = songs;
                buildAlphabet();
                renderSongs();
                document.getElementById("stats").innerText = songs.length + " songs loaded";
            } catch (e) {
                document.getElementById("stats").innerText = "Data Load Error: " + e.message;
            }
        }

        function listenQueue() {
            db.ref("queue").on("value", (s) => {
                const data = s.val();
                const div = document.getElementById("queue");
                div.innerHTML = "";
                if (!data) return;
                Object.values(data).forEach((song, i) => {
                    let item = document.createElement("div");
                    item.className = "queueItem";
                    item.innerText = (i + 1) + ". " + song.artist + " - " + song.song;
                    div.appendChild(item);
                });
            });
        }

        function requestSong(artist, song) {
            if (!db) return alert("DB not ready");
            let text = artist + " - " + song;
            navigator.clipboard.writeText("!sr " + text);
            db.ref("queue").push({ artist, song })
                .then(() => alert("Added: " + text))
                .catch(e => alert("Error: " + e.message));
        }

        function renderSongs() {
            const list = document.getElementById("songList");
            list.innerHTML = "";
            let start = (currentPage - 1) * songsPerPage;
            let end = start + songsPerPage;
            let pageSongs = filteredSongs.slice(start, end);
            pageSongs.forEach(song => {
                const div = document.createElement("div");
                div.className = "song";
                const sA = song.artist.replace(/'/g, "\\'");
                const sS = song.song.replace(/'/g, "\\'");
                div.innerHTML = `<span><b>${song.artist}</b> - ${song.song}</span>
                                <button onclick="requestSong('${sA}', '${sS}')">Request</button>`;
                list.appendChild(div);
            });
            renderPagination();
        }

        function renderPagination() {
            const div = document.getElementById("pagination");
            div.innerHTML = "";
            let totalPages = Math.ceil(filteredSongs.length / songsPerPage) || 1;
            if (currentPage > 1) {
                let btn = document.createElement("button");
                btn.innerText = "Prev";
                btn.onclick = () => { currentPage--; renderSongs(); };
                div.appendChild(btn);
            }
            let s = document.createElement("span");
            s.innerText = ` Page ${currentPage} / ${totalPages} `;
            div.appendChild(s);
            if (currentPage < totalPages) {
                let btn = document.createElement("button");
                btn.innerText = "Next";
                btn.onclick = () => { currentPage++; renderSongs(); };
                div.appendChild(btn);
            }
        }

        function searchSongs() {
            let q = document.getElementById("searchBox").value.toLowerCase();
            filteredSongs = songs.filter(s => s.artist.toLowerCase().includes(q) || s.song.toLowerCase().includes(q));
            currentPage = 1;
            renderSongs();
        }

        function buildAlphabet() {
            const div = document.getElementById("alphabet");
            div.innerHTML = "";
            "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(l => {
                let b = document.createElement("button");
                b.innerText = l;
                b.onclick = () => jumpToLetter(l);
                div.appendChild(b);
            });
        }

        function jumpToLetter(l) {
            const idx = filteredSongs.findIndex(s => s.artist.toLowerCase().startsWith(l.toLowerCase()));
            if (idx === -1) return;
            currentPage = Math.floor(idx / songsPerPage) + 1;
            renderSongs();
        }

        function randomSong() {
            if (!songs.length) return;
            let s = songs[Math.floor(Math.random() * songs.length)];
            alert(s.artist + " - " + s.song);
        }

        function goHome() {
            document.getElementById("searchBox").value = "";
            filteredSongs = songs;
            currentPage = 1;
            renderSongs();
        }

        // Start checking
        startApp();
    </script>
</body>
</html>
