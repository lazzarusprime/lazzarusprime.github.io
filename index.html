<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rocksmith Requests</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="topBar">
        <h1>Rocksmith Song Requests</h1>
        <input type="text" id="search" placeholder="Search artist or song..." oninput="filterSongs()">
    </div>

    <div id="songList" class="song-list"></div>

    <div class="queue-section" style="background: #111; padding: 20px; border-top: 2px solid #333; margin-top:20px;">
        <h3>Current Queue</h3>
        <div id="queue">Loading...</div>
    </div>

    <script>
        // Updated to include .json for Firebase REST compatibility
        const DB_URL = "https://lazzarus-prime-default-rtdb.firebaseio.com/queue.json"; 
        let allSongs = [];

        async function loadSongs() {
            const res = await fetch('songs.json');
            allSongs = await res.json();
            displaySongs(allSongs);
        }

        function displaySongs(songs) {
            const list = document.getElementById("songList");
            list.innerHTML = "";
            songs.slice(0, 50).forEach(s => {
                const div = document.createElement("div");
                div.className = "song";
                div.innerHTML = `<span>${s.artist} - ${s.song}</span> 
                                <button onclick="requestSong('${s.artist.replace(/'/g, "\\'")}', '${s.song.replace(/'/g, "\\')}')')">Request</button>`;
                list.appendChild(div);
            });
        }

        function filterSongs() {
            const term = document.getElementById("search").value.toLowerCase();
            const filtered = allSongs.filter(s => 
                s.artist.toLowerCase().includes(term) || s.song.toLowerCase().includes(term)
            );
            displaySongs(filtered);
        }

        async function requestSong(artist, song) {
            const command = `!sr ${artist} - ${song}`;
            try {
                // Removed 'no-cors' so we can actually see if the save succeeded
                const response = await fetch(DB_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ artist, song })
                });

                if (response.ok) {
                    await navigator.clipboard.writeText(command);
                    alert("Requested! Copied to clipboard: " + command);
                    loadQueue();
                }
            } catch (err) {
                console.error("Save failed:", err);
            }
        }

        async function loadQueue() {
            try {
                const res = await fetch(DB_URL);
                const data = await res.json();
                const div = document.getElementById("queue");
                div.innerHTML = "";
                if (!data) { div.innerText = "Queue is empty"; return; }

                // Firebase returns an object of objects, so we iterate through values
                Object.values(data).forEach((s, i) => {
                    const item = document.createElement("div");
                    item.style.padding = "5px";
                    item.innerText = `${i + 1}. ${s.artist} - ${s.song}`;
                    div.appendChild(item);
                });
            } catch (e) {}
        }

        loadSongs();
        loadQueue();
        setInterval(loadQueue, 5000);
    </script>
</body>
</html>
