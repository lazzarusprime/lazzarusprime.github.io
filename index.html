<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lazzarus Prime Rocksmith Requests</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>
    <div class="topBar">
        <h1>Rocksmith Song Requests</h1>
        <input type="text" id="search" placeholder="Search artist or song..." oninput="filterSongs()">
    </div>

    <div id="songList" class="song-list"></div>

    <div class="queue-section" style="background: #111; padding: 20px; border-top: 2px solid #333; margin-top:20px;">
        <h3>Current Queue</h3>
        <div id="queue">Loading...</div>
    </div>

    <script>
        const firebaseConfig = {
            databaseURL: "https://lazzarus-prime-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allSongs = [];

        async function loadSongs() {
            const res = await fetch('songs.json');
            allSongs = await res.json();
            displaySongs(allSongs);
        }

        function displaySongs(songs) {
            const list = document.getElementById("songList");
            list.innerHTML = "";
            songs.slice(0, 50).forEach(s => {
                const div = document.createElement("div");
                div.className = "song";
                div.innerHTML = `<span>${s.artist} - ${s.song}</span> 
                                <button onclick="requestSong('${s.artist.replace(/'/g, "\\'")}', '${s.song.replace(/'/g, "\\')}')')">Request</button>`;
                list.appendChild(div);
            });
        }

        function filterSongs() {
            const term = document.getElementById("search").value.toLowerCase();
            const filtered = allSongs.filter(s => 
                s.artist.toLowerCase().includes(term) || s.song.toLowerCase().includes(term)
            );
            displaySongs(filtered);
        }

        function requestSong(artist, song) {
            const command = `!sr ${artist} - ${song}`;
            
            // Using SDK push() instead of fetch POST
            db.ref("queue").push({
                artist: artist,
                song: song,
                timestamp: Date.now()
            }).then(() => {
                navigator.clipboard.writeText(command);
                alert("Requested! Copied to clipboard: " + command);
            }).catch(err => {
                console.error("Save failed:", err);
                alert("Database Error. Check console.");
            });
        }

        // Live-update queue display using SDK
        db.ref("queue").on("value", (snap) => {
            const data = snap.val();
            const div = document.getElementById("queue");
            div.innerHTML = "";
            if (!data) { div.innerText = "Queue is empty"; return; }

            Object.values(data).forEach((s, i) => {
                const item = document.createElement("div");
                item.style.padding = "5px";
                item.innerText = `${i + 1}. ${s.artist} - ${s.song}`;
                div.appendChild(item);
            });
        });

        loadSongs();
    </script>
</body>
</html>
