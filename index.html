<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Artists - Lazzarus Prime</title>

  <style>
    body {
      background: #050505;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
    }

    h1 {
      margin: 20px;
      color: #ff3c00;
      text-shadow: 0 0 10px #ff3c00;
    }

    .top-bar {
      margin: 10px;
    }

    .top-bar a {
      color: #ff3c00;
      text-decoration: none;
      font-weight: bold;
    }

    .artist-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .artist-card {
      background: #0b0b0b;
      border: 2px solid #ff3c00;
      border-radius: 12px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.2s ease-in-out;
      box-shadow: 0 0 10px #ff3c00;
    }

    .artist-card:hover {
      transform: scale(1.05);
      background: #ff3c00;
      color: black;
      box-shadow: 
        0 0 20px #ff3c00,
        0 0 40px #ff3c00,
        0 0 60px #ff3c00;
    }

    .artist-name {
      font-size: 18px;
      font-weight: bold;
    }

    .song-count {
      font-size: 12px;
      opacity: 0.7;
      margin-top: 5px;
    }

    .search-box {
      margin: 15px;
    }

    input {
      padding: 8px;
      width: 200px;
      border-radius: 6px;
      border: none;
    }

    button {
      margin-left: 5px;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      background: #ff3c00;
      color: black;
      cursor: pointer;
    }

  </style>
</head>

<body>

  <div class="top-bar">
    <a href="index.html">⬅ Back to Songs</a>
  </div>

  <h1>🎸 Artists</h1>

  <div class="search-box">
    <input type="text" id="search" placeholder="Search artist...">
    <button onclick="randomArtist()">🎲 Random</button>
  </div>

  <div class="artist-grid" id="artistGrid"></div>

  <script>
    // 🔥 IMPORTANT: Replace this with your REAL song data source
    // Example: fetch from your JSON instead
    const songs = window.songs || [
      { artist: "Metallica", song: "Enter Sandman" },
      { artist: "metallica", song: "Nothing Else Matters" },
      { artist: "Metalica", song: "One" },
      { artist: "Foo Fighters", song: "Everlong" },
      { artist: "foo fighters ", song: "The Pretender" },
      { artist: "Green Day", song: "Basket Case" },
      { artist: "GreenDay", song: "Holiday" }
    ];

    // 🔹 CENTRAL CLEANUP MAP (EDIT THIS OVER TIME)
    const artistFixes = {
      "metalica": "Metallica",
      "metallica ": "Metallica",
      "foo fighters ": "Foo Fighters",
      "greenday": "Green Day",
      "acdc": "AC/DC",
      "ac/dc": "AC/DC",
      "guns n roses": "Guns N' Roses"
    };

    function normalizeArtist(name) {
      if (!name) return "Unknown";

      let cleaned = name.trim().toLowerCase();
      cleaned = cleaned.replace(/\s+/g, " ");

      if (artistFixes[cleaned]) {
        return artistFixes[cleaned];
      }

      return cleaned.replace(/\b\w/g, c => c.toUpperCase());
    }

    // 🔹 BUILD CLEAN ARTIST MAP
    const artistMap = {};

    songs.forEach(s => {
      const cleanArtist = normalizeArtist(s.artist);

      if (!artistMap[cleanArtist]) {
        artistMap[cleanArtist] = 0;
      }

      artistMap[cleanArtist]++;
    });

    const grid = document.getElementById("artistGrid");

    function renderArtists(filter = "") {
      grid.innerHTML = "";

      Object.keys(artistMap)
        .filter(a => a.toLowerCase().includes(filter.toLowerCase()))
        .sort((a, b) => a.localeCompare(b))
        .forEach(artist => {

          const card = document.createElement("div");
          card.className = "artist-card";

          card.innerHTML = `
            <div class="artist-name">${artist}</div>
            <div class="song-count">${artistMap[artist]} songs</div>
          `;

          card.onclick = () => {
            window.location.href = `index.html?artist=${encodeURIComponent(artist)}`;
          };

          grid.appendChild(card);
        });
    }

    // 🔹 SEARCH
    document.getElementById("search").addEventListener("input", (e) => {
      renderArtists(e.target.value);
    });

    // 🔹 RANDOM BUTTON
    function randomArtist() {
      const artists = Object.keys(artistMap);
      const random = artists[Math.floor(Math.random() * artists.length)];
      window.location.href = `index.html?artist=${encodeURIComponent(random)}`;
    }

    // 🔹 INITIAL RENDER
    renderArtists();

  </script>

</body>
</html>
