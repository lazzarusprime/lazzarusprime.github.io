<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lazzarus Prime Rocksmith Requests</title>
<style>
body{ font-family:Segoe UI,Arial; background:#0f0f0f; color:white; margin:0; }
.titleBar{ display:flex; justify-content:space-between; align-items:center; background:#141414; padding:12px; border-bottom:2px solid #222; flex-wrap:wrap; }
.titleLeft{ display:flex; align-items:center; gap:10px; }
.titleBar img{ width:40px; }

/* METALLIC HEADER TEXT */
.titleLeft h2 { 
  margin: 0; 
  font-weight: 900; 
  text-transform: uppercase; 
  background: linear-gradient(to bottom, #fff 20%, #f1c40f 45%, #b8860b 85%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 5px rgba(241, 196, 15, 0.6));
}

.socialLinks{ display:flex; gap:15px; flex-wrap:wrap; }
.socialLinks a{ color:#aaa; text-decoration:none; font-size:14px; transition:.15s; }
.socialLinks a:hover{ color:#f1c40f; text-shadow:0 0 5px #f1c40f; }

.topBar{ display:flex; gap:8px; padding:12px; background:#181818; position:sticky; top:0; z-index:100; flex-wrap:wrap; justify-content:center; align-items:center; border-bottom: 1px solid #333; }
.topBar input{ flex:1; padding:10px; border-radius:6px; border:none; min-width:180px; background: white; color: black; font-size: 14px; }

/* PROMINENT NAVIGATION BUTTONS */
.nav-btn { 
  background:#2a2a2a; 
  color:white; 
  border:1px solid #444; 
  padding:10px 18px; 
  border-radius:6px; 
  cursor:pointer; 
  font-weight: 700; 
  text-transform: uppercase;
  font-size: 13px;
  transition: .2s;
}
.nav-btn:hover { background:#444; border-color: #f1c40f; color: #f1c40f; }

/* ORIGINAL BUTTON STYLE (Used for Request Button) */
button{ background:#272727; color:white; border:none; padding:7px 12px; border-radius:6px; cursor:pointer; }
button:hover{ background:#444; }

#alphabet{ display:flex; flex-wrap:wrap; gap:5px; padding:10px; justify-content:center; }
.song{ display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #222; transition:.15s; }
.songInfo{ display:flex; flex-direction:column; }
.songTitle{ font-weight:700; font-size:16px; color:#ffffff; }
.songArtist{ font-size:14px; font-weight:600; color:#f1c40f; cursor:pointer; transition:.15s; }
.songArtist:hover{ text-shadow:0 0 4px #f1c40f; transform:scale(1.02); }
.song.highlight{ background:#1a1a1a; box-shadow:0 0 6px rgba(241,196,15,.4); }

/* ARTIST STATS & FLAME ANIMATION */
#artistStats{ margin: 10px 0; background:#151515; border-top:1px solid #222; border-bottom:1px solid #222; transition: 0.3s; }
#artistToggle{ cursor:pointer; margin:0; padding: 10px; }
#artistList{ display:none; padding: 10px; border-top: 1px solid #222; animation: slideDown 0.3s ease-out; }
@keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
#artistList div{ padding:4px 0; cursor:pointer; transition:.15s; }
#artistList div:hover{ color:#f1c40f; padding-left: 5px; }

.flame-effect { animation: warmPulse 0.6s ease-out; }
@keyframes warmPulse {
  0% { box-shadow: 0 0 0px transparent; }
  50% { box-shadow: inset 0 0 30px rgba(241, 196, 15, 0.15); border-color: #f1c40f; }
  100% { box-shadow: 0 0 0px transparent; }
}

.pagination{ padding:15px; text-align:center; background: #111; border-bottom: 1px solid #222; }
.clearBtn{ display:none; background:#333; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; }
</style>
</head>
<body>

<div class="titleBar">
  <div class="titleLeft">
    <img src="guitar.png">
    <h2>Lazzarus Prime Rocksmith Requests</h2>
  </div>
  <div class="socialLinks">
    <a href="https://www.twitch.tv/lazzarus_prime" target="_blank">🎸 Twitch</a>
    <a href="https://discord.gg/WCg5sktJNM" target="_blank">💬 Discord</a>
    <a href="https://lazzarus-prime-shop.fourthwall.com/" target="_blank">👕 Merch</a>
    <a href="https://www.instagram.com/lazzarus__prime/" target="_blank">📸 Instagram</a>
    <a href="https://streamlabs.com/lazzarus_prime/tip" target="_blank">💰 Donations</a>
  </div>
</div>

<div class="topBar">
  <button class="nav-btn" onclick="goHome()">🏠 Home</button>
  <button class="nav-btn" onclick="window.location.href='artists.html'">🎸 Artists</button>
  <button class="nav-btn" onclick="randomArtistFilter()">🎲 Random</button>
  <input id="searchBox" placeholder="Search artist or song..." oninput="handleSearchInput()">
  <button id="clearBtn" class="clearBtn" onclick="clearSearch()">✖</button>
</div>

<div id="alphabet"></div>

<div id="artistStats">
  <h3 id="artistToggle"><span>🎸 Top Artists In Library</span> <span style="float:right">▶</span></h3>
  <div id="artistList"></div>
</div>

<div id="paginationTop" class="pagination"></div>

<h3 style="padding:10px">Song Library</h3>
<div id="songList"></div>

<div id="paginationBottom" class="pagination"></div>

<script>
let songs=[], filteredSongs=[], currentPage=1, songsPerPage=40;

async function init(){
  try {
    const response=await fetch("songs.json");
    songs=await response.json();
    filteredSongs=songs;

    const urlParams = new URLSearchParams(window.location.search);
    const artistSearch = urlParams.get('search');
    if(artistSearch) {
      document.getElementById("searchBox").value = artistSearch;
      filteredSongs = songs.filter(s => s.artist === artistSearch);
      toggleClearButton();
    }

    buildAlphabet();
    buildArtistStats();
    renderSongs();
  } catch(e) { console.error("Load error:", e); }
}

function renderSongs(){
  const list=document.getElementById("songList")
  list.innerHTML=""
  let start=(currentPage-1)*songsPerPage
  let pageSongs=filteredSongs.slice(start,start+songsPerPage)
  pageSongs.forEach(song=>{
    const div=document.createElement("div")
    div.className="song"
    div.dataset.artist=song.artist
    div.innerHTML=`
      <div class="songInfo">
        <div class="songTitle">${song.song}</div>
        <div class="songArtist" onmouseenter="highlightArtist('${song.artist}')" onmouseleave="clearHighlight()" onclick="filterArtist('${song.artist}')">${song.artist}</div>
      </div>
      <button onclick="requestSong('${song.artist}','${song.song}')">Request</button>
    `;
    list.appendChild(div);
  })
  renderPagination();
}

function highlightArtist(artist){
  document.querySelectorAll(".song").forEach(song=>{ if(song.dataset.artist===artist) song.classList.add("highlight") })
}
function clearHighlight(){
  document.querySelectorAll(".song").forEach(song=>song.classList.remove("highlight"))
}

function renderPagination(){
  const totalPages=Math.ceil(filteredSongs.length/songsPerPage)||1;
  const top = document.getElementById("paginationTop");
  const bottom = document.getElementById("paginationBottom");
  
  [top, bottom].forEach(container => {
    container.innerHTML = "";
    if(currentPage > 1){
      let prev = document.createElement("button");
      prev.innerText = "◀ Prev";
      prev.className = "nav-btn";
      prev.style.padding = "6px 12px";
      prev.onclick = () => { currentPage--; renderSongs(); window.scrollTo(0,0); };
      container.appendChild(prev);
    }
    let label = document.createElement("span");
    label.innerText = ` Page ${currentPage} / ${totalPages} `;
    container.appendChild(label);
    if(currentPage < totalPages){
      let next = document.createElement("button");
      next.innerText = "Next ▶";
      next.className = "nav-btn";
      next.style.padding = "6px 12px";
      next.onclick = () => { currentPage++; renderSongs(); window.scrollTo(0,0); };
      container.appendChild(next);
    }
  });
}

function handleSearchInput(){
  const q=document.getElementById("searchBox").value.toLowerCase()
  filteredSongs=songs.filter(s=>s.artist.toLowerCase().includes(q)||s.song.toLowerCase().includes(q))
  currentPage=1
  renderSongs()
  toggleClearButton()
}

function toggleClearButton(){
  document.getElementById("clearBtn").style.display=document.getElementById("searchBox").value?"inline-block":"none"
}

function clearSearch(){
  document.getElementById("searchBox").value=""
  filteredSongs=songs
  currentPage=1
  renderSongs()
  toggleClearButton()
  window.history.replaceState({}, document.title, window.location.pathname);
}

function filterArtist(artist){
  document.getElementById("searchBox").value=artist
  filteredSongs=songs.filter(s=>s.artist===artist)
  currentPage=1
  renderSongs()
  toggleClearButton()
  window.scrollTo({top:0, behavior: 'smooth'});
}

function buildAlphabet(){
  const div=document.getElementById("alphabet")
  div.innerHTML=""
  "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(letter=>{
    let b=document.createElement("button")
    b.innerText=letter
    b.className = "nav-btn";
    b.style.padding = "6px 10px";
    b.style.fontSize = "11px";
    b.onclick=()=>jumpToLetter(letter)
    div.appendChild(b)
  })
}

function jumpToLetter(letter){
  clearSearch();
  const idx=filteredSongs.findIndex(s=>s.artist.toLowerCase().startsWith(letter.toLowerCase()))
  if(idx===-1) return
  currentPage=Math.floor(idx/songsPerPage)+1
  renderSongs()
}

function buildArtistStats(){
  const map={}
  songs.forEach(s=>{if(!map[s.artist]) map[s.artist]=0; map[s.artist]++})
  const sorted=Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,10)
  const list=document.getElementById("artistList")
  const statsContainer = document.getElementById("artistStats");
  list.innerHTML=""
  sorted.forEach(([artist,count])=>{
    let row=document.createElement("div")
    row.innerText=artist+" ("+count+")"
    row.onclick=()=>filterArtist(artist)
    list.appendChild(row)
  })
  document.getElementById("artistToggle").onclick=()=>{
    const isHidden = list.style.display==="none"||list.style.display===""
    
    // Trigger Flame Animation
    statsContainer.classList.remove("flame-effect");
    void statsContainer.offsetWidth; 
    statsContainer.classList.add("flame-effect");
    
    list.style.display=isHidden?"block":"none"
    document.getElementById("artistToggle").querySelector('span:last-child').innerText=isHidden?"▼":"▶"
  }
}

async function requestSong(artist,song){
  const command=`!request "${artist}" "${song}"`
  try{await navigator.clipboard.writeText(command);alert("Copied to clipboard!\n\nPaste in Twitch chat:\n"+command)}
  catch{alert("Type in chat:\n"+command)}
}

function randomArtistFilter(){
  if(!songs.length)return;
  const uniqueArtists = [...new Set(songs.map(s => s.artist))];
  const random = uniqueArtists[Math.floor(Math.random()*uniqueArtists.length)];
  filterArtist(random);
}

function goHome(){clearSearch();window.scrollTo({top:0,behavior:"smooth"})}

init()
</script>
</body>
</html>
