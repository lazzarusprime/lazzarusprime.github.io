<!DOCTYPE html>
<html>

<head>

<title>Lazzarus_Prime's Song Library</title>

<link rel="stylesheet" href="style.css">
<script src="script.js"></script>

</head>

<body>

<h1>🔥 LAZZARUS_PRIME'S SONG LIBRARY 🔥</h1>

<p>Search songs available during stream</p>

<input id="search" placeholder="Search artist or song..." />

<table id="songTable">
<thead>
<tr>
<th>Artist</th>
<th>Song</th>
<th>Tuning</th>
<th>Request</th>
</tr>
</thead>
<tbody></tbody>
</table>

<div class="request">

<h2>🎸 Request a Song</h2>

<p>Use Twitch chat:</p>

<p class="command">!songrequest SONG NAME</p>

<p>Example:</p>

<p class="example">!songrequest Everlong</p>

</div>

</body>
</html>
