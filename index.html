// ── Song name cleaner ─────────────────────────────────────────────────────────
function cleanSongName(raw) {
  // Handle format: Artist_Song-Name_v1_p or "Song Name (variant)_p"
  const str = raw.replace(/\.(cdlc|rs2014|psarc)$/i, '');
  
  // If it looks like "Song Name (BLR)_p" with no underscored-artist prefix
  if (/^\w[^_]+ \([A-Z]+\)_p$/.test(str)) {
    return str.replace(/_p$/, '').replace(/\s*\([^)]+\)\s*$/, '').trim();
  }
  
  const parts = str.split('_');
  if (parts.length < 2) return str.replace(/-/g, ' ');
  
  // Skip first part (artist slug), gather song name parts until version/metadata
  let songParts = [];
  for (let i = 1; i < parts.length; i++) {
    const p = parts[i];
    // Stop at version markers or known metadata tokens
    if (/^v\d/i.test(p) || /^(DD|p|bass|lead|rhythm|BL|BR|BLR|BLRV|BV|LV|LR|TS|syvaa|Syvaa|altamont|Altamont|SlickWilly|LtP)$/i.test(p)) break;
    if (/^\d+$/.test(p) && i > 1) break; // bare number like _0_ _1_
    songParts.push(p);
  }
  
  let name = songParts.join(' ').replace(/-/g, ' ');
  // Clean trailing/leading parens artifacts
  name = name.replace(/\s*\([A-Z]{1,4}\)\s*$/, '').trim();
  // Clean up orphan punctuation
  name = name.replace(/\s+/g, ' ').trim();
  
  return name || raw;
}

// ── Genre lookup ──────────────────────────────────────────────────────────────
const artistGenreCache = {};
function getArtistGenre(artist) {
  if (artistGenreCache[artist] !== undefined) return artistGenreCache[artist];
  const lower = artist.toLowerCase();
  for (const [genre, list] of Object.entries(GENRE_MAP)) {
    if (list.some(a => lower.includes(a.toLowerCase()) || a.toLowerCase().includes(lower))) {
      artistGenreCache[artist] = genre;
      return genre;
    }
  }
  artistGenreCache[artist] = null;
  return null;
}

// ── App State ─────────────────────────────────────────────────────────────────
let songs = [], filteredSongs = [], currentPage = 1, songsPerPage = 40;
let activeGenre = null;

async function init() {
  try {
    const response = await fetch("songs.json");
    songs = await response.json();
    // Pre-clean all song names
    songs = songs.map(s => ({ ...s, displayName: cleanSongName(s.song) }));
    filteredSongs = songs;

    const urlParams = new URLSearchParams(window.location.search);
    const artistSearch = urlParams.get('search');
    if (artistSearch) {
      document.getElementById("searchBox").value = artistSearch;
      filteredSongs = songs.filter(s => s.artist === artistSearch);
      toggleClearButton();
    }

    buildGenreBar();
    buildAlphabet();
    buildArtistStats();
    renderSongs();
  } catch(e) { console.error("Load error:", e); }
}

function buildGenreBar() {
  const bar = document.getElementById("genreBar");
  bar.innerHTML = "";
  for (const genre of Object.keys(GENRE_MAP)) {
    const btn = document.createElement("button");
    btn.className = "genre-btn";
    btn.textContent = genre;
    btn.onclick = () => toggleGenre(genre, btn);
    bar.appendChild(btn);
  }
}

function toggleGenre(genre, btn) {
  if (activeGenre === genre) {
    // Deactivate
    activeGenre = null;
    document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
    clearSearch();
    return;
  }
  activeGenre = genre;
  document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById("searchBox").value = "";
  
  const genreArtists = GENRE_MAP[genre].map(a => a.toLowerCase());
  filteredSongs = songs.filter(s => {
    const lower = s.artist.toLowerCase();
    return genreArtists.some(g => lower.includes(g) || g.includes(lower));
  });
  currentPage = 1;
  
  // Show filter label
  const af = document.getElementById("activeFilters");
  af.style.display = "block";
  document.getElementById("filterLabel").textContent = `${genre} (${filteredSongs.length} songs)`;
  
  renderSongs();
  toggleClearButton();
}

function renderSongs() {
  const list = document.getElementById("songList");
  list.innerHTML = "";
  const start = (currentPage - 1) * songsPerPage;
  const pageSongs = filteredSongs.slice(start, start + songsPerPage);
  
  document.getElementById("resultsCount").textContent = 
    filteredSongs.length !== songs.length ? `${filteredSongs.length.toLocaleString()} results` : `${songs.length.toLocaleString()} songs`;
  
  pageSongs.forEach(song => {
    const div = document.createElement("div");
    div.className = "song";
    div.dataset.artist = song.artist;
    const safeArtist = song.artist.replace(/'/g, "\\'").replace(/"/g, '&quot;');
    const safeSong = song.song.replace(/'/g, "\\'").replace(/"/g, '&quot;');
    div.innerHTML = `
      <div class="songInfo">
        <div class="songTitle">${escapeHtml(song.displayName)}</div>
        <div class="songArtist" onclick="filterArtist('${safeArtist}')">${escapeHtml(song.artist)}</div>
      </div>
      <button class="req-btn" onclick="requestSong('${safeArtist}','${safeSong}')">Request</button>
    `;
    list.appendChild(div);
  });
  renderPagination();
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function highlightArtist(artist) {
  document.querySelectorAll(".song").forEach(s => { if (s.dataset.artist === artist) s.classList.add("highlight"); });
}
function clearHighlight() {
  document.querySelectorAll(".song").forEach(s => s.classList.remove("highlight"));
}

function renderPagination() {
  const totalPages = Math.ceil(filteredSongs.length / songsPerPage) || 1;
  [document.getElementById("paginationTop"), document.getElementById("paginationBottom")].forEach(container => {
    container.innerHTML = "";
    if (currentPage > 1) {
      let prev = document.createElement("button");
      prev.innerText = "◀ Prev"; prev.className = "nav-btn"; prev.style.padding = "6px 12px";
      prev.onclick = () => { currentPage--; renderSongs(); window.scrollTo(0, 0); };
      container.appendChild(prev);
    }
    let label = document.createElement("span");
    label.innerText = ` Page ${currentPage} / ${totalPages} `;
    container.appendChild(label);
    if (currentPage < totalPages) {
      let next = document.createElement("button");
      next.innerText = "Next ▶"; next.className = "nav-btn"; next.style.padding = "6px 12px";
      next.onclick = () => { currentPage++; renderSongs(); window.scrollTo(0, 0); };
      container.appendChild(next);
    }
  });
}

function handleSearchInput() {
  activeGenre = null;
  document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
  document.getElementById("activeFilters").style.display = "none";
  const q = document.getElementById("searchBox").value.toLowerCase();
  filteredSongs = songs.filter(s => s.artist.toLowerCase().includes(q) || s.displayName.toLowerCase().includes(q) || s.song.toLowerCase().includes(q));
  currentPage = 1;
  renderSongs();
  toggleClearButton();
}

function toggleClearButton() {
  const hasSearch = document.getElementById("searchBox").value || activeGenre;
  document.getElementById("clearBtn").style.display = hasSearch ? "inline-block" : "none";
}

function clearSearch() {
  document.getElementById("searchBox").value = "";
  filteredSongs = songs;
  currentPage = 1;
  activeGenre = null;
  document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
  document.getElementById("activeFilters").style.display = "none";
  renderSongs();
  toggleClearButton();
  window.history.replaceState({}, document.title, window.location.pathname);
}

function filterArtist(artist) {
  activeGenre = null;
  document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
  document.getElementById("activeFilters").style.display = "none";
  document.getElementById("searchBox").value = artist;
  filteredSongs = songs.filter(s => s.artist === artist);
  currentPage = 1;
  renderSongs();
  toggleClearButton();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function buildAlphabet() {
  const div = document.getElementById("alphabet");
  div.innerHTML = "";
  "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(letter => {
    let b = document.createElement("button");
    b.innerText = letter; b.className = "nav-btn"; b.style.padding = "6px 10px"; b.style.fontSize = "11px";
    b.onclick = () => jumpToLetter(letter);
    div.appendChild(b);
  });
}

function jumpToLetter(letter) {
  clearSearch();
  const idx = filteredSongs.findIndex(s => s.artist.toLowerCase().startsWith(letter.toLowerCase()));
  if (idx === -1) return;
  currentPage = Math.floor(idx / songsPerPage) + 1;
  renderSongs();
}

function buildArtistStats() {
  const map = {};
  songs.forEach(s => { if (!map[s.artist]) map[s.artist] = 0; map[s.artist]++; });
  const sorted = Object.entries(map).sort((a, b) => b[1] - a[1]).slice(0, 10);
  const list = document.getElementById("artistList");
  const statsContainer = document.getElementById("artistStats");
  list.innerHTML = "";
  sorted.forEach(([artist, count]) => {
    let row = document.createElement("div");
    row.innerText = `${artist} (${count})`;
    row.onclick = () => filterArtist(artist);
    list.appendChild(row);
  });
  document.getElementById("artistToggle").onclick = () => {
    const isHidden = list.style.display === "none" || list.style.display === "";
    statsContainer.classList.remove("flame-effect");
    void statsContainer.offsetWidth;
    statsContainer.classList.add("flame-effect");
    list.style.display = isHidden ? "block" : "none";
    document.getElementById("artistToggle").querySelector('span:last-child').innerText = isHidden ? "▼" : "▶";
  };
}

async function requestSong(artist, song) {
  const command = `!request "${artist}" "${song}"`;
  try {
    await navigator.clipboard.writeText(command);
    alert("Copied to clipboard!\n\nPaste in Twitch chat:\n" + command);
  } catch {
    alert("Type in chat:\n" + command);
  }
}

function randomArtistFilter() {
  if (!songs.length) return;
  const uniqueArtists = [...new Set(songs.map(s => s.artist))];
  const random = uniqueArtists[Math.floor(Math.random() * uniqueArtists.length)];
  filterArtist(random);
}

function goHome() { clearSearch(); window.scrollTo({ top: 0, behavior: "smooth" }); }

init();
</script>
