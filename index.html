<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lazzarus Prime Rocksmith Requests</title>

<style>
body{
font-family:Segoe UI,Arial;
background:#0f0f0f;
color:white;
margin:0;
}

/* HEADER */
.titleBar{
display:flex;
justify-content:space-between;
align-items:center;
background:#141414;
padding:12px;
border-bottom:2px solid #222;
}

.titleLeft{
display:flex;
align-items:center;
gap:10px;
}

.titleBar img{
width:40px;
}

.socialLinks{
display:flex;
gap:15px;
flex-wrap:wrap;
}

.socialLinks a{
color:#aaa;
text-decoration:none;
font-size:14px;
}

.socialLinks a:hover{
color:#f1c40f;
}

/* SECTION */
.section{
padding:10px;
}

.song{
display:flex;
justify-content:space-between;
padding:10px;
border-bottom:1px solid #222;
}

.songTitle{
font-weight:bold;
}

.songArtist{
font-size:13px;
color:#aaa;
}

/* BUTTON */
button{
background:#27ae60;
color:white;
border:none;
padding:7px 12px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1e8449;
}

/* COLLAPSE */
.collapsible{
cursor:pointer;
padding:10px;
background:#181818;
border:none;
text-align:left;
width:100%;
font-size:16px;
color:white;
}

.content{
display:none;
padding:10px;
}
</style>
</head>

<body>

<div class="titleBar">
<div class="titleLeft">
<img src="guitar.png">
<h2>Lazzarus Prime Rocksmith Requests</h2>
</div>

<div class="socialLinks">
<a href="https://www.twitch.tv/lazzarus_prime" target="_blank">🎸 Twitch</a>
<a href="https://discord.gg/WCg5sktJNM" target="_blank">💬 Discord</a>
<a href="https://lazzarus-prime-shop.fourthwall.com/" target="_blank">🛒 Merch</a>
</div>
</div>

<!-- 🔥 BASS CAMP SECTION -->
<div class="section">
<h2>🔥 Bass Camp 2 (Click to Request)</h2>
<div id="bassCampList"></div>
</div>

<!-- 🔽 COLLAPSIBLE SONG LIBRARY -->
<button class="collapsible">📚 Full Song Library</button>
<div class="content" id="songList"></div>

<script>

// 🔥 BASS CAMP SONGS
const bassCampSongs = [
["Arctic Monkeys","Fireside"],
["Arctic Monkeys","From the Ritz to the Rubble"],
["Arctic Monkeys","I Bet You Look Good On The Dancefloor"],
["Audioslave","Set It Off"],
["Audioslave","Your Time Has Come"],
["Billy Talent","Worker Bees"],
["Billy Talent","Crooked Minds"],
["Billy Talent","Hanging Out With All The Wrong People"],
["Billy Talent","Line And Sinker"],
["Billy Talent","Voice Of Violence"],
["Blues Traveler","Hook"],
["Foo Fighters","Bridge Burning"],
["Foo Fighters","I'll Stick Around"],
["Foo Fighters","Rope"],
["Foo Fighters","Something From Nothing"],
["Foo Fighters","Waiting On A War"],
["Green Day","Basket Case"],
["Green Day","Coming Clean"],
["Green Day","Jesus of Suburbia"],
["Green Day","She"],
["Guns N' Roses","Sweet Child O Mine"],
["Guns N' Roses","You Could Be Mine"],
["I Mother Earth","One More Astronaut"],
["Incubus","Nice To Know You"],
["Incubus","Pardon Me"],
["Iron Maiden","Flight of Icarus"],
["Iron Maiden","Powerslave"],
["Linkin Park","IGYEIH"],
["Metallica","Breadfan"],
["Metallica","One"],
["The Offspring","Come Out Swinging"],
["The Offspring","Half-Truism"],
["The Offspring","Smash"],
["Ozzy Osbourne","Perry Mason"],
["Rage Against The Machine","Bombtrack"],
["Rage Against The Machine","Bullet in the Head"],
["Rage Against The Machine","Calm Like a Bomb"],
["Rage Against The Machine","Freedom"],
["Rage Against The Machine","Killing in the Name"],
["Rage Against The Machine","Take the Power Back"],
["Rage Against The Machine","Wake Up"],
["Red Hot Chili Peppers","By the Way"],
["Red Hot Chili Peppers","Californication"],
["Red Hot Chili Peppers","Dani California"],
["Red Hot Chili Peppers","Turn It Again"],
["Red Hot Chili Peppers","Under the Bridge"],
["Rival Sons","Open My Eyes"],
["Soundgarden","Burden In My Hand"],
["Soundgarden","Fell on Black Days"],
["Stone Temple Pilots","Interstate Love Song"],
["Stone Temple Pilots","Wicked Garden"],
["Sublime","Santeria"],
["Sublime","Wrong Way"],
["Sum 41","Makes No Difference"],
["Sum 41","Over My Head (Better Off Dead)"],
["Tool","Stinkfist"],
["The Tragically Hip","Grace, Too"]
];

// 🎸 REQUEST FUNCTION
function requestSong(artist, song){
const command = `!request "${artist}" "${song}"`;

navigator.clipboard.writeText(command)
.then(()=>{
alert("Copied! Paste in Twitch chat:\n" + command);
})
.catch(()=>{
alert("Type in chat:\n" + command);
});
}

// 🔥 BUILD BASS CAMP LIST
const bcDiv = document.getElementById("bassCampList");

bassCampSongs.forEach(([artist,song])=>{
const div = document.createElement("div");
div.className="song";

div.innerHTML = `
<div>
<div class="songTitle">${song}</div>
<div class="songArtist">${artist}</div>
</div>
<button onclick="requestSong('${artist.replace(/'/g,"\\'")}','${song.replace(/'/g,"\\'")}')">
Request
</button>
`;

bcDiv.appendChild(div);
});

// 📚 COLLAPSIBLE LIBRARY TOGGLE
document.querySelector(".collapsible").onclick = function(){
this.classList.toggle("active");
const content = document.querySelector(".content");
content.style.display = content.style.display === "block" ? "none" : "block";
};

</script>

</body>
</html>
