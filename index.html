<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lazzarus Prime Rocksmith Requests</title>
<style>
    body{ font-family:Segoe UI, Arial; background:#0f0f0f; color:#fff; margin:0; }
    h1,h2,h3{margin:0}
    .titleBar{ display:flex; align-items:center; gap:10px; background:#141414; padding:12px; border-bottom:2px solid #222; }
    .titleBar img{ width:42px; }
    .topBar{ display:flex; gap:5px; padding:10px; background:#181818; position:sticky; top:0; z-index:100; align-items:center; }
    .topBar input{ flex:1; padding:8px; border-radius:6px; border:none; }
    .topBar .clearBtn{ background:#272727; color:white; border:none; padding:6px 10px; border-radius:6px; cursor:pointer; font-weight:bold; display:none; }
    button{ background:#272727; color:white; border:none; padding:6px 10px; border-radius:6px; cursor:pointer; }
    button:hover{ background:#444; }
    #alphabet{ display:flex; flex-wrap:wrap; gap:5px; padding:10px; }
    #stats{ padding:10px; color:#bbb; }
    #artistStats{ padding:10px; background:#151515; border-top:1px solid #222; border-bottom:1px solid #222; }
    .song{ display:flex; align-items:center; justify-content:space-between; padding:10px; border-bottom:1px solid #222; }
    .songInfo{ display:flex; flex-direction:column; }
    .songTitle{ font-weight:bold; font-size:15px; }
    .songArtist{ font-size:13px; color:#aaa; cursor:pointer; }
    .queueItem{ padding:8px; border-bottom:1px solid #333; background:#111; margin-bottom:2px; }
</style>
</head>
<body>

<div class="titleBar">
    <img src="guitar.png">
    <h1>Lazzarus Prime Rocksmith Requests</h1>
</div>

<div class="topBar">
    <button onclick="goHome()">🏠 Home</button>
    <input id="searchBox" placeholder="Search artist or song..." oninput="handleSearchInput()">
    <button class="clearBtn" id="clearBtn" onclick="clearSearch()">✖</button>
    <button onclick="randomSong()">🎲 Random</button>
</div>

<div id="alphabet"></div>
<div id="stats"></div>
<div id="artistStats"></div>

<h2 style="padding:10px">Song Library</h2>
<div id="paginationTop"></div>
<div id="songList"></div>
<div id="paginationBottom"></div>

<h2 style="padding:10px; color:#f1c40f;">Request Queue</h2>
<div id="queue"></div>

<script>
const DB_URL = "https://rocksmith-requests-default-rtdb.firebaseio.com/queue.json";
let songs = [];
let filteredSongs = [];
let currentPage = 1;
const songsPerPage = 40;

async function init() {
    await loadSongs();
    loadQueue();
    setInterval(loadQueue, 3000); // Polls every 3 seconds
}

async function loadSongs() {
    try {
        const response = await fetch("songs.json");
        songs = await response.json();
        filteredSongs = songs;
        buildAlphabet();
        buildArtistStats();
        renderSongs();
        document.getElementById("stats").innerText = songs.length + " songs loaded";
    } catch (e) { document.getElementById("stats").innerText = "Error loading songs"; }
}

function renderSongs() {
    const list = document.getElementById("songList");
    list.innerHTML = "";
    let start = (currentPage - 1) * songsPerPage;
    let end = start + songsPerPage;
    let pageSongs = filteredSongs.slice(start, end);
    pageSongs.forEach(song => {
        const div = document.createElement("div");
        div.className = "song";
        const sA = song.artist.replace(/'/g, "\\'");
        const sS = song.song.replace(/'/g, "\\'");
        div.innerHTML = `<div class="songInfo">
                            <div class="songTitle">${song.song}</div>
                            <div class="songArtist" onclick="filterArtist('${sA}')">${song.artist}</div>
                         </div>
                         <button onclick="requestSong('${sA}','${sS}')">Request</button>`;
        list.appendChild(div);
    });
    renderPagination();
}

function renderPagination() {
    const top = document.getElementById("paginationTop");
    const bottom = document.getElementById("paginationBottom");
    top.innerHTML = ""; bottom.innerHTML = "";
    let totalPages = Math.ceil(filteredSongs.length / songsPerPage) || 1;
    [top, bottom].forEach(container => {
        if (currentPage > 1) {
            let prev = document.createElement("button");
            prev.innerText = "◀ Prev";
            prev.onclick = () => { currentPage--; renderSongs(); };
            container.appendChild(prev);
        }
        let label = document.createElement("span");
        label.innerText = ` Page ${currentPage} / ${totalPages} `;
        container.appendChild(label);
        if (currentPage < totalPages) {
            let next = document.createElement("button");
            next.innerText = "Next ▶";
            next.onclick = () => { currentPage++; renderSongs(); };
            container.appendChild(next);
        }
    });
}

function handleSearchInput() { searchSongs(); toggleClearButton(); }
function searchSongs() {
    let q = document.getElementById("searchBox").value.toLowerCase();
    filteredSongs = songs.filter(s => s.artist.toLowerCase().includes(q) || s.song.toLowerCase().includes(q));
    currentPage = 1; renderSongs();
}

function toggleClearButton() {
    const btn = document.getElementById("clearBtn");
    btn.style.display = document.getElementById("searchBox").value ? "inline-block" : "none";
}

function clearSearch() {
    document.getElementById("searchBox").value = "";
    filteredSongs = songs; currentPage = 1; renderSongs(); toggleClearButton();
}

function filterArtist(artist) {
    document.getElementById("searchBox").value = artist;
    filteredSongs = songs.filter(s => s.artist === artist);
    currentPage = 1; renderSongs(); toggleClearButton();
}

function buildAlphabet() {
    const div = document.getElementById("alphabet");
    div.innerHTML = "";
    "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(l => {
        let b = document.createElement("button");
        b.innerText = l; b.onclick = () => jumpToLetter(l);
        div.appendChild(b);
    });
}

function jumpToLetter(letter) {
    const idx = filteredSongs.findIndex(s => s.artist.toLowerCase().startsWith(letter.toLowerCase()));
    if (idx === -1) return;
    currentPage = Math.floor(idx / songsPerPage) + 1; renderSongs();
}

function buildArtistStats() {
    const map = {};
    songs.forEach(s => { if (!map[s.artist]) map[s.artist] = 0; map[s.artist]++; });
    const sorted = Object.entries(map).sort((a, b) => b[1] - a[1]).slice(0, 10);
    const div = document.getElementById("artistStats");
    div.innerHTML = `<h3 id="artistToggle" style="cursor:pointer">🎸 Top Artists In Library ▶</h3><div id="artistList" style="display:none"></div>`;
    const list = document.getElementById("artistList");
    sorted.forEach(([artist, count]) => {
        let row = document.createElement("div");
        row.style.cursor = "pointer"; row.innerText = `${artist} (${count})`;
        row.onclick = () => filterArtist(artist);
        list.appendChild(row);
    });
    document.getElementById("artistToggle").onclick = () => {
        const list = document.getElementById("artistList");
        const toggle = document.getElementById("artistToggle");
        list.style.display = (list.style.display === "none") ? "block" : "none";
        toggle.innerText = (list.style.display === "none") ? "🎸 Top Artists In Library ▶" : "🎸 Top Artists In Library ▼";
    };
}

async function requestSong(artist, song) {
    // Replaced the auto-POST with just a clipboard copy
    const command = `!sr ${artist} - ${song}`;
    try {
        await navigator.clipboard.writeText(command);
        alert("Copied to clipboard!\n\nPaste this in Twitch chat to request:\n" + command);
    } catch (e) {
        alert("Copy failed. Please manually type: " + command);
    }
}

async function loadQueue() {
    try {
        const response = await fetch(DB_URL);
        const data = await response.json();
        const div = document.getElementById("queue");
        div.innerHTML = "";
        if (!data) {
            div.innerHTML = "<p style='color:#666; padding-left:10px;'>Queue is empty.</p>";
            return;
        }
        // Convert object to array and display
        Object.values(data).forEach((song, i) => {
            let item = document.createElement("div");
            item.className = "queueItem";
            item.innerText = (i + 1) + ". " + (song.artist || "Unknown") + " - " + (song.song || "Unknown");
            div.appendChild(item);
        });
    } catch (e) {}
}

async function randomSong() {
    if (!songs.length) return;
    let s = songs[Math.floor(Math.random() * songs.length)];
    requestSong(s.artist, s.song);
}

function goHome() {
    document.getElementById("searchBox").value = "";
    filteredSongs = songs; currentPage = 1; renderSongs(); toggleClearButton();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}
init();
</script>
</body>
</html>
