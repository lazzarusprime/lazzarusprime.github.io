<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lazzarus Prime Rocksmith Requests</title>

<style>
body{
  font-family:Segoe UI,Arial;
  background:#0f0f0f;
  color:white;
  margin:0;
}

/* 🔥 TITLE BAR */
.titleBar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#141414;
  padding:12px;
  border-bottom:2px solid #222;
  flex-wrap:wrap;
}

.titleLeft{
  display:flex;
  align-items:center;
  gap:10px;
}

.titleBar img{
  width:40px;
}

/* 🔥 SOCIAL LINKS */
.socialLinks{
  display:flex;
  gap:15px;
  flex-wrap:wrap;
}

.socialLinks a{
  color:#aaa;
  text-decoration:none;
  font-size:14px;
  transition:.15s;
}

.socialLinks a:hover{
  color:#f1c40f;
  text-shadow:
    0 0 5px #f1c40f,
    0 0 10px #f1c40f,
    0 0 15px #f1c40f;
}

/* 🔥 TOP BAR */
.topBar{
  display:flex;
  gap:6px;
  padding:10px;
  background:#181818;
  position:sticky;
  top:0;
  z-index:100;
  flex-wrap:wrap;
  justify-content:center;
}

.topBar input{
  flex:1;
  padding:8px;
  border-radius:6px;
  border:none;
  min-width:180px;
}

.clearBtn{
  display:none;
  background:#333;
}

button{
  background:#272727;
  color:white;
  border:none;
  padding:7px 12px;
  border-radius:6px;
  cursor:pointer;
  transition:.15s;
}

button:hover{
  background:#444;
}

/* 🔹 ALPHABET NAV */
#alphabet{
  display:flex;
  flex-wrap:wrap;
  gap:5px;
  padding:10px;
  justify-content:center;
}

/* 🔹 SONG LIST */
.song{
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-bottom:1px solid #222;
  transition:.15s;
}

.songInfo{
  display:flex;
  flex-direction:column;
}

/* 🔹 SONG TITLE */
.songTitle{
  font-weight:700;
  font-size:16px;
  color:#ffffff;
}

/* 🔹 SONG ARTIST - glows on hover */
.songArtist{
  font-size:14px;
  font-weight:600;
  color:#f1c40f;
  cursor:pointer;
  transition:.2s;
}

.songArtist:hover{
  text-shadow:
    0 0 10px #f1c40f,
    0 0 20px #f1c40f,
    0 0 30px #f39c12;
  transform:scale(1.05);
}

/* 🔹 HIGHLIGHTED SONG */
.song.highlight{
  background:#1a1a1a;
  box-shadow:0 0 6px rgba(241,196,15,.4);
}

/* 🔹 TOP ARTISTS LIST */
#artistList div{
  color:#f1c40f;
  font-weight:600;
  cursor:pointer;
  transition:.2s;
  margin:4px 0;
}

#artistList div:hover{
  text-shadow:
    0 0 10px #f1c40f,
    0 0 20px #f1c40f,
    0 0 30px #f39c12;
  transform:scale(1.05);
}

/* 🔹 ARROW ANIMATION FOR TOP ARTISTS */
.arrow{
  display:inline-block;
  transition:transform 0.2s;
}

.arrow.down{
  transform:rotate(90deg);
}

/* 🔹 PAGINATION */
.pagination{
  padding:10px;
}
</style>
</head>

<body>

<!-- 🔥 TITLE BAR WITH GUITAR AND SOCIAL LINKS -->
<div class="titleBar">
  <div class="titleLeft">
    <img src="guitar.png">
    <h2>Lazzarus Prime Rocksmith Requests</h2>
  </div>
  <div class="socialLinks">
    <a href="https://www.twitch.tv/lazzarus_prime" target="_blank">🎸 Twitch</a>
    <a href="https://discord.gg/WCg5sktJNM" target="_blank">💬 Discord</a>
    <a href="https://lazzarus-prime-shop.fourthwall.com/" target="_blank">🛒 Merch</a>
    <a href="https://www.instagram.com/lazzarus__prime/" target="_blank">📸 Instagram</a>
    <a href="https://streamlabs.com/lazzarus_prime/tip" target="_blank">💰 Donations</a>
  </div>
</div>

<!-- 🔹 TOP BAR -->
<div class="topBar">
  <button onclick="goHome()">🏠 Home</button>
  <button onclick="window.location.href='artists.html'">🎤 Artists</button>
  <input id="searchBox" placeholder="Search artist or song..." oninput="handleSearchInput()">
  <button id="clearBtn" class="clearBtn" onclick="clearSearch()">✖</button>
  <button onclick="randomSong()">🎲 Random</button>
</div>

<!-- 🔹 ALPHABET NAV -->
<div id="alphabet"></div>

<!-- 🔹 STATS -->
<div id="stats"></div>

<!-- 🔹 TOP ARTISTS -->
<div id="artistStats"></div>

<h3 style="padding:10px">Song Library</h3>

<!-- 🔹 PAGINATION TOP -->
<div id="paginationTop" class="pagination"></div>

<!-- 🔹 SONG LIST -->
<div id="songList"></div>

<!-- 🔹 PAGINATION BOTTOM -->
<div id="paginationBottom" class="pagination"></div>

<script>
let songs = [];
let filteredSongs = [];
let currentPage = 1;
const songsPerPage = 40;

// 🔹 INITIALIZE
async function init(){
  try{
    const response = await fetch("songs.json");
    songs = await response.json();
    filteredSongs = [...songs];
    buildAlphabet();
    buildArtistStats();
    renderSongs();
    document.getElementById("stats").innerText = songs.length + " songs loaded";
  }catch(e){
    document.getElementById("stats").innerText = "Error loading songs!";
    console.error(e);
  }
}

// 🔹 RENDER SONGS
function renderSongs(){
  const list = document.getElementById("songList");
  list.innerHTML = "";
  const start = (currentPage-1)*songsPerPage;
  const end = start+songsPerPage;
  const pageSongs = filteredSongs.slice(start,end);

  pageSongs.forEach(song=>{
    const div = document.createElement("div");
    div.className="song";
    div.dataset.artist = song.artist;
    const a = song.artist.replace(/'/g,"\\'");
    const s = song.song.replace(/'/g,"\\'");
    div.innerHTML = `
      <div class="songInfo">
        <div class="songTitle">${song.song}</div>
        <div class="songArtist"
          onmouseenter="highlightArtist('${a}')"
          onmouseleave="clearHighlight()"
          onclick="filterArtist('${a}')">
          ${song.artist}
        </div>
      </div>
      <button onclick="requestSong('${a}','${s}')">Request</button>
    `;
    list.appendChild(div);
  });

  renderPagination();
}

// 🔹 HIGHLIGHT SONGS BY ARTIST
function highlightArtist(artist){
  document.querySelectorAll(".song").forEach(song=>{
    if(song.dataset.artist === artist) song.classList.add("highlight");
  });
}

function clearHighlight(){
  document.querySelectorAll(".song").forEach(song=>{
    song.classList.remove("highlight");
  });
}

// 🔹 PAGINATION
function renderPagination(){
  const totalPages = Math.ceil(filteredSongs.length / songsPerPage) || 1;
  const containers = [
    document.getElementById("paginationTop"),
    document.getElementById("paginationBottom")
  ];

  containers.forEach(container=>{
    container.innerHTML = "";
    if(currentPage>1){
      const prev = document.createElement("button");
      prev.innerText = "◀ Prev";
      prev.onclick = ()=>{currentPage--; renderSongs();};
      container.appendChild(prev);
    }
    const label = document.createElement("span");
    label.innerText = " Page "+currentPage+" / "+totalPages+" ";
    container.appendChild(label);
    if(currentPage<totalPages){
      const next = document.createElement("button");
      next.innerText = "Next ▶";
      next.onclick = ()=>{currentPage++; renderSongs();};
      container.appendChild(next);
    }
  });
}

// 🔹 SEARCH
function handleSearchInput(){
  const q = document.getElementById("searchBox").value.toLowerCase();
  filteredSongs = songs.filter(s => s.artist.toLowerCase().includes(q) || s.song.toLowerCase().includes(q));
  currentPage = 1;
  renderSongs();
  toggleClearButton();
}

function toggleClearButton(){
  document.getElementById("clearBtn").style.display = document.getElementById("searchBox").value ? "inline" : "none";
}

function clearSearch(){
  document.getElementById("searchBox").value = "";
  filteredSongs = [...songs];
  currentPage = 1;
  renderSongs();
  toggleClearButton();
}

// 🔹 FILTER BY ARTIST
function filterArtist(artist){
  document.getElementById("searchBox").value = artist;
  filteredSongs = songs.filter(s=>s.artist===artist);
  currentPage=1;
  renderSongs();
  toggleClearButton();
}

// 🔹 ALPHABET
function buildAlphabet(){
  const container = document.getElementById("alphabet");
  container.innerHTML="";
  "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(letter=>{
    const btn = document.createElement("button");
    btn.innerText = letter;
    btn.onclick = ()=> jumpToLetter(letter);
    container.appendChild(btn);
  });
}

function jumpToLetter(letter){
  const idx = filteredSongs.findIndex(s=>s.artist.toLowerCase().startsWith(letter.toLowerCase()));
  if(idx===-1) return;
  currentPage = Math.floor(idx/songsPerPage)+1;
  renderSongs();
}

// 🔹 TOP ARTISTS
function buildArtistStats(){
  const map = {};
  songs.forEach(s=>{
    if(!map[s.artist]) map[s.artist]=0;
    map[s.artist]++;
  });
  const sorted = Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const div = document.getElementById("artistStats");
  div.innerHTML = `<h3 id="artistToggle" style="cursor:pointer">🎸 Top Artists In Library <span class="arrow">▶</span></h3><div id="artistList" style="display:none"></div>`;
  const list = document.getElementById("artistList");
  sorted.forEach(([artist,count])=>{
    let row = document.createElement("div");
    row.innerText = artist + " ("+count+")";
    row.onclick = ()=> filterArtist(artist);
    list.appendChild(row);
  });

  document.getElementById("artistToggle").onclick = ()=>{
    const list = document.getElementById("artistList");
    const arrow = document.querySelector("#artistToggle .arrow");
    if(list.style.display==="none"){
      list.style.display="block";
      arrow.classList.add("down");
    } else{
      list.style.display="none";
      arrow.classList.remove("down");
    }
  }
}

// 🔹 REQUEST SONG
async function requestSong(artist,song){
  const command = `!request "${artist}" "${song}"`;
  try{
    await navigator.clipboard.writeText(command);
    alert("Copied to clipboard!\n\nPaste in Twitch chat:\n"+command);
  }catch{
    alert("Type in chat:\n"+command);
  }
}

// 🔹 RANDOM SONG
function randomSong(){
  if(!songs.length) return;
  const s = songs[Math.floor(Math.random()*songs.length)];
  requestSong(s.artist,s.song);
}

// 🔹 GO HOME
function goHome(){
  document.getElementById("searchBox").value="";
  filteredSongs = [...songs];
  currentPage=1;
  renderSongs();
  toggleClearButton();
  window.scrollTo({top:0,behavior:"smooth"});
}

// 🔹 INIT
init();
</script>

</body>
</html>
