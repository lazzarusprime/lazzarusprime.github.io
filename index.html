<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lazzarus Prime | Song Library</title>
<style>
  :root {
    --bg: #0a0a0a;
    --card-bg: #151515;
    --accent: #d4af37;
    --accent-glow: rgba(212, 175, 55, 0.3);
    --text: #e0e0e0;
    --nav-bg: rgba(20, 20, 20, 0.9);
  }

  body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; line-height: 1.6; }
  
  /* UPDATED HEADER TEXT STYLE */
  .titleBar { display: flex; justify-content: space-between; align-items: center; background: #000; padding: 20px; border-bottom: 1px solid #222; flex-wrap: wrap; }
  .titleLeft { display: flex; align-items: center; gap: 15px; }
  
  .titleLeft h2 { 
    margin: 0; 
    font-weight: 900; 
    letter-spacing: -1px; 
    text-transform: uppercase; 
    /* Metallic Gradient Effect */
    background: linear-gradient(to bottom, #fff 20%, #d4af37 40%, #8a6d1a 80%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    /* Subtle Neon Glow */
    filter: drop-shadow(0 0 8px rgba(212, 175, 55, 0.5));
    font-size: 24px;
  }
  
  .titleBar img { width: 45px; filter: drop-shadow(0 0 5px var(--accent)); }
  
  .socialLinks { display: flex; gap: 20px; }
  .socialLinks a { color: #666; text-decoration: none; font-size: 13px; font-weight: 600; transition: .3s; text-transform: uppercase; }
  .socialLinks a:hover { color: var(--accent); transform: translateY(-2px); }

  /* NAVIGATION BAR */
  .topBar { 
    display: flex; gap: 12px; padding: 15px 20px; background: var(--nav-bg); 
    position: sticky; top: 0; z-index: 100; flex-wrap: wrap; justify-content: center; 
    border-bottom: 1px solid #333; backdrop-filter: blur(10px);
  }
  
  .topBar input { 
    flex: 1; padding: 12px 20px; border-radius: 8px; border: 1px solid #333; 
    background: #000; color: #fff; min-width: 200px; transition: .3s;
  }
  .topBar input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }
  
  .nav-btn { 
    background: #222; color: #aaa; border: 1px solid #333; padding: 10px 22px; 
    border-radius: 8px; cursor: pointer; font-weight: 700; text-transform: uppercase; 
    font-size: 12px; transition: .3s; 
  }
  .nav-btn:hover { background: #2a2a2a; color: #fff; border-color: #444; transform: translateY(-1px); }
  .nav-active { background: var(--accent) !important; color: #000 !important; border-color: var(--accent) !important; box-shadow: 0 0 15px var(--accent-glow); }

  #alphabet { display: flex; flex-wrap: wrap; gap: 4px; padding: 15px; justify-content: center; background: #0e0e0e; }
  #alphabet button { 
    background: transparent; border: 1px solid transparent; color: #555; 
    width: 30px; height: 30px; padding: 0; border-radius: 4px; font-weight: bold; transition: .2s; 
  }
  #alphabet button:hover { color: var(--accent); border-color: #333; background: #151515; }

  #artistStats { margin: 10px 20px; background: var(--card-bg); border-radius: 12px; border: 1px solid #222; overflow: hidden; }
  #artistToggle { 
    cursor: pointer; margin: 0; padding: 15px 20px; transition: .3s; 
    display: flex; justify-content: space-between; align-items: center; font-size: 14px; letter-spacing: 1px;
  }
  #artistToggle:hover { background: #1a1a1a; color: var(--accent); }
  
  #artistList { display: none; padding: 10px 20px; border-top: 1px solid #222; animation: slideDown 0.3s ease-out; }
  @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
  
  #artistList div { padding: 8px 12px; cursor: pointer; border-radius: 6px; margin-bottom: 2px; transition: .2s; color: #888; }
  #artistList div:hover { color: var(--accent); background: #222; padding-left: 20px; }

  #songList { padding: 0 20px 40px 20px; }
  .song { 
    display: flex; justify-content: space-between; align-items: center; 
    padding: 15px 20px; background: #111; border-radius: 10px; 
    margin-bottom: 8px; border: 1px solid #1a1a1a; transition: .2s;
  }
  .song:hover { background: #161616; border-color: #333; transform: scale(1.005); }
  
  .songTitle { font-weight: 700; font-size: 16px; color: #fff; display: block; }
  .songArtist { font-size: 13px; font-weight: 600; color: var(--accent); text-transform: uppercase; cursor: pointer; opacity: 0.7; }
  .songArtist:hover { opacity: 1; text-decoration: underline; }
  
  .request-btn { 
    background: transparent; border: 1px solid var(--accent); color: var(--accent); 
    padding: 8px 16px; border-radius: 6px; font-weight: bold; transition: .3s; 
  }
  .request-btn:hover { background: var(--accent); color: #000; box-shadow: 0 0 12px var(--accent-glow); }

  .pagination { padding: 30px; text-align: center; color: #555; font-size: 14px; }
  .pagination button { margin: 0 10px; background: #222; border: none; color: #fff; padding: 8px 15px; border-radius: 6px; cursor: pointer; }

  .flame-effect { animation: warmPulse 0.6s ease-out; }
  @keyframes warmPulse {
    0% { box-shadow: 0 0 0px transparent; }
    50% { box-shadow: inset 0 0 30px rgba(212, 175, 55, 0.15); border-color: var(--accent); }
    100% { box-shadow: 0 0 0px transparent; }
  }
</style>
</head>
<body>

<div class="titleBar">
  <div class="titleLeft">
    <img src="guitar.png">
    <h2>Lazzarus Prime Rocksmith Requests</h2>
  </div>
  <div class="socialLinks">
    <a href="https://www.twitch.tv/lazzarus_prime" target="_blank">Twitch</a>
    <a href="https://discord.gg/WCg5sktJNM" target="_blank">Discord</a>
    <a href="https://lazzarus-prime-shop.fourthwall.com/" target="_blank">Merch</a>
  </div>
</div>

<div class="topBar">
  <button class="nav-btn nav-active" onclick="goHome()">🏠 Home</button>
  <button class="nav-btn" onclick="window.location.href='artists.html'">🎸 Artists</button>
  <button class="nav-btn" onclick="randomArtist()">🎲 Random</button>
  <input id="searchBox" placeholder="Search for tracks or artists..." oninput="handleSearchInput()">
</div>

<div id="alphabet"></div>

<div id="artistStats">
  <h3 id="artistToggle"><span>🎸 TOP ARTISTS</span> <span>▼</span></h3>
  <div id="artistList"></div>
</div>

<div id="paginationTop" class="pagination"></div>

<div id="songList"></div>

<div id="paginationBottom" class="pagination"></div>

<script>
let songs=[], filteredSongs=[], currentPage=1, songsPerPage=40;

async function init(){
  try {
    const response=await fetch("songs.json");
    songs=await response.json();
    filteredSongs=songs;

    const urlParams = new URLSearchParams(window.location.search);
    const artistSearch = urlParams.get('search');
    if(artistSearch) {
      document.getElementById("searchBox").value = artistSearch;
      filteredSongs = songs.filter(s => s.artist === artistSearch);
    }

    buildAlphabet();
    buildArtistStats();
    renderSongs();
  } catch(e) { console.error("Load error:", e); }
}

function renderSongs(){
  const list=document.getElementById("songList")
  list.innerHTML=""
  let start=(currentPage-1)*songsPerPage
  let pageSongs=filteredSongs.slice(start,start+songsPerPage)
  pageSongs.forEach(song=>{
    const div=document.createElement("div")
    div.className="song"
    div.innerHTML=`
      <div class="songInfo">
        <span class="songTitle">${song.song}</span>
        <span class="songArtist" onclick="filterArtist('${song.artist}')">${song.artist}</span>
      </div>
      <button class="request-btn" onclick="requestSong('${song.artist}','${song.song}')">REQUEST</button>
    `;
    list.appendChild(div);
  })
  renderPagination();
}

function renderPagination(){
  const totalPages=Math.ceil(filteredSongs.length/songsPerPage)||1;
  const containers = [document.getElementById("paginationTop"), document.getElementById("paginationBottom")];
  
  containers.forEach(container => {
    container.innerHTML = "";
    if(currentPage > 1){
      let prev = document.createElement("button");
      prev.innerText = "◀";
      prev.onclick = () => { currentPage--; renderSongs(); window.scrollTo(0,0); };
      container.appendChild(prev);
    }
    let label = document.createElement("span");
    label.innerText = ` ${currentPage} / ${totalPages} `;
    container.appendChild(label);
    if(currentPage < totalPages){
      let next = document.createElement("button");
      next.innerText = "▶";
      next.onclick = () => { currentPage++; renderSongs(); window.scrollTo(0,0); };
      container.appendChild(next);
    }
  });
}

function handleSearchInput(){
  const q=document.getElementById("searchBox").value.toLowerCase()
  filteredSongs=songs.filter(s=>s.artist.toLowerCase().includes(q)||s.song.toLowerCase().includes(q))
  currentPage=1
  renderSongs()
}

function filterArtist(artist){
  document.getElementById("searchBox").value=artist
  filteredSongs=songs.filter(s=>s.artist===artist)
  currentPage=1
  renderSongs()
}

function buildAlphabet(){
  const div=document.getElementById("alphabet")
  "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(letter=>{
    let b=document.createElement("button")
    b.innerText=letter
    b.onclick=()=>jumpToLetter(letter)
    div.appendChild(b)
  })
}

function jumpToLetter(letter){
  document.getElementById("searchBox").value="";
  const idx=songs.findIndex(s=>s.artist.toLowerCase().startsWith(letter.toLowerCase()))
  if(idx===-1) return
  filteredSongs = songs;
  currentPage=Math.floor(idx/songsPerPage)+1
  renderSongs()
}

function buildArtistStats(){
  const map={}
  songs.forEach(s=>{if(!map[s.artist]) map[s.artist]=0; map[s.artist]++})
  const sorted=Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,10)
  const list=document.getElementById("artistList")
  const statsContainer = document.getElementById("artistStats");
  list.innerHTML=""
  sorted.forEach(([artist,count])=>{
    let row=document.createElement("div")
    row.innerText=artist+" ("+count+")"
    row.onclick=()=>filterArtist(artist)
    list.appendChild(row)
  })
  document.getElementById("artistToggle").onclick=()=>{
    const isHidden = list.style.display==="none"||list.style.display===""
    statsContainer.classList.remove("flame-effect");
    void statsContainer.offsetWidth; 
    statsContainer.classList.add("flame-effect");
    list.style.display=isHidden?"block":"none"
  }
}

async function requestSong(artist,song){
  const command=`!request "${artist}" "${song}"`
  try{await navigator.clipboard.writeText(command);alert("Copied to clipboard!")}
  catch{alert("Type in chat:\n"+command)}
}

function randomArtist(){
  const unique = [...new Set(songs.map(s=>s.artist))];
  filterArtist(unique[Math.floor(Math.random()*unique.length)]);
}

function goHome(){ window.location.href='index.html'; }

init()
</script>
</body>
</html>
