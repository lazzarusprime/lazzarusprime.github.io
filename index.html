<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lazzarus Prime Rocksmith Requests</title>

<style>

body{
  font-family:Segoe UI, Arial;
  background:#0f0f0f;
  color:#fff;
  margin:0;
}

h1,h2,h3{margin:0}

.titleBar{
  display:flex;
  align-items:center;
  gap:10px;
  background:#141414;
  padding:12px;
  border-bottom:2px solid #222;
}

.titleBar img{
  width:42px;
}

.topBar{
  display:flex;
  gap:10px;
  padding:10px;
  background:#181818;
  position:sticky;
  top:0;
  z-index:100;
}

.topBar input{
  flex:1;
  padding:8px;
  border-radius:6px;
  border:none;
}

button{
  background:#272727;
  color:white;
  border:none;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
}

button:hover{
  background:#444;
}

#alphabet{
  display:flex;
  flex-wrap:wrap;
  gap:5px;
  padding:10px;
}

#stats{
  padding:10px;
  color:#bbb;
}

#artistStats{
  padding:10px;
  background:#151515;
  border-top:1px solid #222;
  border-bottom:1px solid #222;
}

#artistStats .artistRow{
  cursor:pointer;
  padding:4px 0;
}

#artistStats .artistRow:hover{
  color:#0f0;
}

#songList{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(150px, 1fr));
  gap:15px;
  padding:10px;
}

.song{
  display:flex;
  flex-direction:column;
  align-items:center;
  background:#1c1c1c;
  border-radius:6px;
  padding:6px;
  transition: transform 0.2s;
}

.song:hover{
  transform:scale(1.05);
  background:#2a2a2a;
}

.songInfo{
  text-align:center;
}

.albumArt{
  width:100%;
  height:auto;
  border-radius:5px;
  object-fit:cover;
}

.songTitle{
  font-weight:bold;
  margin-top:6px;
}

.songArtist{
  font-size:13px;
  color:#aaa;
}

#paginationTop,#paginationBottom{
  text-align:center;
  padding:10px;
}

.queueItem{
  padding:6px;
  border-bottom:1px solid #222;
}

</style>
</head>

<body>

<div class="titleBar">
<img src="guitar.png">
<h1>Lazzarus Prime Rocksmith Requests</h1>
</div>

<div class="topBar">
  <button onclick="goHome()">🏠 Home</button>
  <input id="searchBox" placeholder="Search artist or song..." oninput="searchSongs()">
  <button onclick="randomSong()">🎲 Random</button>
</div>

<div id="alphabet"></div>

<div id="stats"></div>

<div id="artistStats"></div>

<h2 style="padding:10px">Song Library</h2>

<div id="paginationTop"></div>

<div id="songList"></div>

<div id="paginationBottom"></div>

<h2 style="padding:10px">Request Queue</h2>
<div id="queue"></div>

<script>

const DB_URL="https://rocksmith-requests-default-rtdb.firebaseio.com";

let songs=[];
let filteredSongs=[];
let currentPage=1;
const songsPerPage=40;

// Lazy-loading observer
let observer;

async function init(){
  await loadSongs();
  loadQueue();
  setInterval(loadQueue,8000);

  // Initialize IntersectionObserver for lazy loading
  observer = new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        const img = entry.target;
        img.src = img.dataset.src;
        observer.unobserve(img);
      }
    });
  }, {rootMargin: "200px"});
}

async function loadSongs(){
  try{
    const response=await fetch("songs.json");
    songs=await response.json();
    filteredSongs=songs;

    buildAlphabet();
    buildArtistStats();
    renderSongs();

    document.getElementById("stats").innerText=songs.length+" songs loaded";

  }catch(e){
    document.getElementById("stats").innerText="Error loading songs";
    console.error(e);
  }
}

function renderSongs(){
  const list=document.getElementById("songList");
  list.innerHTML="";

  let start=(currentPage-1)*songsPerPage;
  let end=start+songsPerPage;

  let pageSongs=filteredSongs.slice(start,end);
  const fragment=document.createDocumentFragment();

  pageSongs.forEach(song=>{
    const div=document.createElement("div");
    div.className="song";

    div.innerHTML=
    `<div class="songInfo">
      <img class="albumArt" data-src="${song.albumArt || 'default.png'}" alt="${song.artist} - ${song.song}" src="default.png">
      <div class="songTitle">${song.song}</div>
      <div class="songArtist">${song.artist}</div>
    </div>
    <button onclick="requestSong('${song.artist.replace(/'/g,"\\'")}','${song.song.replace(/'/g,"\\'")}')">Request</button>`;

    fragment.appendChild(div);
  });

  list.appendChild(fragment);

  // Observe all lazy images
  list.querySelectorAll('img[data-src]').forEach(img=>{
    observer.observe(img);
  });

  renderPagination();
}

function renderPagination(){
  const top=document.getElementById("paginationTop");
  const bottom=document.getElementById("paginationBottom");

  top.innerHTML="";
  bottom.innerHTML="";

  let totalPages=Math.ceil(filteredSongs.length/songsPerPage)||1;

  function controls(container){
    if(currentPage>1){
      let prev=document.createElement("button");
      prev.innerText="◀ Prev";
      prev.onclick=()=>{currentPage--;renderSongs();};
      container.appendChild(prev);
    }
    let label=document.createElement("span");
    label.innerText=` Page ${currentPage} / ${totalPages} `;
    container.appendChild(label);
    if(currentPage<totalPages){
      let next=document.createElement("button");
      next.innerText="Next ▶";
      next.onclick=()=>{currentPage++;renderSongs();};
      container.appendChild(next);
    }
  }

  controls(top);
  controls(bottom);
}

function searchSongs(){
  let q=document.getElementById("searchBox").value.toLowerCase();
  filteredSongs=songs.filter(s=>s.artist.toLowerCase().includes(q) || s.song.toLowerCase().includes(q));
  currentPage=1;
  renderSongs();
}

function buildAlphabet(){
  const div=document.getElementById("alphabet");
  div.innerHTML="";
  "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(l=>{
    let b=document.createElement("button");
    b.innerText=l;
    b.onclick=()=>jumpToLetter(l);
    div.appendChild(b);
  });
}

function jumpToLetter(letter){
  const idx=filteredSongs.findIndex(s=>s.artist.toLowerCase().startsWith(letter.toLowerCase()));
  if(idx===-1) return;
  currentPage=Math.floor(idx/songsPerPage)+1;
  renderSongs();
}

function buildArtistStats(){
  const map={};
  songs.forEach(s=>{
    if(!map[s.artist]) map[s.artist]=0;
    map[s.artist]++;
  });

  const sorted=Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const div=document.getElementById("artistStats");
  div.innerHTML="<h3>🎸 Top Artists In Library</h3>";

  sorted.forEach(([artist,count])=>{
    let row=document.createElement("div");
    row.className="artistRow";
    row.innerText=`${artist} (${count})`;
    row.onclick=()=>{
      document.getElementById("searchBox").value=artist;
      searchSongs();
    };
    div.appendChild(row);
  });
}

async function requestSong(artist,song){
  let text=artist+" - "+song;
  let command="!sr "+text;

  try{ await navigator.clipboard.writeText(command); }catch{}
  try{
    await fetch(DB_URL,{
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({artist,song})
    });
  }catch{}

  alert("Copied to clipboard!\nPaste in chat: "+command);
  setTimeout(loadQueue,1000);
}

async function loadQueue(){
  try{
    const response=await fetch(DB_URL);
    if(!response.ok) return;
    const data=await response.json();
    const div=document.getElementById("queue");
    div.innerHTML="";
    if(!data) return;
    Object.values(data).forEach((song,i)=>{
      let item=document.createElement("div");
      item.className="queueItem";
      item.innerText=(i+1)+". "+song.artist+" - "+song.song;
      div.appendChild(item);
    });
  }catch{}
}

async function randomSong(){
  if(!songs.length) return;
  let s=songs[Math.floor(Math.random()*songs.length)];
  await requestSong(s.artist,s.song);
}

function goHome(){
  document.getElementById("searchBox").value="";
  filteredSongs=songs;
  currentPage=1;
  renderSongs();
  window.scrollTo({top:0,behavior:'smooth'});
}

init();

</script>

</body>
</html>
