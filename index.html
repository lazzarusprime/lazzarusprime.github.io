<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lazzarus Prime Rocksmith Requests</title>

<style>
body{font-family:Segoe UI, Arial;background:#0f0f0f;color:#fff;margin:0;}
h1,h2,h3{margin:0;}
.titleBar{display:flex;align-items:center;gap:10px;background:#141414;padding:12px;border-bottom:2px solid #222;}
.titleBar img{width:42px;}
.topBar{display:flex;gap:5px;padding:10px;background:#181818;position:sticky;top:0;z-index:100;align-items:center;}
.topBar input{flex:1;padding:8px;border-radius:6px;border:none;}
.topBar .clearBtn{background:#272727;color:white;border:none;padding:6px 10px;border-radius:6px;cursor:pointer;font-weight:bold;display:none;}
button{background:#272727;color:white;border:none;padding:6px 10px;border-radius:6px;cursor:pointer;}
button:hover{background:#444;}
#alphabet{display:flex;flex-wrap:wrap;gap:5px;padding:10px;}
#stats{padding:10px;color:#bbb;}
.song{display:flex;align-items:center;justify-content:space-between;padding:10px;border-bottom:1px solid #222;}
.song:hover{background:#1c1c1c;}
.songInfo{display:flex;flex-direction:column;}
.songTitle{font-weight:bold;}
.songArtist{font-size:13px;color:#aaa;cursor:pointer;}
.songArtist:hover{color:#0f0;}
.queueItem{padding:8px;border-bottom:1px solid #222;display:flex;justify-content:space-between;align-items:center;}
.owned{color:#00ff88;font-weight:bold;}
.missing{color:#ff5555;font-weight:bold;}
.downloadBtn{background:#272727;color:white;border:none;padding:6px 10px;border-radius:6px;cursor:pointer;font-weight:bold;font-size:12px;}
.downloadBtn:hover{background:#444;}
</style>
</head>
<body>

<div class="titleBar">
    <img src="guitar.png">
    <h1>Lazzarus Prime Rocksmith Requests</h1>
</div>

<div class="topBar">
    <button onclick="goHome()">🏠 Home</button>
    <input id="searchBox" placeholder="Search artist or song..." oninput="handleSearchInput()">
    <button class="clearBtn" id="clearBtn" onclick="clearSearch()">✖</button>
    <button onclick="randomSong()">🎲 Random</button>
</div>

<div id="alphabet"></div>
<div id="stats"></div>

<h2 style="padding:10px">Song Library</h2>
<div id="songList"></div>

<h2 style="padding:10px">Request Queue</h2>
<div id="queue">Loading queue...</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.30.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.30.0/firebase-database-compat.js"></script>

<script>
// 🔹 Firebase config
const firebaseConfig = {
    apiKey: "AIzaSyCc7XBAOY4bCDAdKt-tKnNn8xo4Xfj5yw4",
    authDomain: "rocksmith-requests.firebaseapp.com",
    databaseURL: "https://rocksmith-requests-default-rtdb.firebaseio.com",
    projectId: "rocksmith-requests",
    storageBucket: "rocksmith-requests.firebasestorage.app",
    messagingSenderId: "267279660992",
    appId: "1:267279660992:web:41c3976abef3712a34ba25",
    measurementId: "G-JWN29ZF9SR"
};
firebase.initializeApp(firebaseConfig);

const DB = firebase.database();
const queueRef = DB.ref("/queue"); // Only watch /queue

let songs = [];
let filteredSongs = [];
let lastQueueCount = 0;

// 🔹 CustomsForge link
function ignitionLink(artist,song){
    return "https://ignition4.customsforge.com/?search=" + encodeURIComponent(artist+" "+song);
}

// 🔹 Load songs
async function loadSongs(){
    try {
        const response = await fetch("songs.json");
        songs = await response.json();
        filteredSongs = songs;
        document.getElementById("stats").innerText = songs.length+" songs loaded";
        renderSongs();
    } catch(e){
        console.error("Failed to load songs.json:", e);
        document.getElementById("stats").innerText = "Failed to load songs";
    }
}

// 🔹 Check if song owned
function isOwned(artist,song){
    return songs.some(s => s.artist.toLowerCase()===artist.toLowerCase() && s.song.toLowerCase()===song.toLowerCase());
}

// 🔹 Render songs
function renderSongs(){
    const list = document.getElementById("songList");
    list.innerHTML="";
    filteredSongs.forEach(song=>{
        const div = document.createElement("div");
        div.className="song";
        div.innerHTML=`
            <div class="songInfo">
                <div class="songTitle">${song.song}</div>
                <div class="songArtist" onclick="filterArtist('${song.artist}')">${song.artist}</div>
            </div>
        `;
        list.appendChild(div);
    });
}

// 🔹 Queue listener
queueRef.on("value", snapshot => {
    const data = snapshot.val();
    const div = document.getElementById("queue");
    div.innerHTML="";
    if(!data){ div.innerText="Queue is empty"; return; }
    const queueItems = Object.values(data);

    queueItems.forEach((song,i)=>{
        let owned = isOwned(song.artist,song.song);
        let status, downloadButton="";
        if(owned){
            status = `<span class="owned">🟢 Owned</span>`;
        }else{
            status = `<span class="missing">🔴 Need Download</span>`;
            downloadButton = `<a target="_blank" href="${ignitionLink(song.artist,song.song)}"><button class="downloadBtn">⬇ Download</button></a>`;
        }
        const item = document.createElement("div");
        item.className="queueItem";
        item.innerHTML=(i+1)+". "+song.artist+" - "+song.song+" "+status+" "+downloadButton;
        div.appendChild(item);
    });

    // Auto announce last added
    if(queueItems.length > lastQueueCount){
        const newest = queueItems[queueItems.length-1];
        let owned = isOwned(newest.artist,newest.song);
        let message = owned
            ? `🎸 ${newest.artist} - ${newest.song} requested — I already have this!`
            : `🎸 ${newest.artist} - ${newest.song} requested — I need to download this`;
        console.log("Auto announce:", message);
    }
    lastQueueCount = queueItems.length;
});

// 🔹 Search functions
function handleSearchInput(){
    let q = document.getElementById("searchBox").value.toLowerCase();
    filteredSongs = songs.filter(s => s.artist.toLowerCase().includes(q) || s.song.toLowerCase().includes(q));
    renderSongs();
    toggleClearButton();
}
function clearSearch(){
    document.getElementById("searchBox").value="";
    filteredSongs=songs;
    renderSongs();
    toggleClearButton();
}
function toggleClearButton(){
    const btn=document.getElementById("clearBtn");
    btn.style.display=document.getElementById("searchBox").value ? "inline-block" : "none";
}
function filterArtist(artist){
    document.getElementById("searchBox").value=artist;
    handleSearchInput();
}
function randomSong(){
    let s = songs[Math.floor(Math.random()*songs.length)];
    console.log("Random song selected:", s.artist,"-",s.song);
}
function goHome(){
    clearSearch();
    window.scrollTo({top:0,behavior:'smooth'});
}

// 🔹 Init
loadSongs();
</script>

</body>
</html>
