<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lazzarus Prime Rocksmith Requests</title>
<link rel="stylesheet" href="style.css">
<style>
/* Collapsible style */
.collapsible {
  background-color: #222;
  color: white;
  cursor: pointer;
  padding: 10px;
  border: none;
  text-align: left;
  outline: none;
  font-size: 1.1em;
  width: 100%;
}
.collapsible:after {
  content: '\25B6'; /* arrow */
  font-weight: bold;
  float: right;
}
.collapsible.active:after {
  content: "\25BC"; /* down arrow */
}
.content {
  display: none;
  padding: 0 10px;
  background-color: #111;
  overflow: hidden;
}
.top-artist {
  cursor: pointer;
  color: #0f9;
  margin: 2px 0;
}
</style>
</head>
<body>

<h2>🎸 Top Artists In Library</h2>
<button class="collapsible">Show/Hide Top Artists</button>
<div class="content" id="topArtistsPanel"></div>

<h2>⭐ Viewer Voting on Songs</h2>
<button class="collapsible">Show/Hide Voting</button>
<div class="content" id="viewerVotingPanel"></div>

<h2>⭐ Most Requested Songs</h2>
<button class="collapsible">Show/Hide Most Requested</button>
<div class="content" id="mostRequestedPanel"></div>

<h2>⭐ Recently Played Songs</h2>
<button class="collapsible">Show/Hide Recently Played</button>
<div class="content" id="recentlyPlayedPanel"></div>

<h2>🎨 Filters</h2>
<button class="collapsible">Show/Hide Filters</button>
<div class="content">
  <div id="artistFilters"></div>
  <div id="genreFilters"></div>
</div>

<script>
// Collapsible logic
document.querySelectorAll('.collapsible').forEach(btn=>{
    btn.addEventListener('click', ()=>{
        btn.classList.toggle('active');
        const content = btn.nextElementSibling;
        if(content.style.display === "block"){
            content.style.display = "none";
        } else {
            content.style.display = "block";
        }
    });
});

// Example: dynamically populate top artists
let topArtists = ["Foo Fighters", "Metallica", "Nirvana"]; // replace with your stats
const topPanel = document.getElementById('topArtistsPanel');

topArtists.forEach(artist => {
    const div = document.createElement('div');
    div.className = "top-artist";
    div.innerText = artist;
    div.onclick = ()=> scrollToArtist(artist);
    topPanel.appendChild(div);
});

// Scroll to first song by artist
function scrollToArtist(artist){
    const songs = document.querySelectorAll('.song');
    for(let s of songs){
        if(s.dataset.artist.toLowerCase() === artist.toLowerCase()){
            s.scrollIntoView({behavior:'smooth', block:'start'});
            break;
        }
    }
}

// Example: you can populate voting, most requested, recently played similarly
</script>
</body>
</html>
