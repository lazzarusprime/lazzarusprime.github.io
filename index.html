<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lazzarus Prime Rocksmith Requests</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com" rel="stylesheet">
</head>
<body>

    <div class="titleBar">
        <img src="guitar.png" class="titleGuitar" alt="Guitar">
        <h1>Lazzarus Prime Rocksmith Requests</h1>
    </div>

    <div class="topBar">
        <button onclick="goHome()">🏠 Home</button>
        <input id="searchBox" placeholder="Search artist or song..." onkeyup="searchSongs()">
        <button onclick="randomSong()">🎲 Random Song</button>
    </div>

    <div id="alphabet"></div>
    <div id="stats">Loading library...</div>

    <h2 id="libraryHeader">Song Library</h2>
    <div id="songList"></div>
    <div id="pagination"></div>

    <h2>Request Queue</h2>
    <div id="queue"></div>

    <script>
        const DB_URL = "https://rocksmith-requests-default-rtdb.firebaseio.com";

        let songs = [];
        let filteredSongs = [];
        let currentPage = 1;
        const songsPerPage = 25;

        async function init() {
            await loadSongs();
            loadQueue();
            setInterval(loadQueue, 10000);
        }

        async function loadSongs() {
            try {
                const response = await fetch("songs.json");
                if (!response.ok) throw new Error("songs.json not found");
                songs = await response.json();
                filteredSongs = songs;
                buildAlphabet();
                renderSongs();
                document.getElementById("stats").innerText = songs.length + " songs loaded";
            } catch (e) {
                document.getElementById("stats").innerText = "Data Load Error: " + e.message;
            }
        }

        async function loadQueue() {
            try {
                const response = await fetch(DB_URL);
                const data = await response.json();
                const div = document.getElementById("queue");
                div.innerHTML = "";
                if (!data) return;

                Object.values(data).forEach((song, i) => {
                    let item = document.createElement("div");
                    item.className = "queueItem";
                    item.innerText = (i + 1) + ". " + song.artist + " - " + song.song;
                    div.appendChild(item);
                });
            } catch (e) {
                console.warn("Queue update paused - check network/AdBlock.");
            }
        }

        async function requestSong(artist, song) {
            const command = "!sr " + artist + " - " + song;

            // 1. Copy to clipboard
            try {
                await navigator.clipboard.writeText(command);
            } catch (err) {
                console.warn("Clipboard access denied.");
            }

            // 2. Post to Firebase
            try {
                const response = await fetch(DB_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ artist, song })
                });
                
                if (response.ok) {
                    alert("Added to Queue!\nPaste in chat: " + command);
                    loadQueue();
                } else {
                    const errData = await response.json();
                    alert("Server Error: " + (errData.error || response.statusText));
                }
            } catch (e) {
                // 'Failed to fetch' usually happens before reaching the server
                alert("Request Failed: Check if an AdBlocker is blocking Firebase.");
                console.error("Fetch Error:", e);
            }
        }

        function renderSongs() {
            const list = document.getElementById("songList");
            list.innerHTML = "";
            let start = (currentPage - 1) * songsPerPage;
            let end = start + songsPerPage;
            let pageSongs = filteredSongs.slice(start, end);

            pageSongs.forEach(song => {
                const div = document.createElement("div");
                div.className = "song";
                const sA = song.artist.replace(/'/g, "\\'");
                const sS = song.song.replace(/'/g, "\\'");
                div.innerHTML = `<span><b>${song.artist}</b> - ${song.song}</span>
                                <button onclick="requestSong('${sA}', '${sS}')">Request</button>`;
                list.appendChild(div);
            });
            renderPagination();
        }

        function renderPagination() {
            const div = document.getElementById("pagination");
            div.innerHTML = "";
            let totalPages = Math.ceil(filteredSongs.length / songsPerPage) || 1;
            if (currentPage > 1) {
                let btn = document.createElement("button");
                btn.innerText = "Prev";
                btn.onclick = () => { currentPage--; renderSongs(); scrollToTop(); };
                div.appendChild(btn);
            }
            let s = document.createElement("span");
            s.innerText = ` Page ${currentPage} / ${totalPages} `;
            div.appendChild(s);
            if (currentPage < totalPages) {
                let btn = document.createElement("button");
                btn.innerText = "Next";
                btn.onclick = () => { currentPage++; renderSongs(); scrollToTop(); };
                div.appendChild(btn);
            }
        }

        function scrollToTop() {
            document.getElementById("libraryHeader").scrollIntoView({ behavior: 'smooth' });
        }

        function searchSongs() {
            let q = document.getElementById("searchBox").value.toLowerCase();
            filteredSongs = songs.filter(s => s.artist.toLowerCase().includes(q) || s.song.toLowerCase().includes(q));
            currentPage = 1;
            renderSongs();
            scrollToTop();
        }

        function buildAlphabet() {
            const div = document.getElementById("alphabet");
            div.innerHTML = "";
            "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(l => {
                let b = document.createElement("button");
                b.innerText = l;
                b.onclick = () => jumpToLetter(l);
                div.appendChild(b);
            });
        }

        function jumpToLetter(l) {
            const idx = filteredSongs.findIndex(s => s.artist.toLowerCase().startsWith(l.toLowerCase()));
            if (idx === -1) return;
            currentPage = Math.floor(idx / songsPerPage) + 1;
            renderSongs();
            scrollToTop(); // Fixed: Scroll to top on letter jump
        }

        async function randomSong() {
            if (!songs.length) return;
            let s = songs[Math.floor(Math.random() * songs.length)];
            await requestSong(s.artist, s.song); // Now includes pop-up and clipboard
        }

        function goHome() {
            document.getElementById("searchBox").value = "";
            filteredSongs = songs;
            currentPage = 1;
            renderSongs();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        init();
    </script>
</body>
</html>
