<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lazzarus Prime - Gear & Guitars</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',Segoe UI,Arial;background:#0f0f0f;color:white;margin:0}

/* Header & Nav */
.titleBar{display:flex;justify-content:space-between;align-items:center;background:#141414;padding:10px 14px;border-bottom:2px solid #222;flex-wrap:wrap;gap:8px}
.titleLeft{display:flex;align-items:center;gap:10px}
.titleBar img{width:36px;height:36px;object-fit:contain;aspect-ratio:1/1;filter:drop-shadow(0 0 6px rgba(241,196,15,.4))}
.titleLeft h2{margin:0;font-weight:900;text-transform:uppercase;font-size:clamp(14px,2.5vw,22px);background:linear-gradient(to bottom,#fff 20%,#f1c40f 45%,#b8860b 85%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 5px rgba(241,196,15,.6))}
.socialLinks{display:flex;gap:10px;flex-wrap:wrap}
.socialLinks a{color:#aaa;text-decoration:none;font-size:13px;transition:.15s;white-space:nowrap;padding:4px 8px;border-radius:4px}
.socialLinks a:hover{color:#f1c40f;background:#1a1a1a}

.topBar{display:flex;gap:6px;padding:8px 10px;background:#181818;justify-content:flex-start;align-items:center;border-bottom:1px solid #333;flex-wrap:wrap}
.nav-btn{background:#2a2a2a;color:white;border:1px solid #444;padding:9px 14px;border-radius:6px;cursor:pointer;font-weight:700;text-transform:uppercase;font-size:12px;transition:.2s;white-space:nowrap;text-decoration:none;}
.nav-btn:hover{background:#444;border-color:#f1c40f;color:#f1c40f}

/* Page Content */
.gear-container{max-width:1000px;margin:0 auto;padding:40px 14px}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:36px;color:#f1c40f;letter-spacing:2px;margin:0 0 20px;padding-bottom:10px;border-bottom:2px solid #222}
.gear-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;margin-bottom:50px}
.gear-card{background:#141414;border:1px solid #1e1e1e;border-radius:10px;padding:20px;transition:.2s;display:flex;flex-direction:column}
.gear-card:hover{border-color:#f1c40f55;transform:translateY(-3px);box-shadow:0 8px 25px rgba(0,0,0,0.6)}
.gear-type{font-size:11px;color:#f1c40f;text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:6px}
.gear-name{font-size:18px;font-weight:900;color:#fff;margin-bottom:10px;line-height:1.2}
.gear-desc{font-size:13px;color:#888;margin-bottom:15px;line-height:1.5;flex-grow:1}
.gear-link{display:inline-block;padding:8px 14px;background:#222;color:#ccc;text-decoration:none;font-size:11px;font-weight:700;text-transform:uppercase;border-radius:4px;border:1px solid #333;transition:.2s;text-align:center}
.gear-link:hover{background:#f1c40f;color:#000;border-color:#f1c40f}

footer{text-align:center;padding:20px;color:#555;font-size:13px;border-top:1px solid #1a1a1a;margin-top:30px;font-weight:600;}
footer a{color:#aaa;text-decoration:none;transition:.15s;padding: 0 4px;}
footer a:hover{color:#f1c40f}
</style>
</head>
<body>

<div class="titleBar">
  <div class="titleLeft">
    <img src="guitar.png" alt="Guitar">
    <h2>Lazzarus Prime — Gear & Guitars</h2>
  </div>
  <div class="socialLinks">
    <a href="index.html?nosplash=1">🏠 Home</a>
    <a href="https://www.twitch.tv/lazzarus_prime" target="_blank">🎸 Twitch</a>
    <a href="https://discord.gg/WCg5sktJNM" target="_blank">💬 Discord</a>
    <a href="https://lazzarus-prime-shop.fourthwall.com/" target="_blank">👕 Merch</a>
    <a href="https://www.instagram.com/lazzarus__prime/" target="_blank">📸 Instagram</a>
    <a href="https://streamlabs.com/lazzarus_prime/tip" target="_blank">💰 Donate</a>
  </div>
</div>

<div class="topBar">
  <a class="nav-btn" href="index.html?nosplash=1">🏠 Home</a>
  <a class="nav-btn" href="artists.html?nosplash=1">🎸 Artists</a>
  <a class="nav-btn" href="stats.html?nosplash=1">📊 Stats</a>
  <a class="nav-btn" href="gear.html?nosplash=1">🎛️ Gear</a>
  <a class="nav-btn" href="fundraising.html?nosplash=1">🎗️ Fundraising</a>
</div>

<div class="gear-container">
  <h2 class="section-title">🎸 Guitars & Basses</h2>
  </div>

<footer>
  <a href="index.html?nosplash=1">Home</a> &nbsp;-&nbsp; 
  <a href="artists.html?nosplash=1">Artists</a> &nbsp;-&nbsp; 
  <a href="stats.html?nosplash=1">Stats</a> &nbsp;-&nbsp; 
  <a href="gear.html?nosplash=1">Gear</a> &nbsp;-&nbsp; 
  <a href="fundraising.html?nosplash=1">Fundraising</a>
</footer>

</body>
</html>
