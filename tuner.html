<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bass & Guitar Tuner</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
    text-align: center;
    padding: 20px;
}

.container {
    max-width: 800px;
    margin: auto;
}

h1 {
    margin-bottom: 20px;
}

select, button {
    padding: 10px 16px;
    margin: 10px;
    font-size: 16px;
    border: none;
    border-radius: 6px;
}

button {
    cursor: pointer;
}

#note {
    font-size: 80px;
    margin: 20px 0;
}

#freq {
    font-size: 28px;
}

#cents {
    font-size: 22px;
    margin-bottom: 20px;
}

#legend {
    margin-top: 20px;
    font-size: 18px;
    line-height: 1.8;
    white-space: pre-line;
}

.in-tune {
    color: #00ff88;
}

.sharp {
    color: #ff4444;
}

.flat {
    color: #4488ff;
}
</style>
</head>
<body>

<div class="container">
    <h1>Bass & Guitar Tuner</h1>

    <select id="instrumentSelect">
        <option value="guitar">Guitar</option>
        <option value="bass">Bass</option>
    </select>

    <select id="tuningSelect"></select>

    <button id="startBtn">Start Tuner</button>

    <div id="note">--</div>
    <div id="freq">0.00 Hz</div>
    <div id="cents">0 cents</div>

    <div id="legend"></div>
</div>

<script>
const tunings = {
    guitar: {
        "Standard (E A D G B E)": ["E2","A2","D3","G3","B3","E4"],
        "Drop D": ["D2","A2","D3","G3","B3","E4"],
        "Half Step Down": ["D#2","G#2","C#3","F#3","A#3","D#4"]
    },
    bass: {
        "4-String Standard (E A D G)": ["E1","A1","D2","G2"],
        "5-String Standard (B E A D G)": ["B0","E1","A1","D2","G2"],
        "Drop D": ["D1","A1","D2","G2"]
    }
};

const noteStrings = [
    "C","C#","D","D#","E","F",
    "F#","G","G#","A","A#","B"
];

let audioCtx;
let analyser;
let source;
let biquadFilter;
let dataArray;

const noteEl = document.getElementById("note");
const freqEl = document.getElementById("freq");
const centsEl = document.getElementById("cents");

function updateTunings() {
    const instrument = document.getElementById("instrumentSelect").value;
    const tuningSelect = document.getElementById("tuningSelect");

    tuningSelect.innerHTML = "";

    Object.keys(tunings[instrument]).forEach(tuning => {
        const option = document.createElement("option");
        option.value = tuning;
        option.textContent = tuning;
        tuningSelect.appendChild(option);
    });

    updateLegend();
}

function updateLegend() {
    const instrument = document.getElementById("instrumentSelect").value;
    const tuning = document.getElementById("tuningSelect").value;
    const notes = tunings[instrument][tuning];

    document.getElementById("legend").textContent =
        "Strings:\n" + notes.join("   ");
}

function updateFilterSettings() {
    if (!biquadFilter || !audioCtx) return;

    const inst = document.getElementById("instrumentSelect").value;

    if (inst === "bass") {
        biquadFilter.frequency.setValueAtTime(800, audioCtx.currentTime);
    } else {
        biquadFilter.frequency.setValueAtTime(1800, audioCtx.currentTime);
    }

    biquadFilter.Q.setValueAtTime(0.7, audioCtx.currentTime);
}

async function start() {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 4096;

    biquadFilter = audioCtx.createBiquadFilter();
    biquadFilter.type = "lowpass";

    updateFilterSettings();

    source = audioCtx.createMediaStreamSource(stream);

    source.connect(biquadFilter);
    biquadFilter.connect(analyser);

    dataArray = new Float32Array(analyser.fftSize);

    detectPitch();
}

function autoCorrelate(buffer, sampleRate) {
    let SIZE = buffer.length;
    let rms = 0;

    for (let i = 0; i < SIZE; i++) {
        rms += buffer[i] * buffer[i];
    }

    rms = Math.sqrt(rms / SIZE);

    if (rms < 0.01) return -1;

    let correlation = new Array(SIZE).fill(0);

    for (let offset = 0; offset < SIZE; offset++) {
        let sum = 0;
        for (let i = 0; i < SIZE - offset; i++) {
            sum += buffer[i] * buffer[i + offset];
        }
        correlation[offset] = sum;
    }

    let d = 0;
    while (d < SIZE - 1 && correlation[d] > correlation[d + 1]) d++;

    let maxVal = -1;
    let maxPos = -1;

    for (let i = d; i < SIZE; i++) {
        if (correlation[i] > maxVal) {
            maxVal = correlation[i];
            maxPos = i;
        }
    }

    if (maxPos === -1) return -1;

    return sampleRate / maxPos;
}

function noteFromPitch(frequency) {
    const noteNum = 12 * (Math.log(frequency / 440) / Math.log(2));
    return Math.round(noteNum) + 69;
}

function frequencyFromNoteNumber(note) {
    return 440 * Math.pow(2, (note - 69) / 12);
}

function centsOffFromPitch(freq, note) {
    return Math.floor(
        1200 * Math.log(freq / frequencyFromNoteNumber(note)) / Math.log(2)
    );
}

function detectPitch() {
    analyser.getFloatTimeDomainData(dataArray);

    const pitch = autoCorrelate(dataArray, audioCtx.sampleRate);

    if (pitch !== -1) {
        const note = noteFromPitch(pitch);
        const noteName = noteStrings[note % 12];
        const cents = centsOffFromPitch(pitch, note);

        noteEl.textContent = noteName;
        freqEl.textContent = pitch.toFixed(2) + " Hz";
        centsEl.textContent = cents + " cents";

        noteEl.className = "";

        if (Math.abs(cents) <= 5) {
            noteEl.classList.add("in-tune");
        } else if (cents > 0) {
            noteEl.classList.add("sharp");
        } else {
            noteEl.classList.add("flat");
        }
    }

    requestAnimationFrame(detectPitch);
}

document.getElementById("instrumentSelect").addEventListener("change", () => {
    updateTunings();
    updateFilterSettings();
});

document.getElementById("tuningSelect").addEventListener("change", updateLegend);

document.getElementById("startBtn").addEventListener("click", start);

updateTunings();
</script>

</body>
</html>
