<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lazzarus Prime Precision Tuner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
body{
    font-family:Segoe UI,Arial,sans-serif;
    background:#0f0f0f;
    color:white;
    margin:0;
    display:flex;
    flex-direction:column;
    min-height:100vh;
}
.titleBar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#141414;
    padding:12px;
    border-bottom:2px solid #222;
    flex-wrap:wrap;
}
.titleLeft{
    display:flex;
    align-items:center;
    gap:10px;
}
.titleBar img{width:40px;}

.titleLeft h2{
    margin:0;
    font-weight:900;
    text-transform:uppercase;
    background:linear-gradient(to bottom,#fff 20%,#f1c40f 45%,#b8860b 85%);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    filter:drop-shadow(0 0 5px rgba(241,196,15,0.6));
}

.socialLinks{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}
.socialLinks a{
    color:#aaa;
    text-decoration:none;
    font-size:14px;
}
.socialLinks a:hover{
    color:#f1c40f;
}

.topBar{
    display:flex;
    gap:8px;
    padding:12px;
    background:#181818;
    justify-content:center;
    border-bottom:1px solid #333;
}

.nav-btn,.action-btn{
    padding:10px 18px;
    border-radius:6px;
    cursor:pointer;
    font-weight:700;
    text-transform:uppercase;
    font-size:13px;
}

.nav-btn{
    background:#2a2a2a;
    color:white;
    border:1px solid #444;
}

.action-btn{
    background:#ff5500;
    color:white;
    border:none;
}

.action-btn.active{
    background:#c0392b;
    box-shadow:0 0 10px rgba(192,57,43,0.5);
}

.menu-row{
    display:flex;
    gap:15px;
    background:#141414;
    padding:12px 20px;
    justify-content:center;
    flex-wrap:wrap;
}

.menu-group{
    display:flex;
    flex-direction:column;
    gap:5px;
}

.menu-group label{
    font-size:11px;
    font-weight:900;
    color:#888;
}

select{
    background:#222;
    color:white;
    border:1px solid #444;
    padding:8px 12px;
    border-radius:4px;
    min-width:170px;
}

.app-workspace{
    flex:1;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    padding:30px;
    gap:25px;
}

.tuner-container{
    flex:1;
    max-width:650px;
}

.display-panel,.legend-panel{
    background:#141414;
    border:1px solid #222;
    border-radius:12px;
    padding:35px;
}

.legend-panel{
    width:260px;
}

.legend-title{
    text-align:center;
    color:#f1c40f;
    margin-bottom:12px;
    font-weight:900;
}

.legend-list{
    display:flex;
    flex-direction:column;
    gap:8px;
}

.legend-row{
    display:flex;
    justify-content:space-between;
    background:#1d1d1d;
    padding:10px;
    border-radius:6px;
}

.string-picker{
    display:flex;
    gap:8px;
    justify-content:center;
    margin-bottom:25px;
    flex-wrap:wrap;
}

.string-note{
    background:#222;
    padding:10px 16px;
    border-radius:6px;
}

.string-note.selected{
    background:#ff5500;
}

.string-note.selected.matched-intune{
    background:#27ae60;
}

.note-display{
    font-family:'Bebas Neue',sans-serif;
    font-size:130px;
    text-align:center;
}

.note-display.glow-intune{
    color:#27ae60;
}

.frequency-display{
    text-align:center;
    color:#888;
}

.status{
    display:block;
    text-align:center;
    margin-top:10px;
    font-weight:700;
}

.inTune{color:#27ae60;}
.offTune{color:#ff5500;}

canvas{
    width:100%;
    height:85px;
    margin-top:25px;
    background:#0b0b0b;
}
</style>
</head>

<body>

<div class="titleBar">
    <div class="titleLeft">
        <img src="guitar.png">
        <h2>Lazzarus Prime Tuner</h2>
    </div>
</div>

<div class="topBar">
    <button class="nav-btn" onclick="window.location.href='index.html'">🏠 Home</button>
    <button class="nav-btn" onclick="window.location.href='artists.html'">🎸 Artists</button>
    <button id="tunerBtn" class="action-btn" onclick="toggleTuner(event)">Start Tuner</button>
</div>

<div class="menu-row">
    <div class="menu-group">
        <label>Instrument</label>
        <select id="instrumentSelect" onchange="buildMenuHierarchy(); updateFilterSettings();">
            <option value="bass">Bass Guitar</option>
            <option value="guitar">Guitar</option>
        </select>
    </div>

    <div class="menu-group">
        <label>Strings</label>
        <select id="stringCountSelect" onchange="buildMenuHierarchy(); updateFilterSettings();">
            <option value="4">4-String</option>
            <option value="5">5-String</option>
            <option value="6">6-String</option>
        </select>
    </div>

    <div class="menu-group">
        <label>Tuning Profile</label>
        <select id="tuningProfileSelect" onchange="updateTargetStrings();"></select>
    </div>
</div>

<div class="app-workspace">
    <div class="tuner-container">
        <div class="display-panel">
            <div id="stringPicker" class="string-picker"></div>
            <div id="note" class="note-display">--</div>
            <div id="frequency" class="frequency-display">0.00 Hz</div>
            <div id="status" class="status offTune">Stopped</div>
            <canvas id="meterCanvas"></canvas>
        </div>
    </div>

    <div class="legend-panel">
        <div class="legend-title" id="legendTitle">Target Reference</div>
        <div class="legend-list" id="legendList"></div>
    </div>
</div>

<script>
const noteFrequencies = {
    "C":16.35,"C#":17.32,"D":18.35,"D#":19.45,"E":20.60,"F":21.83,
    "F#":23.12,"G":24.50,"G#":25.96,"A":27.50,"A#":29.14,"B":30.87
};

const notes=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];

const tuningMatrix={
    bass:{
        4:{ "Standard":["E","A","D","G"] },
        5:{ "Standard":["B","E","A","D","G"] },
        6:{ "Standard":["B","E","A","D","G","C"] }
    },
    guitar:{
        6:{ "Standard":["E","A","D","G","B","E"] }
    }
};

let audioCtx, analyser, biquadFilter, stream, source, buffer;
let isRunning=false;
let activeTargetNotes=[];
let activeTargetFrequencies=[];

const btn=document.getElementById("tunerBtn");
const noteEl=document.getElementById("note");
const freqEl=document.getElementById("frequency");
const statusEl=document.getElementById("status");
const picker=document.getElementById("stringPicker");

function buildMenuHierarchy(){
    const inst=document.getElementById("instrumentSelect").value;
    const strings=document.getElementById("stringCountSelect").value;
    const profile=document.getElementById("tuningProfileSelect");

    profile.innerHTML="";
    Object.keys(tuningMatrix[inst][strings]).forEach(p=>{
        let opt=document.createElement("option");
        opt.value=p;
        opt.textContent=p;
        profile.appendChild(opt);
    });

    updateTargetStrings();
}

function updateTargetStrings(){
    const inst=document.getElementById("instrumentSelect").value;
    const strings=document.getElementById("stringCountSelect").value;
    const profile=document.getElementById("tuningProfileSelect").value;

    activeTargetNotes=tuningMatrix[inst][strings][profile];
    activeTargetFrequencies=[];

    picker.innerHTML="";

    activeTargetNotes.forEach(n=>{
        let div=document.createElement("div");
        div.className="string-note";
        div.textContent=n;
        picker.appendChild(div);
        activeTargetFrequencies.push(noteFrequencies[n]*4);
    });
}

function updateFilterSettings(){
    if(!biquadFilter||!audioCtx)return;

    const inst=document.getElementById("instrumentSelect").value;

    if(inst==="bass"){
        biquadFilter.frequency.setValueAtTime(800,audioCtx.currentTime);
    }else{
        biquadFilter.frequency.setValueAtTime(1800,audioCtx.currentTime);
    }

    biquadFilter.Q.setValueAtTime(0.7,audioCtx.currentTime);
}

function detectPitch(buffer,sampleRate){
    let bestOffset=-1;
    let bestCorrelation=0;

    for(let offset=20;offset<1000;offset++){
        let correlation=0;

        for(let i=0;i<buffer.length-offset;i++){
            correlation+=Math.abs(buffer[i]-buffer[i+offset]);
        }

        correlation=1-(correlation/buffer.length);

        if(correlation>bestCorrelation){
            bestCorrelation=correlation;
            bestOffset=offset;
        }
    }

    if(bestCorrelation>0.9){
        return sampleRate/bestOffset;
    }

    return -1;
}

function detect(){
    if(!isRunning)return;

    analyser.getFloatTimeDomainData(buffer);
    const pitch=detectPitch(buffer,audioCtx.sampleRate);

    if(pitch!==-1){
        freqEl.textContent=pitch.toFixed(2)+" Hz";

        let closest=activeTargetFrequencies.reduce((a,b)=>
            Math.abs(b-pitch)<Math.abs(a-pitch)?b:a
        );

        noteEl.textContent=activeTargetNotes[activeTargetFrequencies.indexOf(closest)];

        if(Math.abs(pitch-closest)<2){
            statusEl.textContent="IN TUNE";
            statusEl.className="status inTune";
        }else{
            statusEl.textContent="Adjust";
            statusEl.className="status offTune";
        }
    }

    requestAnimationFrame(detect);
}

async function start(){
    stream=await navigator.mediaDevices.getUserMedia({audio:true});

    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    analyser=audioCtx.createAnalyser();

    analyser.fftSize=4096;

    biquadFilter=audioCtx.createBiquadFilter();
    biquadFilter.type="lowpass";

    updateFilterSettings();

    source=audioCtx.createMediaStreamSource(stream);
    source.connect(biquadFilter);
    biquadFilter.connect(analyser);

    buffer=new Float32Array(analyser.fftSize);

    isRunning=true;
    detect();
}

function stop(){
    isRunning=false;

    if(stream)stream.getTracks().forEach(t=>t.stop());
    if(audioCtx)audioCtx.close();

    noteEl.textContent="--";
    freqEl.textContent="0.00 Hz";
    statusEl.textContent="Stopped";
}

async function toggleTuner(){
    if(!isRunning){
        btn.textContent="Stop Tuner";
        btn.classList.add("active");
        await start();
    }else{
        btn.textContent="Start Tuner";
        btn.classList.remove("active");
        stop();
    }
}

buildMenuHierarchy();
</script>

</body>
</html>
