<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lazzarus Prime Precision Tuner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
body{ font-family:Segoe UI,Arial,sans-serif; background:#0f0f0f; color:white; margin:0; display:flex; flex-direction:column; min-height:100vh;}
.titleBar{display:flex;justify-content:space-between;align-items:center;background:#141414;padding:12px;border-bottom:2px solid #222;flex-wrap:wrap;}
.titleLeft{display:flex;align-items:center;gap:10px;}
.titleBar h2{margin:0;font-weight:900;text-transform:uppercase;background:linear-gradient(to bottom,#fff 20%,#f1c40f 45%,#b8860b 85%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.socialLinks{display:flex;gap:15px;}
.socialLinks a{color:#aaa;text-decoration:none;}
.topBar{display:flex;justify-content:center;gap:12px;padding:12px;background:#181818;border-bottom:1px solid #333;}
.nav-btn,.action-btn{background:#2a2a2a;color:white;border:1px solid #444;padding:10px 18px;border-radius:6px;cursor:pointer;font-weight:700;text-transform:uppercase;}
.action-btn{background:#ff5500;}
.action-btn.active{background:#c0392b;box-shadow:0 0 15px rgba(255,85,0,.6);}
.menu-row{display:flex;gap:15px;background:#141414;padding:12px 20px;justify-content:center;flex-wrap:wrap;}
.menu-group{display:flex;flex-direction:column;gap:5px;}
select{background:#222;color:white;border:1px solid #444;padding:8px 12px;border-radius:4px;}
.app-workspace{flex:1;display:flex;flex-wrap:wrap;justify-content:center;padding:30px;gap:25px;}
.tuner-container{flex:1;min-width:320px;max-width:650px;}
.display-panel,.legend-panel{background:#141414;border:1px solid #222;border-radius:12px;padding:35px;text-align:center;}
.legend-panel{width:260px;}
.note-display{font-family:'Bebas Neue';font-size:130px;line-height:1;}
.status{font-size:18px;font-weight:700;padding:6px 16px;border-radius:6px;display:inline-block;}
canvas{background:#0b0b0b;border-radius:8px;border:1px solid #222;width:100%;height:85px;margin-top:25px;}
.string-note{background:#222;border:1px solid #333;color:#666;padding:10px 16px;border-radius:6px;font-weight:700;cursor:pointer;}
.string-note.selected{background:#ff5500;color:#fff;box-shadow:0 0 15px rgba(255,85,0,.5);}
</style>
</head>
<body>

<div class="titleBar">
<div class="titleLeft"><h2>Lazzarus Prime Tuner</h2></div>
<div class="socialLinks">
<a href="#">🎸 Twitch</a>
<a href="#">💬 Discord</a>
<a href="#">💰 Donations</a>
</div>
</div>

<div class="topBar">
<button class="nav-btn" onclick="window.location.reload()">Reset</button>
<button id="tunerBtn" class="action-btn" onclick="toggleTuner()">Start Tuner</button>
</div>

<div class="menu-row">
<div class="menu-group">
<label>Instrument</label>
<select id="instrumentSelect">
<option>Bass Guitar</option>
<option>Guitar</option>
</select>
</div>
</div>

<div class="app-workspace">
<div class="tuner-container">
<div class="display-panel">
<div id="stringPicker" style="display:flex;gap:8px;justify-content:center;margin-bottom:20px;"></div>
<div id="note" class="note-display">--</div>
<div id="frequency">0.00 Hz</div>
<div id="status" class="status">Stopped</div>
<canvas id="meterCanvas" width="600" height="85"></canvas>
</div>
</div>

<div class="legend-panel">
<h3>Target Reference</h3>
<div id="legendList"></div>
</div>
</div>

<script>
let audioCtx, analyser, source, stream;
let isRunning=false;
let raf;
let selectedFreq=41.20;

const bassStrings=[
{name:"E",freq:41.20},
{name:"A",freq:55.00},
{name:"D",freq:73.42},
{name:"G",freq:98.00}
];

function buildStrings(){
    const picker=document.getElementById("stringPicker");
    const legend=document.getElementById("legendList");
    picker.innerHTML="";
    legend.innerHTML="";
    
    bassStrings.forEach((s,i)=>{
        let btn=document.createElement("div");
        btn.className="string-note"+(i===0?" selected":"");
        btn.textContent=s.name;
        btn.onclick=()=>{
            document.querySelectorAll(".string-note").forEach(x=>x.classList.remove("selected"));
            btn.classList.add("selected");
            selectedFreq=s.freq;
        };
        picker.appendChild(btn);

        let row=document.createElement("div");
        row.innerHTML=`${s.name} — ${s.freq.toFixed(2)} Hz`;
        legend.appendChild(row);
    });
}
buildStrings();

function yin(buffer,sampleRate){
    let threshold=0.15;
    let tauEstimate=-1;
    let yinBuffer=new Float32Array(buffer.length/2);

    for(let tau=1;tau<yinBuffer.length;tau++){
        for(let i=0;i<yinBuffer.length;i++){
            let delta=buffer[i]-buffer[i+tau];
            yinBuffer[tau]+=delta*delta;
        }
    }

    yinBuffer[0]=1;
    let runningSum=0;
    for(let tau=1;tau<yinBuffer.length;tau++){
        runningSum+=yinBuffer[tau];
        yinBuffer[tau]*=tau/runningSum;
    }

    for(let tau=2;tau<yinBuffer.length;tau++){
        if(yinBuffer[tau]<threshold){
            while(tau+1<yinBuffer.length&&yinBuffer[tau+1]<yinBuffer[tau]) tau++;
            tauEstimate=tau;
            break;
        }
    }

    return tauEstimate>0?sampleRate/tauEstimate:null;
}

function drawMeter(cents){
    const canvas=document.getElementById("meterCanvas");
    const ctx=canvas.getContext("2d");
    ctx.clearRect(0,0,canvas.width,canvas.height);

    let center=canvas.width/2;

    ctx.strokeStyle="#444";
    ctx.beginPath();
    ctx.moveTo(center,0);
    ctx.lineTo(center,canvas.height);
    ctx.stroke();

    let x=center+(cents*5);

    ctx.strokeStyle=Math.abs(cents)<5?"#27ae60":"#ff5500";
    ctx.lineWidth=5;
    ctx.beginPath();
    ctx.moveTo(x,0);
    ctx.lineTo(x,canvas.height);
    ctx.stroke();
}

function centsOff(freq,target){
    return 1200*Math.log2(freq/target);
}

function update(){
    if(!isRunning)return;

    const data=new Float32Array(analyser.fftSize);
    analyser.getFloatTimeDomainData(data);

    const pitch=yin(data,audioCtx.sampleRate);

    if(pitch){
        const cents=centsOff(pitch,selectedFreq);

        document.getElementById("frequency").textContent=pitch.toFixed(2)+" Hz";
        document.getElementById("note").textContent=document.querySelector(".string-note.selected").textContent;

        if(Math.abs(cents)<5){
            document.getElementById("status").textContent="IN TUNE";
            document.getElementById("status").style.color="#27ae60";
        }else if(cents<0){
            document.getElementById("status").textContent="TUNE UP";
            document.getElementById("status").style.color="#ff5500";
        }else{
            document.getElementById("status").textContent="TUNE DOWN";
            document.getElementById("status").style.color="#3498db";
        }

        drawMeter(cents);
    }

    raf=requestAnimationFrame(update);
}

async function start(){
    stream=await navigator.mediaDevices.getUserMedia({
        audio:{
            echoCancellation:false,
            noiseSuppression:false,
            autoGainControl:false
        }
    });

    audioCtx=new AudioContext();
    analyser=audioCtx.createAnalyser();
    analyser.fftSize=4096;

    source=audioCtx.createMediaStreamSource(stream);
    source.connect(analyser);

    isRunning=true;
    update();
}

function stop(){
    isRunning=false;
    cancelAnimationFrame(raf);
    stream.getTracks().forEach(t=>t.stop());
    audioCtx.close();
}

async function toggleTuner(){
    const btn=document.getElementById("tunerBtn");

    if(!isRunning){
        await start();
        btn.textContent="Stop Tuner";
        btn.classList.add("active");
    }else{
        stop();
        btn.textContent="Start Tuner";
        btn.classList.remove("active");
        document.getElementById("status").textContent="Stopped";
    }
}
</script>
</body>
</html>
