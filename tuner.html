<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lazzarus Prime Precision Tuner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
body{ font-family:Segoe UI,Arial,sans-serif; background:#0f0f0f; color:white; margin:0; display: flex; flex-direction: column; min-height: 100vh; }
.titleBar{ display:flex; justify-content:space-between; align-items:center; background:#141414; padding:12px; border-bottom:2px solid #222; flex-wrap:wrap; }
.titleLeft{ display:flex; align-items:center; gap:10px; }
.titleBar img{ width:40px; }

/* METALLIC HEADER TEXT */
.titleLeft h2 { 
  margin: 0; 
  font-weight: 900; 
  text-transform: uppercase; 
  background: linear-gradient(to bottom, #fff 20%, #f1c40f 45%, #b8860b 85%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 5px rgba(241, 196, 15, 0.6));
}

.socialLinks{ display:flex; gap:15px; flex-wrap:wrap; }
.socialLinks a{ color:#aaa; text-decoration:none; font-size:14px; transition:.15s; }
.socialLinks a:hover{ color:#f1c40f; text-shadow:0 0 5px #f1c40f; }

.topBar{
  display:flex;
  gap:8px;
  padding:12px;
  background:#181818;
  position:sticky;
  top:0;
  z-index:100;
  flex-wrap:wrap;
  align-items:center;
  border-bottom: 1px solid #333;
}
.topBar-nav { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.topBar-action { margin-left: auto; }

.nav-btn { 
  background:#2a2a2a; 
  color:white; 
  border:1px solid #444; 
  padding:10px 18px; 
  border-radius:6px; 
  cursor:pointer; 
  font-weight: 700; 
  text-transform: uppercase;
  font-size: 13px;
  transition: .2s;
}
.nav-btn:hover { background:#444; border-color: #f1c40f; color: #f1c40f; }

.action-btn {
  background:#ff5500;
  color:white;
  border:none;
  padding:10px 18px;
  border-radius:6px;
  cursor:pointer;
  font-weight:700;
  text-transform:uppercase;
  font-size:13px;
  transition:.2s;
}
.action-btn:hover { background:#ff7733; }
.action-btn.active { background:#c0392b; box-shadow:0 0 10px rgba(192,57,43,0.5); }

.menu-row {
    display: flex;
    gap: 15px;
    background: #141414;
    padding: 12px 20px;
    justify-content: center;
    border-bottom: 1px solid #222;
    flex-wrap: wrap;
}
.menu-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
}
.menu-group label {
    font-size: 11px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #888;
}

select {
    background: #222;
    color: white;
    border: 1px solid #444;
    padding: 8px 12px;
    border-radius: 4px;
    font-family: 'Segoe UI', Arial, sans-serif;
    font-size: 14px;
    cursor: pointer;
    min-width: 170px;
    transition: border-color 0.15s ease;
}
select:focus { outline: none; border-color: #f1c40f; }

.app-workspace {
    flex: 1;
    display: flex;
    flex-wrap: wrap;
    align-items: flex-start;
    justify-content: center;
    padding: 30px;
    max-width: 1000px;
    margin: 0 auto;
    width: 100%;
    box-sizing: border-box;
    gap: 25px;
}
.tuner-container {
    flex: 1;
    min-width: 320px;
    max-width: 650px;
    width: 100%;
    box-sizing: border-box;
}
.display-panel {
    background: #141414;
    border: 1px solid #222;
    border-radius: 12px;
    padding: 35px;
    width: 100%;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    box-sizing: border-box;
}

.legend-panel {
    width: 260px;
    background: #141414;
    border: 1px solid #222;
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    box-sizing: border-box;
}
.legend-title {
    font-size: 12px;
    font-weight: 900;
    text-transform: uppercase;
    color: #f1c40f;
    letter-spacing: 1px;
    border-bottom: 1px solid #222;
    padding-bottom: 10px;
    margin-bottom: 12px;
    text-align: center;
}
.legend-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
}
.legend-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #1d1d1d;
    padding: 10px 14px;
    border-radius: 6px;
    border: 1px solid transparent;
    font-size: 13px;
    color: #888;
}
.legend-row.active-string {
    border-color: #ff5500;
    background: #1f1410;
    color: white;
}
.legend-row.active-string.in-tune {
    border-color: #2ecc71;
    background: #0f1c14;
}
.string-lbl { font-weight: 900; color: #fff; font-size: 15px; }
.hz-lbl { font-family: monospace; color: #666; }
.legend-row.active-string .hz-lbl { color: #aaa; }

.picker-label {
    font-size: 11px;
    font-weight: 900;
    text-transform: uppercase;
    color: #555;
    letter-spacing: 1.5px;
    margin-bottom: 8px;
}
.picker-container {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-bottom: 30px;
    flex-wrap: wrap;
}
.string-note {
    background: #1e1e1e;
    color: #777;
    border: 1px solid #333;
    padding: 8px 14px;
    border-radius: 6px;
    font-weight: 900;
    font-size: 14px;
    min-width: 38px;
    text-align: center;
    transition: .15s ease;
}
.string-note.active-note {
    background: #ff5500;
    color: white;
    border-color: #ff5500;
    box-shadow: 0 0 10px rgba(255,85,0,0.3);
}
.string-note.active-note.in-tune {
    background: #2ecc71;
    border-color: #2ecc71;
    box-shadow: 0 0 10px rgba(46,204,113,0.3);
}

.note-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 110px;
    line-height: 1;
    margin: 10px 0;
    color: #222;
    letter-spacing: -2px;
    transition: color 0.15s ease, text-shadow 0.15s ease;
}
.note-display.active {
    color: #fff;
    text-shadow: 0 0 20px rgba(255,255,255,0.2);
}
.note-display.flaming {
    color: #ff5500;
    text-shadow: 0 0 25px rgba(255,85,0,0.5), 0 0 50px rgba(255,85,0,0.2);
}
.note-display.matched {
    color: #2ecc71;
    text-shadow: 0 0 30px rgba(46,204,113,0.6), 0 0 60px rgba(46,204,113,0.3);
    animation: pulseGlow 1.5s infinite;
}
@keyframes pulseGlow {
    0%, 100% { text-shadow: 0 0 30px rgba(46,204,113,0.6), 0 0 60px rgba(46,204,113,0.3); }
    50% { text-shadow: 0 0 45px rgba(46,204,113,0.9), 0 0 80px rgba(46,204,113,0.5), 0 0 18px #2ecc71; }
}

.frequency-display { font-size: 16px; color: #888; margin-bottom: 20px; }
.status { font-size: 18px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; padding: 6px 16px; border-radius: 6px; display: inline-block; }
.inTune { color: #27ae60; background: rgba(39, 174, 96, 0.1); border: 1px solid rgba(39, 174, 96, 0.3); }
.offTune { color: #ff5500; background: rgba(255, 85, 0, 0.1); border: 1px solid rgba(255, 85, 0, 0.2); }
canvas { background: #0b0b0b; border-radius: 8px; border: 1px solid #222; margin-top: 25px; width: 100%; height: 60px; display: block; }

footer { text-align: center; padding: 30px 20px; font-size: 13px; color: #333; border-top: 1px solid #141414; margin-top: auto; }
footer a { color: #555; text-decoration: none; }
footer a:hover { color: #f1c40f; }

@media(max-width: 768px) {
    .app-workspace { padding: 15px; gap: 15px; }
    .legend-panel { width: 100%; }
    .note-display { font-size: 90px; }
    .display-panel { padding: 25px 15px; }
}
</style>
</head>
<body>

  <div class="titleLeft">
    <img src="guitar.png" alt="Logo">
    <h2>Lazzarus Prime Matrix</h2>
  </div>
  <div class="socialLinks">
    <a href="index.html">Songs</a>
    <a href="artists.html">Artists</a>
    <a href="stats.html">Stats</a>
    <a href="tuner.html" style="color:#f1c40f;font-weight:900">Tuner</a>
    <a href="gear.html">Gear</a>
  </div>
</div>

<div class="topBar">
  <div class="topBar-nav">
     <button class="nav-btn" onclick="location.href='index.html?nosplash=1'">Back to Main Library Index</button>
  </div>
  <div class="topBar-action">
     <button class="action-btn" id="toggleTunerBtn">Start Tuner</button>
  </div>
</div>

<div class="menu-row">
    <div class="menu-group">
        <label for="instrumentPreset">Instrument Config Profile</label>
        <select id="instrumentPreset"></select>
    </div>
    <div class="menu-group">
        <label for="tuningPreset">Target Tuning Architecture</label>
        <select id="tuningPreset"></select>
    </div>
</div>

<div class="app-workspace">
    <div class="tuner-container">
        <div class="display-panel">
            <div class="picker-label" id="pickerLabel">Frequency Targets Spectrum</div>
            <div class="picker-container" id="pickerContainer"></div>
            
            <div class="status offTune" id="statusField">Stopped</div>
            <div class="note-display" id="noteField">--</div>
            <div class="frequency-display" id="freqField">0.00 Hz</div>
            
            <canvas id="meterCanvas"></canvas>
        </div>
    </div>

    <div class="legend-panel">
        <div class="legend-title" id="legendTitle">Tuning Registry</div>
        <div class="legend-list" id="legendListContainer"></div>
    </div>
</div>

<footer>
  Powered by YIN Pitch Extraction Engine Matrix Engine Matrix &nbsp;·&nbsp; <a href="index.html">Return Home</a>
</footer>

<script>
const INSTRUMENT_MANIFEST = {
    "bass-4": {
        name: "4-String Bass Platform",
        baseOctave: 1,
        tunings: {
            "Standard E": ["E", "A", "D", "G"],
            "Drop D": ["D", "A", "D", "G"],
            "D Standard": ["D", "G", "C", "F"],
            "Drop C": ["C", "G", "C", "F"],
            "C Standard": ["C", "F", "A#", "D#"],
            "Drop B": ["B", "F#", "B", "E"],
            "B Standard": ["B", "E", "A", "D"],
            "Half-Step Down": ["D#", "G#", "C#", "F#"]
        }
    },
    "bass-6": {
        name: "6-String Extended Bass",
        baseOctave: 1,
        tunings: {
            "Standard B": ["B", "E", "A", "D", "G", "C"]
        }
    },
    "guitar-6": {
        name: "6-String Electric Rig",
        baseOctave: 2,
        tunings: {
            "Standard E": ["E", "A", "D", "G", "B", "E"],
            "Half-Step Down": ["D#", "G#", "C#", "F#", "A#", "D#"],
            "Full-Step Down": ["D", "G", "C", "F", "A", "D"],
            "Drop C": ["C", "G", "C", "F", "A", "D"],
            "Drop B": ["B", "F#", "B", "E", "G#", "C#"],
            "Drop A": ["A", "E", "A", "D", "F#", "B"],
            "Open G": ["D", "G", "D", "G", "B", "D"],
            "Open D": ["D", "A", "D", "F#", "A", "D"],
            "DADGAD": ["D", "A", "D", "G", "A", "D"]
        }
    }
};

const noteFrequencies = {
    "C": 16.35, "C#": 17.32, "D": 18.35, "D#": 19.45, "E": 20.60, "F": 21.83,
    "F#": 23.12, "G": 24.50, "G#": 25.96, "A": 27.50, "A#": 29.14, "B": 30.87
};
const notes = Object.keys(noteFrequencies);

let audioCtx = null;
let analyser = null;
let source = null;
let stream = null;
let buffer = null;
let isRunning = false;
let rafId = null;

let activeTargetNotes = [];
let activeTargetFrequencies = [];
let smoothedFrequency = 0;
let smoothedCents = 0;

const instEl = document.getElementById("instrumentPreset");
const tuneEl = document.getElementById("tuningPreset");
const btn = document.getElementById("toggleTunerBtn");
const statusEl = document.getElementById("statusField");
const noteEl = document.getElementById("noteField");
const freqEl = document.getElementById("freqField");
const pickerContainer = document.getElementById("pickerContainer");
const legendListContainer = document.getElementById("legendListContainer");
const canvas = document.getElementById("meterCanvas");
const ctx = canvas.getContext("2d");

document.addEventListener("DOMContentLoaded", () => {
    Object.keys(INSTRUMENT_MANIFEST).forEach(k => {
        let opt = document.createElement("option");
        opt.value = k;
        opt.textContent = INSTRUMENT_MANIFEST[k].name;
        instEl.appendChild(opt);
    });
    
    instEl.value = "bass-4"; // Force 4 string layout standard target preset default boundary
    updateTuningDropdown();

    instEl.onchange = () => { updateTuningDropdown(); };
    tuneEl.onchange = () => { buildActiveTargets(); };
    btn.onclick = (e) => { toggleTuner(e); };
    
    buildActiveTargets();
    drawMeter(null, false);
});

function updateTuningDropdown() {
    tuneEl.innerHTML = "";
    const inst = instEl.value;
    Object.keys(INSTRUMENT_MANIFEST[inst].tunings).forEach(t => {
        let opt = document.createElement("option");
        opt.value = t;
        opt.textContent = t;
        tuneEl.appendChild(opt);
    });
    buildActiveTargets();
}

function buildActiveTargets() {
    pickerContainer.innerHTML = "";
    legendListContainer.innerHTML = "";
    activeTargetNotes = [];
    activeTargetFrequencies = [];

    const inst = instEl.value;
    const tune = tuneEl.value;
    if (!inst || !tune) return;

    activeTargetNotes = INSTRUMENT_MANIFEST[inst].tunings[tune];
    let baseOctave = INSTRUMENT_MANIFEST[inst].baseOctave;

    let octave = baseOctave;
    let prevNoteIdx = -1;

    activeTargetNotes.forEach((note, index) => {
        const noteIdx = notes.indexOf(note);
        if (index > 0 && noteIdx >= prevNoteIdx) {
            octave++;
        }
        prevNoteIdx = noteIdx;
        
        const finalHz = noteFrequencies[note] * Math.pow(2, octave);
        activeTargetFrequencies.push(finalHz);

        let block = document.createElement("div");
        block.className = "string-note";
        block.textContent = note;
        pickerContainer.appendChild(block);

        let legendRow = document.createElement("div");
        legendRow.className = "legend-row";
        legendRow.id = `legend-row-${index}`;
        legendRow.innerHTML = `
            <span class="string-lbl">${note}</span>
            <span>String ${index + 1}</span>
            <span class="hz-lbl">${finalHz.toFixed(2)} Hz</span>
        `;
        legendListContainer.appendChild(legendRow);
    });
}

function findClosestStringIndex(detectedFreq) {
    if (!activeTargetFrequencies.length) return -1;
    let minDiff = Infinity;
    let idx = -1;
    activeTargetFrequencies.forEach((target, i) => {
        let diff = Math.abs(detectedFreq - target);
        if (diff < minDiff) {
            minDiff = diff;
            idx = i;
        }
    });
    // Strict recognition validation boundary path filtering metrics profile limits range thresholds
    if (minDiff > activeTargetFrequencies[idx] * 0.25) return -1;
    return idx;
}

async function start() {
    if (audioCtx) return;
    
    // Polyfill profile audio stage hooks context
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    audioCtx = new AudioContext();
    
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048; 
    
    try {
        stream = await navigator.mediaDevices.getUserMedia({ 
            audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } 
        });
        source = audioCtx.createMediaStreamSource(stream);
        source.connect(analyser);
        buffer = new Float32Array(analyser.fftSize);
        
        smoothedFrequency = 0;
        isRunning = true;
        detect();
    } catch (err) {
        alert("Audio device capture failed: " + err.message);
        stop();
    }
}

function stop() {
    isRunning = false;
    if (rafId) cancelAnimationFrame(rafId);
    if (stream) stream.getTracks().forEach(t => t.stop());
    if (audioCtx) audioCtx.close();

    stream = null; audioCtx = null; analyser = null; source = null; buffer = null;

    btn.textContent = "Start Tuner";
    btn.classList.remove("active");
    statusEl.textContent = "Stopped";
    statusEl.className = "status offTune";
    noteEl.textContent = "--";
    noteEl.className = "note-display";
    freqEl.textContent = "0.00 Hz";
    smoothedCents = 0;
    smoothedFrequency = 0;
    
    document.querySelectorAll(".string-note").forEach(b => b.className = "string-note");
    document.querySelectorAll(".legend-row").forEach(r => r.className = "legend-row");
    drawMeter(null, false);
}

async function toggleTuner(e) {
    e.target.blur();
    if (!isRunning) {
        btn.textContent = "Stop Tuner";
        btn.classList.add("active");
        await start();
    } else {
        stop();
    }
}

function detect() {
    if (!isRunning) return;
    
    analyser.getFloatTimeDomainData(buffer);
    const signalFrequency = yinPitchExtraction(buffer, audioCtx.sampleRate);
    
    // Highlight elements profile logic resets UI markers
    document.querySelectorAll(".string-note").forEach(b => b.className = "string-note");
    document.querySelectorAll(".legend-row").forEach(r => r.className = "legend-row");

    if (signalFrequency !== -1 && signalFrequency > 20 && signalFrequency < 1000) {
        if (smoothedFrequency === 0) smoothedFrequency = signalFrequency;
        else smoothedFrequency = (smoothedFrequency * 0.7) + (signalFrequency * 0.3); // Responsive easing algorithms logic

        freqEl.textContent = `${smoothedFrequency.toFixed(2)} Hz`;
        const targetStringIdx = findClosestStringIndex(smoothedFrequency);

        if (targetStringIdx !== -1) {
            const targetHz = activeTargetFrequencies[targetStringIdx];
            const targetNote = activeTargetNotes[targetStringIdx];
            
            const calculatedCents = 1200 * Math.log2(smoothedFrequency / targetHz);
            smoothedCents = (smoothedCents * 0.5) + (calculatedCents * 0.5);

            noteEl.textContent = targetNote;
            const inTune = Math.abs(smoothedCents) <= 2.5;

            const noteBlocks = pickerContainer.querySelectorAll(".string-note");
            const legendRows = legendListContainer.querySelectorAll(".legend-row");

            if (inTune) {
                if(noteBlocks[targetStringIdx]) noteBlocks[targetStringIdx].className = "string-note active-note in-tune";
                if(legendRows[targetStringIdx]) legendRows[targetStringIdx].className = "legend-row active-string in-tune";
                
                statusEl.textContent = "In Tune";
                statusEl.className = "status inTune";
                noteEl.className = "note-display matched";
            } else {
                if(noteBlocks[targetStringIdx]) noteBlocks[targetStringIdx].className = "string-note active-note";
                if(legendRows[targetStringIdx]) legendRows[targetStringIdx].className = "legend-row active-string";
                
                statusEl.textContent = smoothedCents > 0 ? `+${Math.round(smoothedCents)} Sharp` : `${Math.round(smoothedCents)} Flat`;
                statusEl.className = "status offTune";
                noteEl.className = "note-display flaming";
            }
            drawMeter(smoothedCents, inTune);
        } else {
            // General pitch identification edge fallback boundaries maps profile directly back to scale array spectrum
            const { noteName, cents } = getNoteAndCentsFromFreq(smoothedFrequency);
            noteEl.textContent = noteName;
            noteEl.className = "note-display active";
            statusEl.textContent = cents > 0 ? `+${Math.round(cents)} Cents` : `${Math.round(cents)} Cents`;
            statusEl.className = "status offTune";
            drawMeter(cents, false);
        }
    } else {
        // Clear signal state decay timeline configuration
        noteEl.className = "note-display";
        statusEl.textContent = "Listening...";
        statusEl.className = "status offTune";
        drawMeter(null, false);
    }
    
    rafId = requestAnimationFrame(detect);
}

function getNoteAndCentsFromFreq(frequency) {
    const c5 = 440 * Math.pow(2, -4.75); // base note definitions context
    const k = Math.round(12 * Math.log2(frequency / c5));
    const noteName = notes[((k % 12) + 12) % 12];
    const targetHz = c5 * Math.pow(2, k / 12);
    const cents = 1200 * Math.log2(frequency / targetHz);
    return { noteName, cents };
}

// ── YIN PITCH EXTRACTION CORE DSP ALGORITHM ARCHITECTURE ──
function yinPitchExtraction(buffer, sampleRate) {
    const len = buffer.length;
    const halfLen = Math.floor(len / 2);
    const differenceValues = new Float32Array(halfLen);
    
    // Phase 1: Squared Difference Absolute Calculations Function Pipeline
    for (let tau = 0; tau < halfLen; tau++) {
        for (let j = 0; j < halfLen; j++) {
            const delta = buffer[j] - buffer[j + tau];
            differenceValues[tau] += delta * delta;
        }
    }
    
    // Phase 2: Cumulative Mean Normalized Absolute Optimization Bounds
    const correlationValues = new Float32Array(halfLen);
    correlationValues[0] = 1;
    let runningSum = 0;
    for (let tau = 1; tau < halfLen; tau++) {
        runningSum += differenceValues[tau];
        correlationValues[tau] = differenceValues[tau] / ((1 / tau) * runningSum);
    }
    
    // Phase 3: Threshold Filtering Intersections Discovery Logic Boundary Rules
    const threshold = 0.15;
    let periodSamples = -1;
    for (let tau = 1; tau < halfLen; tau++) {
        if (correlationValues[tau] < threshold) {
            periodSamples = tau;
            break;
        }
    }
    
    if (periodSamples === -1) {
        let localMinima = Infinity;
        for (let tau = 1; tau < halfLen; tau++) {
            if (correlationValues[tau] < localMinima) {
                localMinima = correlationValues[tau];
                periodSamples = tau;
            }
        }
    }
    
    // Phase 4: Parabolic Interpolation Easing Functions Matrix
    if (periodSamples > 0 && periodSamples < halfLen - 1) {
        const alpha = correlationValues[periodSamples - 1];
        const beta = correlationValues[periodSamples];
        const gamma = correlationValues[periodSamples + 1];
        const denominator = 2 * (alpha - 2 * beta + gamma);
        if (denominator !== 0) { periodSamples = periodSamples + (alpha - gamma) / denominator; }
    }
    
    if (periodSamples !== -1 && periodSamples > 0) return sampleRate / periodSamples;
    return -1;
}

function drawMeter(targetCents, inTune) {
    if (canvas.width !== canvas.clientWidth || canvas.height !== canvas.clientHeight) {
        canvas.width = canvas.clientWidth; canvas.height = canvas.clientHeight;
    }
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const midX = canvas.width / 2;
    
    // Draw underlying grid lines tracking spectrum profiles
    ctx.strokeStyle = "#222"; ctx.lineWidth = 1;
    for(let offset = -40; offset <= 40; offset += 20) {
        const lineX = midX + (offset * (canvas.width / 100));
        ctx.beginPath(); ctx.moveTo(lineX, 0); ctx.lineTo(lineX, canvas.height); ctx.stroke();
    }
    
    // Center point marker bar anchors
    ctx.strokeStyle = inTune ? "#2ecc71" : "#444"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(midX, 0); ctx.lineTo(midX, canvas.height); ctx.stroke();
    
    if (targetCents !== null) {
        // Clamp bounds range metrics array parameters limit bounds values mapping tracking configurations
        let boundedCents = Math.max(-50, Math.min(50, targetCents));
        const indicatorX = midX + (boundedCents * (canvas.width / 100));
        
        ctx.strokeStyle = inTune ? "#2ecc71" : "#ff5500"; ctx.lineWidth = 4;
        ctx.shadowBlur = inTune ? 15 : 8; ctx.shadowColor = inTune ? "#2ecc71" : "#ff5500";
        ctx.beginPath(); ctx.moveTo(indicatorX, 2); ctx.lineTo(indicatorX, canvas.height - 2); ctx.stroke();
        
        // Reset tracking frame context shadows
        ctx.shadowBlur = 0;
    }
}
