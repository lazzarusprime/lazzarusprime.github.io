<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lazzarus Prime Precision Tuner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
body{ font-family:Segoe UI,Arial,sans-serif; background:#0f0f0f; color:white; margin:0; display: flex; flex-direction: column; min-height: 100vh; }
.titleBar{ display:flex; justify-content:space-between; align-items:center; background:#141414; padding:12px; border-bottom:2px solid #222; flex-wrap:wrap; }
.titleLeft{ display:flex; align-items:center; gap:10px; }
.titleBar img{ width:40px; }

/* METALLIC HEADER TEXT */
.titleLeft h2 { 
  margin: 0; 
  font-weight: 900; 
  text-transform: uppercase; 
  background: linear-gradient(to bottom, #fff 20%, #f1c40f 45%, #b8860b 85%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 5px rgba(241, 196, 15, 0.6));
}

.socialLinks{ display:flex; gap:15px; flex-wrap:wrap; }
.socialLinks a{ color:#aaa; text-decoration:none; font-size:14px; transition:.15s; }
.socialLinks a:hover{ color:#f1c40f; text-shadow:0 0 5px #f1c40f; }

.topBar{ display:flex; gap:8px; padding:12px; background:#181818; position:sticky; top:0; z-index:100; flex-wrap:wrap; justify-content:center; align-items:center; border-bottom: 1px solid #333; }

/* PROMINENT NAVIGATION BUTTONS */
.nav-btn { 
  background:#2a2a2a; 
  color:white; 
  border:1px solid #444; 
  padding:10px 18px; 
  border-radius:6px; 
  cursor:pointer; 
  font-weight: 700; 
  text-transform: uppercase;
  font-size: 13px;
  transition: .2s;
}
.nav-btn:hover { background:#444; border-color: #f1c40f; color: #f1c40f; }

/* ACTION BUTTON STYLING */
.action-btn {
  background:#ff5500;
  color:white;
  border:none;
  padding:10px 18px;
  border-radius:6px;
  cursor:pointer;
  font-weight:700;
  text-transform:uppercase;
  font-size:13px;
  transition:.2s;
}
.action-btn:hover { background:#ff7733; }
.action-btn.active { background:#c0392b; box-shadow:0 0 10px rgba(192,57,43,0.5); }

/* HIERARCHICAL SELECT MENU CONTAINER */
.menu-row {
    display: flex;
    gap: 15px;
    background: #141414;
    padding: 12px 20px;
    justify-content: center;
    border-bottom: 1px solid #222;
    flex-wrap: wrap;
}

.menu-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
}

.menu-group label {
    font-size: 11px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #888;
}

select {
    background: #222;
    color: white;
    border: 1px solid #444;
    padding: 8px 12px;
    border-radius: 4px;
    font-family: 'Segoe UI', Arial, sans-serif;
    font-size: 14px;
    cursor: pointer;
    min-width: 155px;
    transition: border-color 0.15s ease;
}

select:focus {
    outline: none;
    border-color: #f1c40f;
}

/* TUNER APP CONTAINER */
.tuner-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px;
    max-width: 650px;
    margin: 0 auto;
    width: 100%;
    box-sizing: border-box;
}

.display-panel {
    background: #141414;
    border: 1px solid #222;
    border-radius: 12px;
    padding: 35px;
    width: 100%;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    margin-bottom: 25px;
    box-sizing: border-box;
}

/* TARGET STRING SELECTORS */
.string-picker {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 25px;
    flex-wrap: wrap;
}

.string-note {
    background: #222;
    border: 1px solid #333;
    color: #888;
    padding: 10px 16px;
    border-radius: 6px;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.15s ease;
    min-width: 45px;
    text-align: center;
}

.string-note:hover {
    border-color: #f1c40f;
    color: #fff;
}

.string-note.selected {
    background: #f1c40f;
    color: #0f0f0f;
    border-color: #f1c40f;
    box-shadow: 0 4px 12px rgba(241, 196, 15, 0.3);
}

.note-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 120px;
    line-height: 1;
    color: #fff;
    margin: 10px 0;
    text-shadow: 0 0 20px rgba(255,255,255,0.1);
}

.frequency-display {
    font-size: 16px;
    color: #888;
    margin-bottom: 20px;
}

.status {
    font-size: 18px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    padding: 6px 16px;
    border-radius: 6px;
    display: inline-block;
}

.inTune {
    color: #27ae60;
    background: rgba(39, 174, 96, 0.1);
    border: 1px solid rgba(39, 174, 96, 0.3);
}

.offTune {
    color: #ff5500;
    background: rgba(255, 85, 0, 0.1);
    border: 1px solid rgba(255, 85, 0, 0.2);
}

canvas {
    background: #0b0b0b;
    border-radius: 8px;
    border: 1px solid #222;
    width: 100%;
    height: 75px;
    margin-top: 25px;
}
</style>
</head>
<body>

<div class="titleBar">
  <div class="titleLeft">
    <img src="guitar.png">
    <h2>Lazzarus Prime Rocksmith Tuner</h2>
  </div>
  <div class="socialLinks">
    <a href="https://www.twitch.tv/lazzarus_prime" target="_blank">🎸 Twitch</a>
    <a href="https://discord.gg/WCg5sktJNM" target="_blank">💬 Discord</a>
    <a href="https://lazzarus-prime-shop.fourthwall.com/" target="_blank">👕 Merch</a>
    <a href="https://www.instagram.com/lazzarus__prime/" target="_blank">📸 Instagram</a>
    <a href="https://streamlabs.com/lazzarus_prime/tip" target="_blank">💰 Donations</a>
  </div>
</div>

<div class="topBar">
  <button class="nav-btn" onclick="window.location.href='index.html'">🏠 Home</button>
  <button class="nav-btn" onclick="window.location.href='artists.html'">🎸 Artists</button>
  <button id="tunerBtn" class="action-btn" onclick="toggleTuner(event)">Start Tuner</button>
</div>

<div class="menu-row">
    <div class="menu-group">
        <label>Instrument</label>
        <select id="instrumentSelect" onchange="buildMenuHierarchy()">
            <option value="bass">Bass Guitar</option>
            <option value="guitar">Guitar</option>
        </select>
    </div>
    
    <div class="menu-group" id="stringCountGroup">
        <label>Strings</label>
        <select id="stringCountSelect" onchange="buildMenuHierarchy()">
            <option value="4">4-String</option>
            <option value="5">5-String</option>
            <option value="6">6-String</option>
        </select>
    </div>

    <div class="menu-group">
        <label>Tuning Profile</label>
        <select id="tuningProfileSelect" onchange="updateTargetStrings()">
            </select>
    </div>
</div>

<div class="tuner-container">
    <div class="display-panel">
        <div id="stringPicker" class="string-picker"></div>

        <div id="note" class="note-display">--</div>
        <div id="frequency" class="frequency-display">0.00 Hz</div>
        <div id="status" class="status offTune">Stopped</div>
        
        <canvas id="meterCanvas"></canvas>
    </div>
</div>

<script>
    // Expanded Precision Matrix Mapping target profile lists to absolute reference notes
    const tuningMatrix = {
        bass: {
            4: {
                "Standard (E)": ["E", "A", "D", "G"],
                "Drop D": ["D", "A", "D", "G"],
                "Half-Step Down": ["D#", "G#", "C#", "F#"],
                "Full-Step Down": ["D", "G", "C", "F"]
            },
            5: {
                "Standard (B)": ["B", "E", "A", "D", "G"],
                "Tenor Standard": ["E", "A", "D", "G", "C"],
                "Drop A": ["A", "E", "A", "D", "G"]
            },
            6: {
                "Standard (B-C)": ["B", "E", "A", "D", "G", "C"],
                "Drop A Variant": ["A", "E", "A", "D", "G", "C"]
            }
        },
        guitar: {
            6: {
                "Standard (E)": ["E", "A", "D", "G", "B", "E"],
                "Drop D": ["D", "A", "D", "G", "B", "E"],
                "Half-Step Down": ["D#", "G#", "C#", "F#", "A#", "D#"],
                "Drop C": ["C", "G", "C", "F", "A", "D"]
            }
        }
    };

    let audioCtx = null;
    let analyser = null;
    let filterNode = null;
    let stream = null;
    let source = null;
    let buffer = null;
    let isRunning = false;
    let rafId = null;

    let smoothedCents = 0;
    const smoothingFactor = 0.15; 
    let currentSelectedStringIdx = 0;
    let activeTargetNotes = [];

    const btn = document.getElementById("tunerBtn");
    const noteEl = document.getElementById("note");
    const freqEl = document.getElementById("frequency");
    const statusEl = document.getElementById("status");
    const pickerContainer = document.getElementById("stringPicker");
    const canvas = document.getElementById("meterCanvas");
    const ctx = canvas.getContext("2d");

    canvas.width = canvas.clientWidth;
    canvas.height = canvas.clientHeight;

    const notes = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];

    // Handles the select visibility states and maps configuration variables dynamically
    function buildMenuHierarchy() {
        const inst = document.getElementById("instrumentSelect").value;
        const stringGroup = document.getElementById("stringCountGroup");
        const stringSelect = document.getElementById("stringCountSelect");
        const profileSelect = document.getElementById("tuningProfileSelect");

        if (inst === "guitar") {
            stringGroup.style.display = "none";
            stringSelect.value = "6"; 
        } else {
            stringGroup.style.display = "flex";
        }

        const strings = stringSelect.value;
        profileSelect.innerHTML = "";

        const availableProfiles = tuningMatrix[inst][strings];
        if (availableProfiles) {
            Object.keys(availableProfiles).forEach(profileName => {
                let opt = document.createElement("option");
                opt.value = profileName;
                opt.textContent = profileName;
                profileSelect.appendChild(opt);
            });
        }

        updateTargetStrings();
    }

    // Maps selected profile entries instantly to screen blocks
    function updateTargetStrings() {
        const inst = document.getElementById("instrumentSelect").value;
        const strings = document.getElementById("stringCountSelect").value;
        const profile = document.getElementById("tuningProfileSelect").value;

        if (tuningMatrix[inst] && tuningMatrix[inst][strings] && tuningMatrix[inst][strings][profile]) {
            activeTargetNotes = tuningMatrix[inst][strings][profile];
        } else {
            activeTargetNotes = [];
        }
        
        pickerContainer.innerHTML = "";
        currentSelectedStringIdx = 0;

        activeTargetNotes.forEach((note, index) => {
            let block = document.createElement("div");
            block.className = `string-note ${index === currentSelectedStringIdx ? 'selected' : ''}`;
            block.textContent = note;
            block.onclick = () => {
                document.querySelectorAll(".string-note").forEach(b => b.classList.remove("selected"));
                block.classList.add("selected");
                currentSelectedStringIdx = index;
            };
            pickerContainer.appendChild(block);
        });
    }

    function getNoteAndCents(frequency) {
        const noteNum = 12 * (Math.log2(frequency / 440)) + 69;
        const roundedNoteNum = Math.round(noteNum);
        const cents = Math.round((noteNum - roundedNoteNum) * 100);
        const noteName = notes[((roundedNoteNum % 12) + 12) % 12];
        return { noteName, cents };
    }

    function autoCorrelate(buffer, sampleRate) {
        let SIZE = buffer.length;
        let rms = 0;

        for (let i = 0; i < SIZE; i++) {
            let val = buffer[i];
            rms += val * val;
        }
        rms = Math.sqrt(rms / SIZE);
        if (rms < 0.015) return -1; 

        let r1 = 0, r2 = SIZE - 1, thres = 0.2;
        for (let i = 0; i < SIZE / 2; i++) {
            if (Math.abs(buffer[i]) < thres) { r1 = i; break; }
        }
        for (let i = SIZE - 1; i >= SIZE / 2; i--) {
            if (Math.abs(buffer[i]) < thres) { r2 = i; break; }
        }

        buffer = buffer.slice(r1, r2);
        SIZE = buffer.length;

        let c = new Float32Array(SIZE);
        for (let i = 0; i < SIZE; i++) {
            for (let j = 0; j < SIZE - i; j++) {
                c[i] = c[i] + buffer[j] * buffer[j + i];
            }
        }

        let d = 0;
        while (c[d] > c[d + 1]) d++;
        let maxval = -1, maxpos = -1;
        for (let i = d; i < SIZE; i++) {
            if (c[i] > maxval) {
                maxval = c[i];
                maxpos = i;
            }
        }
        let T0 = maxpos;

        let x1 = c[T0 - 1], x2 = c[T0], x3 = c[T0 + 1];
        let a = (x1 + x3 - 2 * x2) / 2;
        let b = (x3 - x1) / 2;
        if (a) T0 = T0 - b / (2 * a);

        return sampleRate / T0;
    }

    function drawMeter(cents, inTune) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const midX = canvas.width / 2;
        
        ctx.strokeStyle = "#333";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(midX, 0);
        ctx.lineTo(midX, canvas.height);
        ctx.stroke();

        ctx.fillStyle = "#444";
        for(let i = -50; i <= 50; i += 10) {
            const x = midX + (i * (canvas.width / 120));
            ctx.fillRect(x, canvas.height - 10, 2, 10);
        }

        if (isRunning && cents !== null) {
            smoothedCents += (cents - smoothedCents) * smoothingFactor;
            const targetX = midX + (smoothedCents * (canvas.width / 120));
            
            ctx.shadowBlur = 15;
            ctx.shadowColor = inTune ? "#27ae60" : "#ff5500";
            ctx.strokeStyle = inTune ? "#27ae60" : "#ff5500";
            ctx.lineWidth = 4;
            
            ctx.beginPath();
            ctx.moveTo(targetX, 5);
            ctx.lineTo(targetX, canvas.height - 5);
            ctx.stroke();
            
            ctx.shadowBlur = 0;
        }
    }

    function detect() {
        if (!analyser || !isRunning) return;
        analyser.getFloatTimeDomainData(buffer);
        const ac = autoCorrelate(buffer, audioCtx.sampleRate);

        if (ac !== -1 && ac > 20 && ac < 1200) {
            freqEl.textContent = ac.toFixed(2) + " Hz";
            const { noteName, cents } = getNoteAndCents(ac);
            noteEl.textContent = noteName;

            const targetNoteName = activeTargetNotes[currentSelectedStringIdx];
            
            if (targetNoteName && noteName === targetNoteName) {
                const inTune = Math.abs(cents) <= 3;
                if (inTune) {
                    statusEl.textContent = "IN TUNE";
                    statusEl.className = "status inTune";
                    noteEl.style.color = "#27ae60";
                } else {
                    statusEl.textContent = cents > 0 ? `+${cents} Sharp` : `${cents} Flat`;
                    statusEl.className = "status offTune";
                    noteEl.style.color = "#fff";
                }
                drawMeter(cents, inTune);
            } else {
                statusEl.textContent = targetNoteName ? `Target: ${targetNoteName}` : "Detecting...";
                statusEl.className = "status offTune";
                noteEl.style.color = "rgba(255,255,255,0.6)";
                drawMeter(cents > 0 ? 45 : -45, false);
            }
        } else {
            if (ac === -1) {
                noteEl.style.color = "rgba(255,255,255,0.3)";
            }
            drawMeter(null, false);
        }

        rafId = requestAnimationFrame(detect);
    }

    async function start() {
        try {
            const inst = document.getElementById("instrumentSelect").value;
            
            stream = await navigator.mediaDevices.getUserMedia({ 
                audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } 
            });
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            filterNode = audioCtx.createBiquadFilter();
            filterNode.type = "lowpass";
            filterNode.frequency.setValueAtTime(inst === "bass" ? 220 : 450, audioCtx.currentTime);

            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 2048;

            source = audioCtx.createMediaStreamSource(stream);
            source.connect(filterNode);
            filterNode.connect(analyser);
            
            buffer = new Float32Array(analyser.fftSize);

            isRunning = true;
            detect();
        } catch (err) {
            alert("Could not access stream context capture modules: " + err.message);
            stop();
        }
    }

    function stop() {
        isRunning = false;
        if (rafId) cancelAnimationFrame(rafId);
        if (stream) stream.getTracks().forEach(t => t.stop());
        if (audioCtx) audioCtx.close();

        stream = null;
        audioCtx = null;
        filterNode = null;
        analyser = null;
        source = null;
        buffer = null;

        btn.textContent = "Start Tuner";
        btn.classList.remove("active");
        statusEl.textContent = "Stopped";
        statusEl.className = "status offTune";
        noteEl.textContent = "--";
        noteEl.style.color = "#fff";
        freqEl.textContent = "0.00 Hz";
        smoothedCents = 0;
        drawMeter(null, false);
    }

    async function toggleTuner(e) {
        e.target.blur();
        if (!isRunning) {
            btn.textContent = "Stop Tuner";
            btn.classList.add("active");
            await start();
        } else {
            stop();
        }
    }

    // Initialize layout elements
    buildMenuHierarchy();
</script>
</body>
</html>
