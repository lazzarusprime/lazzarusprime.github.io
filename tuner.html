<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lazzarus Prime Guitar Tuner</title>

<style>
body{
    font-family:Segoe UI,Arial;
    background:#0f0f0f;
    color:white;
    margin:0;
}

.titleBar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#141414;
    padding:12px;
    border-bottom:2px solid #222;
    flex-wrap:wrap;
}

.titleLeft{
    display:flex;
    align-items:center;
    gap:10px;
}

.titleBar img{ width:40px; }

.titleLeft h2{
    margin:0;
    font-weight:900;
    text-transform:uppercase;
    background:linear-gradient(to bottom,#fff 20%,#f1c40f 45%,#b8860b 85%);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    filter:drop-shadow(0 0 5px rgba(241,196,15,.6));
}

.topBar{
    display:flex;
    gap:8px;
    padding:12px;
    background:#181818;
    position:sticky;
    top:0;
    z-index:100;
    justify-content:center;
    flex-wrap:wrap;
    border-bottom:1px solid #333;
}

.nav-btn{
    background:#2a2a2a;
    color:white;
    border:1px solid #444;
    padding:10px 18px;
    border-radius:6px;
    cursor:pointer;
    font-weight:700;
    text-transform:uppercase;
    font-size:13px;
    transition:.2s;
}

.nav-btn:hover{
    background:#444;
    border-color:#f1c40f;
    color:#f1c40f;
}

.tunerWrap{
    max-width:900px;
    margin:40px auto;
    padding:25px;
}

.panel{
    background:#181818;
    border:1px solid #222;
    border-radius:12px;
    padding:30px;
    box-shadow:0 0 25px rgba(0,0,0,.5);
}

.noteDisplay{
    text-align:center;
    font-size:110px;
    font-weight:900;
    color:#f1c40f;
    text-shadow:0 0 20px rgba(241,196,15,.35);
}

.freqDisplay{
    text-align:center;
    font-size:22px;
    color:#aaa;
    margin-bottom:25px;
}

.meter{
    height:20px;
    background:#111;
    border:1px solid #333;
    border-radius:20px;
    overflow:hidden;
    position:relative;
}

.centerLine{
    position:absolute;
    left:50%;
    top:0;
    width:2px;
    height:100%;
    background:#f1c40f;
}

.needle{
    position:absolute;
    top:0;
    width:6px;
    height:100%;
    background:#fff;
    transition:left .12s ease-out;
    border-radius:4px;
}

.status{
    text-align:center;
    margin-top:18px;
    font-size:20px;
    font-weight:700;
}

.inTune{
    color:#2ecc71;
    text-shadow:0 0 12px rgba(46,204,113,.6);
}

.offTune{
    color:#e74c3c;
}

.stringGuide{
    display:grid;
    grid-template-columns:repeat(6,1fr);
    gap:12px;
    margin-top:30px;
}

    background:#202020;
    border:1px solid #333;
    border-radius:8px;
    padding:16px;
    text-align:center;
