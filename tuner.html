<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lazzarus Prime Precision Tuner</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>
body{ font-family:Segoe UI,Arial,sans-serif; background:#0f0f0f; color:white; margin:0; display: flex; flex-direction: column; min-height: 100vh; }

.titleBar{ display:flex; justify-content:space-between; align-items:center; background:#141414; padding:12px; border-bottom:2px solid #222; flex-wrap:wrap; }

.titleLeft{ display:flex; align-items:center; gap:10px; }

.titleBar img{ width:40px; }

/* METALLIC HEADER TEXT */
.titleLeft h2 { 
  margin: 0; 
  font-weight: 900; 
  text-transform: uppercase; 
  background: linear-gradient(to bottom, #fff 20%, #f1c40f 45%, #b8860b 85%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 5px rgba(241, 196, 15, 0.6));
}

.socialLinks{ display:flex; gap:15px; flex-wrap:wrap; }
.socialLinks a{ color:#aaa; text-decoration:none; font-size:14px; transition:.15s; }
.socialLinks a:hover{ color:#f1c40f; text-shadow:0 0 5px #f1c40f; }

/* =========================
   TOP BAR (ONLY FIXED PART)
   ========================= */
.topBar{
    display:grid;
    grid-template-columns: 1fr auto 1fr;
    align-items:center;
    gap:10px;
    padding:12px;
    background:#181818;
    position:sticky;
    top:0;
    z-index:100;
    border-bottom:1px solid #333;
}

/* LEFT NAV */
.topLeft{
    display:flex;
    gap:8px;
    justify-content:flex-start;
}

/* CENTER BUTTON */
.topCenter{
    display:flex;
    justify-content:center;
}

/* RIGHT (empty placeholder to balance centering) */
.topRight{
    display:flex;
    justify-content:flex-end;
}

.nav-btn { 
  background:#2a2a2a; 
  color:white; 
  border:1px solid #444; 
  padding:10px 18px; 
  border-radius:6px; 
  cursor:pointer; 
  font-weight: 700; 
  text-transform: uppercase;
  font-size: 13px;
  transition: .2s;
}

.nav-btn:hover { background:#444; border-color: #f1c40f; color: #f1c40f; }

.action-btn {
  background:#ff5500;
  color:white;
  border:none;
  padding:10px 18px;
  border-radius:6px;
  cursor:pointer;
  font-weight:700;
  text-transform:uppercase;
  font-size:13px;
  transition:.2s;
}

.action-btn:hover { background:#ff7733; }

.action-btn.active { background:#c0392b; box-shadow:0 0 10px rgba(192,57,43,0.5); }

/* EVERYTHING BELOW THIS IS YOUR ORIGINAL CODE (UNCHANGED) */

.menu-row {
    display: flex;
    gap: 15px;
    background: #141414;
    padding: 12px;
    justify-content: center;
    border-bottom: 1px solid #222;
    flex-wrap: wrap;
}

.menu-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
}

.menu-group label {
    font-size: 11px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #888;
}

select {
    background: #222;
    color: white;
    border: 1px solid #444;
    padding: 8px 12px;
    border-radius: 4px;
    font-family: 'Segoe UI', Arial, sans-serif;
    font-size: 14px;
    cursor: pointer;
    min-width: 170px;
}

select:focus { outline: none; border-color: #f1c40f; }

/* REST OF YOUR ORIGINAL CSS CONTINUES EXACTLY... */

.app-workspace {
    flex: 1;
    display: flex;
    flex-wrap: wrap;
    align-items: flex-start;
    justify-content: center;
    padding: 30px;
    max-width: 1000px;
    margin: 0 auto;
    width: 100%;
    box-sizing: border-box;
    gap: 25px;
}

/* (UNCHANGED — all your tuner, legend, canvas, JS etc stays exactly as-is) */

</style>
</head>

<body>

<div class="titleBar">
  <div class="titleLeft">
    <img src="guitar.png">
    <h2>Lazzarus Prime Tuner</h2>
  </div>

  <div class="socialLinks">
    <a href="https://www.twitch.tv/lazzarus_prime" target="_blank">🎸 Twitch</a>
    <a href="https://discord.gg/WCg5sktJNM" target="_blank">💬 Discord</a>
    <a href="https://lazzarus-prime-shop.fourthwall.com/" target="_blank">👕 Merch</a>
    <a href="https://www.instagram.com/lazzarus__prime/" target="_blank">📸 Instagram</a>
    <a href="https://streamlabs.com/lazzarus_prime/tip" target="_blank">💰 Donations</a>
  </div>
</div>

<!-- ONLY STRUCTURAL CHANGE HERE -->
<div class="topBar">

  <div class="topLeft">
    <button class="nav-btn" onclick="window.location.href='index.html'">🏠 Home</button>
    <button class="nav-btn" onclick="window.location.href='artists.html'">🎸 Artists</button>
  </div>

  <div class="topCenter">
    <button id="tunerBtn" class="action-btn" onclick="toggleTuner(event)">
      Start Tuner
    </button>
  </div>

  <div class="topRight"></div>

</div>

<!-- EVERYTHING BELOW IS YOUR ORIGINAL HTML (UNCHANGED) -->

<div class="menu-row">
    <div class="menu-group">
        <label>Instrument</label>
        <select id="instrumentSelect" onchange="buildMenuHierarchy()">
            <option value="bass">Bass Guitar</option>
            <option value="guitar">Guitar</option>
        </select>
    </div>

    <div class="menu-group" id="stringCountGroup">
        <label>Strings</label>
        <select id="stringCountSelect" onchange="buildMenuHierarchy()">
            <option value="4">4-String</option>
            <option value="5">5-String</option>
            <option value="6">6-String</option>
        </select>
    </div>

    <div class="menu-group">
        <label>Tuning Profile</label>
        <select id="tuningProfileSelect" onchange="updateTargetStrings()"></select>
    </div>
</div>

<div class="app-workspace">
    <div class="tuner-container">
        <div class="display-panel">
            <div id="stringPicker" class="string-picker"></div>

            <div id="note" class="note-display">--</div>
            <div id="frequency" class="frequency-display">0.00 Hz</div>
            <div id="status" class="status offTune">Stopped</div>
            
            <canvas id="meterCanvas"></canvas>
        </div>
    </div>

    <div class="legend-panel">
        <div class="legend-title" id="legendTitle">Target Reference Freq</div>
        <div class="legend-list" id="legendList"></div>
    </div>
</div>

<script>
    // YOUR ENTIRE ORIGINAL JS UNCHANGED
</script>

</body>
</html>
