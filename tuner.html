<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lazzarus Prime Precision Tuner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Inter', sans-serif;
    background: #0f0f0f;
    color: white;
    margin: 0;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

/* UNIFIED GLOBAL HEADER STYLES */
.titleBar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #141414;
    padding: 12px 20px;
    border-bottom: 2px solid #222;
    flex-wrap: wrap;
}

.titleLeft {
    display: flex;
    align-items: center;
    gap: 10px;
}

.titleBar img {
    width: 40px;
    height: auto;
}

.titleLeft h2 {
    margin: 0;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 2px;
    font-weight: 900;
    text-transform: uppercase;
    background: linear-gradient(to bottom, #fff 20%, #f1c40f 45%, #b8860b 85%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 5px rgba(241, 196, 15, 0.6));
}

.socialLinks {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
}

.socialLinks a {
    color: #aaa;
    text-decoration: none;
    font-size: 14px;
    transition: .15s;
}

.socialLinks a:hover {
    color: #ff5500;
}

.topBar {
    display: flex;
    gap: 10px;
    padding: 15px;
    background: #181818;
    justify-content: center;
    border-bottom: 1px solid #262626;
    flex-wrap: wrap;
}

/* HIERARCHICAL SELECT MENU CONTAINER */
.menu-row {
    display: flex;
    gap: 15px;
    background: #141414;
    padding: 12px 20px;
    justify-content: center;
    border-bottom: 1px solid #222;
    flex-wrap: wrap;
}

.menu-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
}

.menu-group label {
    font-size: 11px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #888;
}

select {
    background: #222;
    color: white;
    border: 1px solid #444;
    padding: 8px 12px;
    border-radius: 4px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    cursor: pointer;
    min-width: 140px;
    transition: border-color 0.15s ease;
}

select:focus {
    outline: none;
    border-color: #ff5500;
}

/* TUNER CONTENT LAYOUT */
.tuner-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px;
    max-width: 650px;
    margin: 0 auto;
    width: 100%;
    box-sizing: border-box;
}

.display-panel {
    background: #141414;
    border: 1px solid #262626;
    border-radius: 12px;
    padding: 35px;
    width: 100%;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    margin-bottom: 25px;
    box-sizing: border-box;
}

/* INTERACTIVE TARGET STRING SELECTORS */
.string-picker {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 25px;
    flex-wrap: wrap;
}

.string-note {
    background: #222;
    border: 1px solid #333;
    color: #888;
    padding: 10px 16px;
    border-radius: 6px;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.15s ease;
    min-width: 45px;
    text-align: center;
}

.string-note:hover {
    border-color: #ff5500;
    color: #fff;
}

.string-note.selected {
    background: #ff5500;
    color: white;
    border-color: #ff5500;
    box-shadow: 0 4px 12px rgba(255, 85, 0, 0.3);
}

.note-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 120px;
    line-height: 1;
    color: #fff;
    margin: 10px 0;
    text-shadow: 0 0 20px rgba(255,255,255,0.1);
}

.frequency-display {
    font-size: 16px;
    color: #888;
    margin-bottom: 20px;
}

.status {
    font-size: 18px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    padding: 6px 16px;
    border-radius: 6px;
    display: inline-block;
}

.inTune {
    color: #27ae60;
    background: rgba(39, 174, 96, 0.1);
    border: 1px solid rgba(39, 174, 96, 0.3);
}

.offTune {
    color: #ff5500;
    background: rgba(255, 85, 0, 0.1);
    border: 1px solid rgba(255, 85, 0, 0.2);
}

canvas {
    background: #0b0b0b;
    border-radius: 8px;
    border: 1px solid #222;
    width: 100%;
    height: 75px;
    margin-top: 25px;
}

/* GENERIC BUTTON CONFIGURATIONS */
.btn {
    padding: 8px 16px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 700;
    background: #ff5500;
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.15s ease;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
}

.btn:hover {
    background: #ff7733;
}

.btn.active {
    background: #c0392b;
}

.btn:focus {
    outline: none;
}
</style>
</head>
<body>

<div class="titleBar">
    <div class="titleLeft">
        <img src="guitar.png" alt="Logo">
        <h2>Lazzarus Prime Tuner</h2>
    </div>
    <div class="socialLinks">
        <a href="https://twitch.tv/lazzarusprime" target="_blank">Twitch</a>
        <a href="https://youtube.com/" target="_blank">YouTube</a>
        <a href="https://instagram.com/" target="_blank">Instagram</a>
        <a href="https://discord.gg/" target="_blank">Discord</a>
    </div>
</div>

<div class="topBar">
    <a href="index.html" class="btn" style="background:#222;">Home</a>
    <a href="artists.html" class="btn" style="background:#222;">Artists</a>
    <button id="tunerBtn" class="btn" onclick="toggleTuner(event)">Start Tuner</button>
</div>

<div class="menu-row">
    <div class="menu-group">
        <label>Instrument</label>
        <select id="instrumentSelect" onchange="buildMenuHierarchy()">
            <option value="bass">Bass Guitar</option>
            <option value="guitar">Guitar</option>
        </select>
    </div>
    
    <div class="menu-group" id="stringCountGroup">
        <label>Strings</label>
        <select id="stringCountSelect" onchange="buildMenuHierarchy()">
            <option value="4">4-String</option>
            <option value="5">5-String</option>
            <option value="6">6-String</option>
        </select>
    </div>

    <div class="menu-group">
        <label>Tuning Profile</label>
        <select id="tuningProfileSelect" onchange="updateTargetStrings()">
            </select>
    </div>
</div>

<div class="tuner-container">
    <div class="display-panel">
        <div id="stringPicker" class="string-picker"></div>

        <div id="note" class="note-display">--</div>
        <div id="frequency" class="frequency-display">0.00 Hz</div>
        <div id="status" class="status offTune">Stopped</div>
        
        <canvas id="meterCanvas"></canvas>
    </div>
</div>
