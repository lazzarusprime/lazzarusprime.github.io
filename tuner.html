<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lazzarus Prime Precision Tuner</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
    body{ font-family:Segoe UI,Arial,sans-serif; background:#0f0f0f; color:white; margin:0; display: flex; flex-direction: column; min-height: 100vh; }
    .titleBar{ display:flex; justify-content:space-between; align-items:center; background:#141414; padding:12px; border-bottom:2px solid #222; }
    .action-btn { background:#ff5500; color:white; border:none; padding:10px 18px; border-radius:6px; cursor:pointer; font-weight:700; text-transform:uppercase; transition:.2s; }
    .action-btn.active { background:#c0392b; }
    .app-workspace { flex: 1; display: flex; justify-content: center; padding: 30px; gap: 25px; flex-wrap: wrap; }
    .display-panel { background:#141414; border:1px solid #222; border-radius:12px; padding:35px; text-align:center; width: 100%; max-width: 600px; }
    .note-display { font-family: 'Bebas Neue', sans-serif; font-size: 130px; color: #fff; margin: 15px 0; }
    .frequency-display { font-size: 16px; color: #888; margin-bottom: 20px; }
    .status { font-size: 18px; font-weight: 700; text-transform: uppercase; padding: 6px 16px; border-radius: 6px; display: inline-block; }
    canvas { background: #0b0b0b; border-radius: 8px; border: 1px solid #222; width: 100%; height: 85px; margin-top: 25px; }
    .menu-row { display: flex; gap: 15px; background: #141414; padding: 12px 20px; justify-content: center; border-bottom: 1px solid #222; }
</style>
</head>
<body>
<div class="titleBar">
    <h2>Lazzarus Prime Tuner</h2>
    <button id="tunerBtn" class="action-btn" onclick="toggleTuner(event)">Start Tuner</button>
</div>

<div class="menu-row">
    <select id="instrumentSelect"><option value="bass">Bass</option><option value="guitar">Guitar</option></select>
    <select id="tuningProfileSelect"><option value="Standard (E)">Standard (E)</option></select>
</div>

<div class="app-workspace">
    <div class="display-panel">
        <div id="note" class="note-display">--</div>
        <div id="frequency" class="frequency-display">0.00 Hz</div>
        <div id="status" class="status">Stopped</div>
        <canvas id="meterCanvas"></canvas>
    </div>
</div>

<script>
    let audioCtx, analyser, stream, buffer;
    let isRunning = false, rafId = null;

    // Optimized pitch detection engine
    function detectPitch(buffer, sampleRate) {
        const SIZE = buffer.length;
        let rms = 0;
        for (let i = 0; i < SIZE; i++) rms += buffer[i] * buffer[i];
        if (Math.sqrt(rms / SIZE) < 0.02) return -1; // Higher threshold for interface noise

        const c = new Float32Array(SIZE / 2);
        for (let lag = 0; lag < SIZE / 2; lag++) {
            for (let i = 0; i < SIZE / 2; i++) {
                c[lag] += buffer[i] * buffer[i + lag];
            }
        }

        let peakLag = -1;
        for (let lag = 1; lag < c.length - 1; lag++) {
            if (c[lag] > c[lag - 1] && c[lag] > c[lag + 1] && c[lag] > c[0] * 0.2) {
                peakLag = lag;
                break;
            }
        }
        return peakLag > 0 ? sampleRate / peakLag : -1;
    }

    async function start() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ 
                audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } 
            });
            // Force 48kHz to prevent sample rate drift with M-Audio
            audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 48000 });
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 8192; 
            
            const source = audioCtx.createMediaStreamSource(stream);
            source.connect(analyser);
            buffer = new Float32Array(analyser.fftSize);
            
            isRunning = true;
            loop();
        } catch (err) {
            alert("Audio Capture Failed: " + err.message);
        }
    }

    function loop() {
        if (!isRunning) return;
        analyser.getFloatTimeDomainData(buffer);
        const pitch = detectPitch(buffer, audioCtx.sampleRate);
        
        if (pitch > 20 && pitch < 1200) {
            document.getElementById("frequency").textContent = pitch.toFixed(2) + " Hz";
            const noteNum = 12 * (Math.log2(pitch / 440)) + 69;
            const notes = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
            document.getElementById("note").textContent = notes[Math.round(noteNum) % 12];
            document.getElementById("status").textContent = "Tracking...";
        }
        rafId = requestAnimationFrame(loop);
    }

    function stop() {
        isRunning = false;
        cancelAnimationFrame(rafId);
        if (stream) stream.getTracks().forEach(t => t.stop());
        if (audioCtx) audioCtx.close();
        document.getElementById("note").textContent = "--";
        document.getElementById("tunerBtn").textContent = "Start Tuner";
        document.getElementById("tunerBtn").classList.remove("active");
        document.getElementById("status").textContent = "Stopped";
    }

    function toggleTuner(e) {
        if (!isRunning) {
            e.target.textContent = "Stop Tuner";
            e.target.classList.add("active");
            start();
        } else {
            stop();
        }
    }
</script>
</body>
</html>
