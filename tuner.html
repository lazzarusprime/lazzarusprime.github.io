<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lazzarus Prime Precision Tuner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Inter', sans-serif;
    background: #0f0f0f;
    color: white;
    margin: 0;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

/* METALLIC UNIFIED NAVIGATION HEADER */
.titleBar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #141414;
    padding: 12px 20px;
    border-bottom: 2px solid #222;
    flex-wrap: wrap;
}

.titleLeft {
    display: flex;
    align-items: center;
    gap: 10px;
}

.titleBar img {
    width: 40px;
    height: auto;
}

.titleLeft h2 {
    margin: 0;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 2px;
    font-weight: 900;
    text-transform: uppercase;
    background: linear-gradient(to bottom, #fff 20%, #f1c40f 45%, #b8860b 85%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 5px rgba(241, 196, 15, 0.6));
}

.socialLinks {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
}

.socialLinks a {
    color: #aaa;
    text-decoration: none;
    font-size: 14px;
    transition: .15s;
}

.socialLinks a:hover {
    color: #ff5500;
}

/* SUB NAVIGATION BAR */
.topBar {
    display: flex;
    gap: 10px;
    padding: 15px;
    background: #181818;
    justify-content: center;
    border-bottom: 1px solid #262626;
    flex-wrap: wrap;
}

/* TUNER CONTAINMENT ARCHITECTURE */
.tuner-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px;
    max-width: 600px;
    margin: 0 auto;
    width: 100%;
    box-sizing: border-box;
}

.display-panel {
    background: #141414;
    border: 1px solid #262626;
    border-radius: 12px;
    padding: 40px;
    width: 100%;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    margin-bottom: 25px;
}

.note-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 120px;
    line-height: 1;
    color: #fff;
    margin: 10px 0;
    text-shadow: 0 0 20px rgba(255,255,255,0.1);
    transition: color 0.15s ease;
}

.frequency-display {
    font-size: 16px;
    color: #888;
    margin-bottom: 20px;
}

.status {
    font-size: 20px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    padding: 6px 16px;
    border-radius: 6px;
    display: inline-block;
}

.inTune {
    color: #27ae60;
    background: rgba(39, 174, 96, 0.1);
    border: 1px solid rgba(39, 174, 96, 0.3);
    text-shadow: 0 0 10px rgba(39, 174, 96, 0.4);
}

.offTune {
    color: #ff5500;
    background: rgba(255, 85, 0, 0.1);
    border: 1px solid rgba(255, 85, 0, 0.2);
}

/* VISUAL METER CANVAS */
canvas {
    background: #0b0b0b;
    border-radius: 8px;
    border: 1px solid #222;
    width: 100%;
    height: 80px;
    margin-top: 25px;
}

/* ACTION BUTTON STYLING */
.btn {
    padding: 8px 16px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 700;
    background: #ff5500;
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.15s ease;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
}

.btn:hover {
    background: #ff7733;
}

.btn.active {
    background: #c0392b;
}

.btn:focus {
    outline: none;
}
</style>
</head>
<body>

<div class="titleBar">
    <div class="titleLeft">
        <img src="guitar.png" alt="Logo">
        <h2>Lazzarus Prime Tuner</h2>
    </div>
    <div class="socialLinks">
        <a href="https://twitch.tv/lazzarusprime" target="_blank">Twitch</a>
        <a href="https://youtube.com/" target="_blank">YouTube</a>
        <a href="https://instagram.com/" target="_blank">Instagram</a>
        <a href="https://discord.gg/" target="_blank">Discord</a>
    </div>
</div>

<div class="topBar">
    <a href="index.html" class="btn" style="background:#222;">Home</a>
    <a href="artists.html" class="btn" style="background:#222;">Artists</a>
    <button id="tunerBtn" class="btn" onclick="toggleTuner(event)">Start Tuner</button>
</div>

<div class="tuner-container">
    <div class="display-panel">
        <div id="note" class="note-display">--</div>
        <div id="frequency" class="frequency-display">0.00 Hz</div>
        <div id="status" class="status offTune">Stopped</div>
        
        <canvas id="meterCanvas"></canvas>
    </div>
</div>

<script>
    let audioCtx = null;
    let analyser = null;
    let filterNode = null;
    let stream = null;
    let source = null;
    let buffer = null;
    let isRunning = false;
    let rafId = null;

    // Visual tracking dampening variables
    let smoothedCents = 0;
    const smoothingFactor = 0.15; 

    const btn = document.getElementById("tunerBtn");
    const noteEl = document.getElementById("note");
    const freqEl = document.getElementById("frequency");
    const statusEl = document.getElementById("status");
    const canvas = document.getElementById("meterCanvas");
    const ctx = canvas.getContext("2d");

    canvas.width = canvas.clientWidth;
    canvas.height = canvas.clientHeight;

    const notes = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];

    function getNoteAndCents(frequency) {
        const noteNum = 12 * (Math.log2(frequency / 440)) + 69;
        const roundedNoteNum = Math.round(noteNum);
        const cents = Math.round((noteNum - roundedNoteNum) * 100);
        const noteName = notes[((roundedNoteNum % 12) + 12) % 12];
        return { noteName, cents };
    }

    function autoCorrelate(buffer, sampleRate) {
        let SIZE = buffer.length;
        let rms = 0;

        for (let i = 0; i < SIZE; i++) {
            let val = buffer[i];
            rms += val * val;
        }
        rms = Math.sqrt(rms / SIZE);
        
        if (rms < 0.015) return -1; 

        let r1 = 0, r2 = SIZE - 1, thres = 0.2;
        for (let i = 0; i < SIZE / 2; i++) {
            if (Math.abs(buffer[i]) < thres) { r1 = i; break; }
        }
        for (let i = SIZE - 1; i >= SIZE / 2; i--) {
            if (Math.abs(buffer[i]) < thres) { r2 = i; break; }
        }

        buffer = buffer.slice(r1, r2);
        SIZE = buffer.length;

        let c = new Float32Array(SIZE);
        for (let i = 0; i < SIZE; i++) {
            for (let j = 0; j < SIZE - i; j++) {
                c[i] = c[i] + buffer[j] * buffer[j + i];
            }
        }

        let d = 0;
        while (c[d] > c[d + 1]) d++;
        let maxval = -1, maxpos = -1;
        for (let i = d; i < SIZE; i++) {
            if (c[i] > maxval) {
                maxval = c[i];
                maxpos = i;
            }
        }
        let T0 = maxpos;

        let x1 = c[T0 - 1], x2 = c[T0], x3 = c[T0 + 1];
        let a = (x1 + x3 - 2 * x2) / 2;
        let b = (x3 - x1) / 2;
        if (a) T0 = T0 - b / (2 * a);

        return sampleRate / T0;
    }

    function drawMeter(cents, inTune) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        const midX = canvas.width / 2;
        
        ctx.strokeStyle = "#333";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(midX, 0);
        ctx.lineTo(midX, canvas.height);
        ctx.stroke();

        ctx.fillStyle = "#444";
        for(let i = -50; i <= 50; i += 10) {
            const x = midX + (i * (canvas.width / 120));
            ctx.fillRect(x, canvas.height - 10, 2, 10);
        }

        if (isRunning && cents !== null) {
            smoothedCents += (cents - smoothedCents) * smoothingFactor;
            const targetX = midX + (smoothedCents * (canvas.width / 120));
            
            ctx.shadowBlur = 15;
            ctx.shadowColor = inTune ? "#27ae60" : "#ff5500";
            ctx.strokeStyle = inTune ? "#27ae60" : "#ff5500";
            ctx.lineWidth = 4;
            
            ctx.beginPath();
            ctx.moveTo(targetX, 5);
            ctx.lineTo(targetX, canvas.height - 5);
            ctx.stroke();
            
            ctx.shadowBlur = 0;
        }
    }

    function detect() {
        if (!analyser) return;
        analyser.getFloatTimeDomainData(buffer);
        const ac = autoCorrelate(buffer, audioCtx.sampleRate);

        if (ac !== -1 && ac > 25 && ac < 1200) {
            freqEl.textContent = ac.toFixed(2) + " Hz";
            const { noteName, cents } = getNoteAndCents(ac);
            noteEl.textContent = noteName;

            const inTune = Math.abs(cents) <= 3;
            if (inTune) {
                statusEl.textContent = "IN TUNE";
                statusEl.className = "status inTune";
                noteEl.style.color = "#27ae60";
            } else {
                statusEl.textContent = cents > 0 ? `+${cents} Sharp` : `${cents} Flat`;
                statusEl.className = "status offTune";
                noteEl.style.color = "#fff";
            }
            drawMeter(cents, inTune);
        } else {
            if (ac === -1) {
                noteEl.style.color = "rgba(255,255,255,0.3)";
            }
            drawMeter(null, false);
        }

        rafId = requestAnimationFrame(detect);
    }

    async function start() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ 
                audio: { 
                    echoCancellation: false, 
                    noiseSuppression: false,
                    autoGainControl: false
                } 
            });
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            filterNode = audioCtx.createBiquadFilter();
            filterNode.type = "lowpass";
            filterNode.frequency.setValueAtTime(350, audioCtx.currentTime);

            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 2048;

            source = audioCtx.createMediaStreamSource(stream);
            source.connect(filterNode);
            filterNode.connect(analyser);
            
            buffer = new Float32Array(analyser.fftSize);

            detect();
        } catch (err) {
            alert("Could not open media capture streams: " + err.message);
            stop();
        }
    }

    function stop() {
        if (rafId) cancelAnimationFrame(rafId);
        if (stream) stream.getTracks().forEach(t => t.stop());
        if (audioCtx) audioCtx.close();

        stream = null;
        audioCtx = null;
        filterNode = null;
        analyser = null;
        source = null;
        buffer = null;
        isRunning = false;

        btn.textContent = "Start Tuner";
        btn.classList.remove("active");
        statusEl.textContent = "Stopped";
        statusEl.className = "status offTune";
        noteEl.textContent = "--";
        noteEl.style.color = "#fff";
        freqEl.textContent = "0.00 Hz";
        smoothedCents = 0;
        drawMeter(null, false);
    }

    async function toggleTuner(e) {
        e.target.blur();

        if (!isRunning) {
            isRunning = true;
            btn.textContent = "Stop Tuner";
            btn.classList.add("active");
            await start();
        } else {
            stop();
        }
    }
</script>
</body>
</html>
