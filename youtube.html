<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lazzarus Prime — Videos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',Segoe UI,Arial;background:#0f0f0f;color:white;margin:0;overflow-x:hidden;display:flex;flex-direction:column;min-height:100vh}

/* ── TITLE BAR ── */
.titleBar{display:flex;justify-content:space-between;align-items:center;background:#141414;padding:10px 14px;border-bottom:2px solid #222;flex-wrap:wrap;gap:8px}
.titleLeft{display:flex;align-items:center;gap:12px}
.titleLeft h2{margin:0;font-weight:900;text-transform:uppercase;font-size:clamp(14px,2.5vw,22px);background:linear-gradient(to bottom,#fff 20%,#f1c40f 45%,#b8860b 85%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* ── NAVIGATION ── */
.topBar{display:flex;gap:6px;padding:8px 10px;background:#181818;position:sticky;top:0;z-index:100;flex-wrap:wrap;justify-content:flex-start;align-items:center;border-bottom:1px solid #333}
.nav-btn{background:#2a2a2a;color:white;border:1px solid #444;padding:9px 14px;border-radius:6px;cursor:pointer;font-weight:700;text-transform:uppercase;font-size:12px;transition:.2s;white-space:nowrap;text-decoration:none;display:inline-flex;align-items:center;gap:4px}
.nav-btn:hover{background:#444;border-color:#f1c40f;color:#f1c40f}
.nav-btn.active-page{border-color:#f1c40f55;color:#f1c40f;background:#1a1800}

/* ── PLAYLIST CATEGORY FILTER Bar ── */
.playlist-filter-bar{display:flex;gap:8px;max-width:960px;width:100%;margin:24px auto 0;padding:0 20px;flex-wrap:wrap}
.filter-tab{background:#141414;color:#aaa;border:1px solid #222;padding:8px 16px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;transition:.2s}
.filter-tab:hover{border-color:#444;color:white}
.filter-tab.active-tab{background:#f1c40f;color:#111;border-color:#f1c40f;font-weight:700}

/* ── CONTENT AREA ── */
.video-container{flex:1;max-width:960px;width:100%;margin:16px auto 40px;padding:0 20px}
.iframe-wrapper{position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:8px;border:1px solid #222;box-shadow:0 0 25px rgba(0,0,0,0.6);background:#141414}
.iframe-wrapper iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0;display:none}
.iframe-wrapper iframe.active-frame{display:block}

/* ── FOOTER ── */
footer{text-align:center;padding:16px 10px;color:#333;font-size:12px;border-top:1px solid #1a1a1a;line-height:2;margin-top:auto}
footer a{color:#555;text-decoration:none;transition:.15s;padding:2px 6px;border-radius:3px}
footer a:hover{color:#f1c40f;background:#1a1a1a}
.footer-sep{color:#2a2a2a;margin:0 2px}
</style>
</head>
<body>

<div class="titleBar">
  <div class="titleLeft">
    <h2>Video Hub</h2>
  </div>
</div>

<div class="topBar">
  <a href="index.html" class="nav-btn">🎸 Songs</a>
  <a href="stats.html" class="nav-btn">📊 Stats</a>
  <a href="gear.html" class="nav-btn">⚙️ Gear</a>
  <a href="metronome.html" class="nav-btn">⏱️ Metro</a>
  <a href="youtube.html" class="nav-btn active-page">📺 Videos</a>
</div>

<div class="playlist-filter-bar">
  <button class="filter-tab active-tab" data-target="bass-covers">Bass Covers</button>
  </div>

<div class="video-container">
  <div class="iframe-wrapper">
    <iframe 
      id="bass-covers"
      class="active-frame"
      src="https://www.youtube.com/embed/videoseries?list=PLv2wN8Wfn7RBUb1PRLXMgKB7AcnXpGL3J" 
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
      allowfullscreen>
    </iframe>

    </div>
</div>

<footer>
  <p>© 2026 Lazzarus Prime. All Rights Reserved.</p>
  <a href="https://prime-shop.fourthwall.com/" target="_blank">👕 Merch</a><span class="footer-sep">·</span>
  <a href="https://www.instagram.com/lazzarus__prime/" target="_blank">📸 Instagram</a><span class="footer-sep">·</span>
  <a href="https://streamlabs.com/lazzarus_prime/tip" target="_blank">💰 Donate</a>
</footer>

<script>
document.querySelectorAll('.filter-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active-tab'));
    document.querySelectorAll('.iframe-wrapper iframe').forEach(f => f.classList.remove('active-frame'));
    
    tab.classList.add('active-tab');
    const targetId = tab.getAttribute('data-target');
    const targetFrame = document.getElementById(targetId);
    if(targetFrame) targetFrame.classList.add('active-frame');
  });
});
</script>
</body>
</html>
