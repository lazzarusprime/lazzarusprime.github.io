<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lazzarus Prime Artists</title>

<style>
body{
  font-family:Segoe UI,Arial;
  background:#0f0f0f;
  color:white;
  margin:0;
}

/* 🔥 TITLE BAR */
.titleBar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#141414;
  padding:12px;
  border-bottom:2px solid #222;
  flex-wrap:wrap;
}

.titleLeft{
  display:flex;
  align-items:center;
  gap:10px;
}

.titleBar img{
  width:40px;
}

/* 🔥 SOCIAL LINKS */
.socialLinks{
  display:flex;
  gap:15px;
  flex-wrap:wrap;
}

.socialLinks a{
  color:#aaa;
  text-decoration:none;
  font-size:14px;
  transition:.15s;
}

.socialLinks a:hover{
  color:#f1c40f;
  text-shadow:
    0 0 5px #f1c40f,
    0 0 10px #f1c40f,
    0 0 15px #f1c40f;
}

/* 🔹 TOP BAR */
.topBar{
  display:flex;
  gap:6px;
  padding:10px;
  background:#181818;
  position:sticky;
  top:0;
  z-index:100;
  flex-wrap:wrap;
  justify-content:center;
}

.topBar input{
  flex:1;
  padding:8px;
  border-radius:6px;
  border:none;
  min-width:180px;
}

.clearBtn{
  display:none;
  background:#333;
}

button{
  background:#272727;
  color:white;
  border:none;
  padding:7px 12px;
  border-radius:6px;
  cursor:pointer;
}

button:hover{
  background:#444;
}

/* 🔹 ALPHABET NAV */
#alphabet{
  display:flex;
  flex-wrap:wrap;
  gap:5px;
  padding:10px;
  justify-content:center;
}

/* 🔹 ARTIST CARDS */
.artistCard{
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-bottom:1px solid #222;
  transition:.15s;
}

.artistCard:hover{
  background:#1a1a1a;
}

.artistName{
  font-size:16px;
  font-weight:600;
  color:#ffffff;
  text-shadow:
    0 1px 0 #000,
    0 2px 0 #000,
    0 3px 0 #000;
  cursor:pointer;
  transition:.15s;
}

.pagination{
  padding:10px;
  display:flex;
  justify-content:center;
}
</style>
</head>

<body>

<!-- 🔥 TITLE BAR -->
<div class="titleBar">
  <div class="titleLeft">
    <img src="guitar.png">
    <h2>Lazzarus Prime Artists</h2>
  </div>
  <div class="socialLinks">
    <a href="https://www.twitch.tv/lazzarus_prime" target="_blank">🎸 Twitch</a>
    <a href="https://discord.gg/WCg5sktJNM" target="_blank">💬 Discord</a>
    <a href="https://lazzarus-prime-shop.fourthwall.com/" target="_blank">🛒 Merch</a>
    <a href="https://www.instagram.com/lazzarus__prime/" target="_blank">📸 Instagram</a>
    <a href="https://streamlabs.com/lazzarus_prime/tip" target="_blank">💰 Donations</a>
  </div>
</div>

<!-- 🔹 TOP BAR -->
<div class="topBar">
  <button onclick="goHome()">🏠 Home</button>
  <input id="searchBox" placeholder="Search artist..." oninput="handleSearchInput()">
  <button id="clearBtn" class="clearBtn" onclick="clearSearch()">✖</button>
</div>

<!-- 🔹 ALPHABET NAV -->
<div id="alphabet"></div>

<!-- 🔹 ARTISTS LIST -->
<div id="artistListContainer"></div>

<!-- 🔹 PAGINATION -->
<div id="paginationTop" class="pagination"></div>
<div id="paginationBottom" class="pagination"></div>

<script>
let artists=[]
let filteredArtists=[]
let currentPage=1
const artistsPerPage=40

async function init(){
  const response=await fetch("songs.json")
  const songs=await response.json()
  const set=new Set()
  songs.forEach(s=>set.add(s.artist.trim()))
  artists=[...set].sort((a,b)=>a.localeCompare(b))
  filteredArtists=artists
  buildAlphabet()
  renderArtists()
}

function renderArtists(){
  const container=document.getElementById("artistListContainer")
  container.innerHTML=""
  const start=(currentPage-1)*artistsPerPage
  const end=start+artistsPerPage
  filteredArtists.slice(start,end).forEach(artist=>{
    const div=document.createElement("div")
    div.className="artistCard"
    div.dataset.artist=artist
    div.innerHTML=`<div class="artistName" onclick="goToArtist('${artist.replace(/'/g,"\\'")}')">${artist}</div>`
    container.appendChild(div)
  })
  renderPagination()
}

function goToArtist(artist){
  window.location.href="index.html?artist="+encodeURIComponent(artist)
}

function handleSearchInput(){
  const q=document.getElementById("searchBox").value.toLowerCase()
  filteredArtists=artists.filter(a=>a.toLowerCase().includes(q))
  currentPage=1
  renderArtists()
  toggleClearButton()
}

function toggleClearButton(){
  document.getElementById("clearBtn").style.display=document.getElementById("searchBox").value?"inline":"none"
}

function clearSearch(){
  document.getElementById("searchBox").value=""
  filteredArtists=artists
  currentPage=1
  renderArtists()
  toggleClearButton()
}

  div.innerHTML=""
  "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(letter=>{
