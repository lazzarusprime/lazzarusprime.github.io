<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lazzarus Prime | Artists</title>
<style>
  :root {
    --bg: #0a0a0a;
    --card-bg: #151515;
    --accent: #d4af37;
    --accent-glow: rgba(212, 175, 55, 0.3);
    --text: #e0e0e0;
    --nav-bg: rgba(20, 20, 20, 0.9);
  }

  body { font-family: 'Segoe UI', Roboto, Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; }
  
  /* UPDATED HEADER TEXT STYLE */
  .titleBar { display: flex; justify-content: space-between; align-items: center; background: #000; padding: 20px; border-bottom: 1px solid #222; }
  .titleLeft { display: flex; align-items: center; gap: 15px; }
  
  .titleLeft h2 { 
    margin: 0; 
    font-weight: 900; 
    text-transform: uppercase; 
    background: linear-gradient(to bottom, #fff 20%, #d4af37 40%, #8a6d1a 80%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 8px rgba(212, 175, 55, 0.5));
    font-size: 24px;
  }
  
  .titleBar img { width: 45px; filter: drop-shadow(0 0 5px var(--accent)); }

  /* NAVIGATION BAR */
  .topBar { 
    display: flex; gap: 12px; padding: 15px 20px; background: var(--nav-bg); 
    position: sticky; top: 0; z-index: 100; flex-wrap: wrap; justify-content: center; 
    border-bottom: 1px solid #333; backdrop-filter: blur(10px);
  }
  
  .nav-btn { 
    background: #222; color: #aaa; border: 1px solid #333; padding: 10px 22px; 
    border-radius: 8px; cursor: pointer; font-weight: 700; text-transform: uppercase; 
    font-size: 12px; transition: .3s; 
  }
  .nav-btn:hover { background: #2a2a2a; color: #fff; border-color: #444; }
  .nav-active { background: var(--accent) !important; color: #000 !important; border-color: var(--accent) !important; box-shadow: 0 0 15px var(--accent-glow); }

  .topBar input { flex: 1; padding: 12px 20px; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; min-width: 200px; }

  .artistContainer {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 15px;
    padding: 30px;
  }
  .artistCard {
    padding: 25px;
    background: #111;
    border: 1px solid #1a1a1a;
    border-radius: 12px;
    cursor: pointer;
    transition: .3s;
    text-align: center;
  }
  .artistCard:hover {
    background: #181818;
    border-color: var(--accent);
    transform: translateY(-4px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.5);
  }
  .artistName { font-weight: 700; display: block; margin-bottom: 5px; color: #fff; }
  .artistCount { font-size: 11px; color: #555; text-transform: uppercase; font-weight: bold; }

  .pagination { padding: 30px; text-align: center; color: #555; }
  .pagination button { margin: 0 10px; background: #222; border: none; color: #fff; padding: 8px 15px; border-radius: 6px; cursor: pointer; }
</style>
</head>
<body>

<div class="titleBar">
  <div class="titleLeft">
    <img src="guitar.png">
    <h2>Lazzarus Prime Rocksmith Requests</h2>
  </div>
</div>

<div class="topBar">
  <button class="nav-btn" onclick="window.location.href='index.html'">🏠 Home</button>
  <button class="nav-btn nav-active" onclick="window.location.href='artists.html'">🎸 Artists</button>
  <button class="nav-btn" onclick="randomArtist()">🎲 Random</button>
  <input id="searchBox" placeholder="Search for an artist..." oninput="handleSearchInput()">
</div>

<div id="allArtists" class="artistContainer"></div>

<div id="paginationBottom" class="pagination"></div>

<script>
let allArtists = [];
let filtered = [];
let currentPage = 1;
const perPage = 48;

async function init() {
  const res = await fetch("songs.json");
  const songs = await res.json();
  const map = {};
  songs.forEach(s => { if(!map[s.artist]) map[s.artist]=0; map[s.artist]++; });
  allArtists = Object.keys(map).sort().map(name => ({ name, count: map[name] }));
  filtered = allArtists;
  render();
}

function render() {
  const container = document.getElementById("allArtists");
  container.innerHTML = "";
  const start = (currentPage-1)*perPage;
  filtered.slice(start, start+perPage).forEach(a => {
    const div = document.createElement("div");
    div.className = "artistCard";
    div.onclick = () => window.location.href=`index.html?search=${encodeURIComponent(a.name)}`;
    div.innerHTML = `<span class="artistName">${a.name}</span><span class="artistCount">${a.count} SONGS</span>`;
    container.appendChild(div);
  });
  renderPagination();
}

function renderPagination() {
  const total = Math.ceil(filtered.length/perPage);
  const container = document.getElementById("paginationBottom");
  container.innerHTML = "";
  if(currentPage > 1) {
    let b = document.createElement("button"); b.innerText = "◀";
    b.onclick = () => { currentPage--; render(); window.scrollTo(0,0); };
    container.appendChild(b);
  }
  let s = document.createElement("span"); s.innerText = ` ${currentPage} / ${total} `;
  container.appendChild(s);
  if(currentPage < total) {
    let b = document.createElement("button"); b.innerText = "▶";
    b.onclick = () => { currentPage++; render(); window.scrollTo(0,0); };
    container.appendChild(b);
  }
}

function handleSearchInput() {
  const q = document.getElementById("searchBox").value.toLowerCase();
  filtered = allArtists.filter(a => a.name.toLowerCase().includes(q));
  currentPage = 1;
  render();
}

function randomArtist() {
  const random = allArtists[Math.floor(Math.random()*allArtists.length)];
  window.location.href=`index.html?search=${encodeURIComponent(random.name)}`;
}

init();
</script>
</body>
</html>
