<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lazzarus Prime Rocksmith Artists</title>
<style>
body{ font-family:Segoe UI,Arial; background:#0f0f0f; color:white; margin:0; }
.titleBar{ display:flex; justify-content:space-between; align-items:center; background:#141414; padding:12px; border-bottom:2px solid #222; flex-wrap:wrap; gap:8px; }
.titleLeft{ display:flex; align-items:center; gap:10px; }
.titleBar img{ width:40px; }
.titleLeft h2 { 
  margin: 0; font-weight: 900; text-transform: uppercase; 
  background: linear-gradient(to bottom, #fff 20%, #f1c40f 45%, #b8860b 85%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 5px rgba(241, 196, 15, 0.6));
}
.socialLinks{ display:flex; gap:15px; flex-wrap:wrap; }
.socialLinks a{ color:#aaa; text-decoration:none; font-size:14px; transition:.15s; }
.socialLinks a:hover{ color:#f1c40f; text-shadow:0 0 5px #f1c40f; }

.topBar{ display:flex; gap:8px; padding:12px; background:#181818; position:sticky; top:0; z-index:100; flex-wrap:wrap; justify-content:center; align-items:center; border-bottom: 1px solid #333; }
.topBar input{ flex:1; padding:10px; border-radius:6px; border:none; min-width:180px; background: white; color: black; font-size: 14px; }
.nav-btn { 
  background:#2a2a2a; color:white; border:1px solid #444; padding:10px 18px; 
  border-radius:6px; cursor:pointer; font-weight: 700; text-transform: uppercase;
  font-size: 13px; transition: .2s; white-space: nowrap;
}
.nav-btn:hover { background:#444; border-color: #f1c40f; color: #f1c40f; }

/* Genre filter bar */
#genreBar { display:flex; flex-wrap:wrap; gap:6px; padding:10px 12px; background:#141414; border-bottom:1px solid #222; justify-content:center; }
.genre-btn {
  background:#1e1e1e; color:#ccc; border:1px solid #333; padding:6px 14px;
  border-radius:20px; cursor:pointer; font-size:12px; font-weight:600; transition:.2s;
  text-transform:uppercase; letter-spacing:0.5px;
}
.genre-btn:hover { border-color:#f1c40f; color:#f1c40f; }
.genre-btn.active { background:#f1c40f22; border-color:#f1c40f; color:#f1c40f; }

#alphabet{ display:flex; flex-wrap:wrap; gap:5px; padding:10px; justify-content:center; }

#artistStats{ margin: 0; background:#151515; border-top:1px solid #222; border-bottom:1px solid #222; transition: 0.3s; }
#artistToggle{ cursor:pointer; margin:0; padding: 10px; }
#artistList{ display:none; padding: 10px; border-top: 1px solid #222; animation: slideDown 0.3s ease-out; }
@keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
#artistList div{ padding:4px 0; cursor:pointer; transition:.15s; }
#artistList div:hover{ color:#f1c40f; padding-left: 5px; }
.flame-effect { animation: warmPulse 0.6s ease-out; }
@keyframes warmPulse {
  0% { box-shadow: 0 0 0px transparent; }
  50% { box-shadow: inset 0 0 30px rgba(241, 196, 15, 0.15); border-color: #f1c40f; }
  100% { box-shadow: 0 0 0px transparent; }
}

.artistContainer { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; padding: 20px; }
.artistCard {
  padding: 20px; background: #181818; border: 1px solid #222; border-radius: 8px;
  cursor: pointer; transition: .15s; text-align: center; display: flex; flex-direction: column;
}
.artistCard:hover { background: #222; color: #f1c40f; border-color: #f1c40f; transform: translateY(-2px); }
.artistName { font-weight: bold; font-size: 16px; margin-bottom: 6px; }
.artistCount { font-size: 12px; color: #888; font-weight: bold; }
.artistGenre { font-size: 11px; color: #555; margin-top: 4px; }
.artistCard:hover .artistGenre { color: #a88a00; }

.pagination { padding: 20px; text-align: center; background: #111; }

#activeFilters { display:none; padding:8px 12px; background:#181818; border-bottom:1px solid #222; font-size:13px; color:#888; text-align:center; }
#activeFilters span { color:#f1c40f; }
#activeFilters button { background:transparent; color:#888; border:1px solid #444; padding:3px 10px; border-radius:4px; cursor:pointer; font-size:12px; margin-left:8px; }
#activeFilters button:hover { color:#fff; border-color:#888; }

.section-header { display:flex; justify-content:space-between; align-items:center; padding:8px 20px; border-bottom:1px solid #1a1a1a; }
.section-header h3 { margin:0; font-size:14px; color:#888; }
.results-count { font-size:12px; color:#555; }
</style>

const artistGenreCache = {};
function getArtistGenre(artist) {
  if (artistGenreCache[artist] !== undefined) return artistGenreCache[artist];
  const lower = artist.toLowerCase();
  for (const [genre, list] of Object.entries(GENRE_MAP)) {
    if (list.some(a => lower.includes(a.toLowerCase()) || a.toLowerCase().includes(lower))) {
      artistGenreCache[artist] = genre;
      return genre;
    }
  }
  artistGenreCache[artist] = null;
  return null;
}

let allUniqueArtists = [];
let filteredArtists = [];
let currentPage = 1;
const artistsPerPage = 60;
let activeGenre = null;

async function init() {
  try {
    const response = await fetch("songs.json");
    const songs = await response.json();
    const map = {};
    songs.forEach(s => { if (!map[s.artist]) map[s.artist] = 0; map[s.artist]++; });
    
    allUniqueArtists = Object.keys(map)
      .sort((a, b) => a.localeCompare(b, undefined, { sensitivity: 'base' }))
      .map(name => ({ name, count: map[name], genre: getArtistGenre(name) }));
    
    filteredArtists = [...allUniqueArtists];
    buildGenreBar();
    buildAlphabet();
    buildArtistStats(map);
    renderArtists();
  } catch (e) { console.error("Error:", e); }
}

function buildGenreBar() {
  const bar = document.getElementById("genreBar");
  bar.innerHTML = "";
  for (const genre of Object.keys(GENRE_MAP)) {
    const btn = document.createElement("button");
    btn.className = "genre-btn";
    btn.textContent = genre;
    btn.onclick = () => toggleGenre(genre, btn);
    bar.appendChild(btn);
  }
}

function toggleGenre(genre, btn) {
  if (activeGenre === genre) {
    activeGenre = null;
    document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
    clearAll();
    return;
  }
  activeGenre = genre;
  document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById("searchBox").value = "";
  
  const genreArtists = GENRE_MAP[genre].map(a => a.toLowerCase());
  filteredArtists = allUniqueArtists.filter(a => {
    const lower = a.name.toLowerCase();
    return genreArtists.some(g => lower.includes(g) || g.includes(lower));
  });
  currentPage = 1;
  
  const af = document.getElementById("activeFilters");
  af.style.display = "block";
  document.getElementById("filterLabel").textContent = `${genre} (${filteredArtists.length} artists)`;
  
  renderArtists();
}

function buildAlphabet() {
  const div = document.getElementById("alphabet");
  div.innerHTML = "";
  "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(letter => {
    let b = document.createElement("button");
    b.innerText = letter; b.className = "nav-btn"; b.style.padding = "6px 10px"; b.style.fontSize = "11px";
    b.onclick = () => jumpToLetter(letter);
    div.appendChild(b);
  });
}

function jumpToLetter(letter) {
  document.getElementById("searchBox").value = "";
  filteredArtists = [...allUniqueArtists];
  activeGenre = null;
  document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
  document.getElementById("activeFilters").style.display = "none";
  
  const idx = filteredArtists.findIndex(a => a.name.toLowerCase().startsWith(letter.toLowerCase()));
  if (idx === -1) { renderArtists(); return; }
  currentPage = Math.floor(idx / artistsPerPage) + 1;
  renderArtists();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function buildArtistStats(map) {
  const sorted = Object.entries(map).sort((a, b) => b[1] - a[1]).slice(0, 10);
  const listDiv = document.getElementById("artistList");
  const statsContainer = document.getElementById("artistStats");
  listDiv.innerHTML = "";
  sorted.forEach(([artist, count]) => {
    let row = document.createElement("div");
    row.innerText = `${artist} (${count})`;
    row.onclick = () => selectArtist(artist);
    listDiv.appendChild(row);
  });
  document.getElementById("artistToggle").onclick = () => {
    const isHidden = listDiv.style.display === "none" || listDiv.style.display === "";
    statsContainer.classList.remove("flame-effect");
    void statsContainer.offsetWidth;
    statsContainer.classList.add("flame-effect");
    listDiv.style.display = isHidden ? "block" : "none";
    document.getElementById("artistToggle").querySelector('span:last-child').innerText = isHidden ? "▼" : "▶";
  };
}

function renderArtists() {
  const container = document.getElementById("allArtists");
  container.innerHTML = "";
  const start = (currentPage - 1) * artistsPerPage;
  const pageArtists = filteredArtists.slice(start, start + artistsPerPage);
  
  document.getElementById("resultsCount").textContent = 
    filteredArtists.length !== allUniqueArtists.length
      ? `${filteredArtists.length} artists`
      : `${allUniqueArtists.length} artists total`;
  
  pageArtists.forEach(artist => {
    const div = document.createElement("div");
    div.className = "artistCard";
    div.onclick = () => selectArtist(artist.name);
    div.innerHTML = `
      <span class="artistName">${escapeHtml(artist.name)}</span>
      <span class="artistCount">${artist.count} ${artist.count === 1 ? 'SONG' : 'SONGS'}</span>
      ${artist.genre ? `<span class="artistGenre">${artist.genre}</span>` : ''}
    `;
    container.appendChild(div);
  });
  renderPagination();
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderPagination() {
  const totalPages = Math.ceil(filteredArtists.length / artistsPerPage) || 1;
  [document.getElementById("paginationTop"), document.getElementById("paginationBottom")].forEach(container => {
    container.innerHTML = "";
    if (currentPage > 1) {
      let prev = document.createElement("button");
      prev.innerText = "◀ Prev"; prev.className = "nav-btn"; prev.style.padding = "6px 12px";
      prev.onclick = () => { currentPage--; renderArtists(); window.scrollTo(0, 0); };
      container.appendChild(prev);
    }
    let label = document.createElement("span");
    label.innerText = ` Page ${currentPage} / ${totalPages} `;
    container.appendChild(label);
    if (currentPage < totalPages) {
      let next = document.createElement("button");
      next.innerText = "Next ▶"; next.className = "nav-btn"; next.style.padding = "6px 12px";
      next.onclick = () => { currentPage++; renderArtists(); window.scrollTo(0, 0); };
      container.appendChild(next);
    }
  });
}

function handleSearchInput() {
  const q = document.getElementById("searchBox").value.toLowerCase();
  activeGenre = null;
  document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
  document.getElementById("activeFilters").style.display = "none";
  filteredArtists = allUniqueArtists.filter(a => a.name.toLowerCase().includes(q));
  currentPage = 1;
  renderArtists();
}

function clearAll() {
  document.getElementById("searchBox").value = "";
  activeGenre = null;
  document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
  document.getElementById("activeFilters").style.display = "none";
  filteredArtists = [...allUniqueArtists];
  currentPage = 1;
  renderArtists();
}

function selectArtist(artistName) {
  window.location.href = `index.html?search=${encodeURIComponent(artistName)}`;
}

function randomArtistRedirect() {
  if (!allUniqueArtists.length) return;
  const random = allUniqueArtists[Math.floor(Math.random() * allUniqueArtists.length)];
  selectArtist(random.name);
}

init();
</script>
