<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artists - Lazzarus Prime</title>

<style>
body{
  font-family:Segoe UI,Arial;
  background:#0f0f0f;
  color:white;
  margin:0;
  text-align:center;
}

/* 🔥 TITLE BAR */
.titleBar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#141414;
  padding:12px;
  border-bottom:2px solid #222;
  flex-wrap:wrap;
}

.titleLeft{
  display:flex;
  align-items:center;
  gap:10px;
}

.titleBar img{
  width:40px;
}

.socialLinks{
  display:flex;
  gap:15px;
  flex-wrap:wrap;
}

.socialLinks a{
  color:#aaa;
  text-decoration:none;
  font-size:14px;
  transition:.15s;
}

.socialLinks a:hover{
  color:#f1c40f;
  text-shadow:
    0 0 5px #f1c40f,
    0 0 10px #f1c40f,
    0 0 15px #f1c40f;
}

/* 🔥 TOP BAR */
.topBar{
  display:flex;
  gap:6px;
  padding:10px;
  background:#181818;
  position:sticky;
  top:0;
  z-index:100;
  flex-wrap:wrap;
  justify-content:center;
}

.topBar input{
  flex:1;
  padding:8px;
  border-radius:6px;
  border:none;
  min-width:180px;
}

.clearBtn{
  display:none;
  background:#333;
}

button{
  background:#272727;
  color:white;
  border:none;
  padding:7px 12px;
  border-radius:6px;
  cursor:pointer;
}

button:hover{
  background:#444;
}

/* 🔹 ALPHABET NAV */
#alphabet{
  display:flex;
  flex-wrap:wrap;
  gap:5px;
  justify-content:center;
  padding:10px;
}

/* 🔹 ARTIST GRID */
#artistGrid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:20px;
  padding:20px;
}

.artist-card{
  background:#0b0b0b;
  border:2px solid #f1c40f;
  border-radius:12px;
  padding:20px;
  cursor:pointer;
  transition:all 0.2s ease-in-out;
  box-shadow:0 0 10px #f1c40f;
}

.artist-card:hover{
  transform:scale(1.05);
  background:#f1c40f;
  color:black;
  box-shadow:
    0 0 20px #f1c40f,
    0 0 40px #f1c40f,
    0 0 60px #f1c40f;
}

.artist-name{
  font-size:18px;
  font-weight:bold;
}

.song-count{
  font-size:12px;
  opacity:0.7;
  margin-top:5px;
}

/* 🔹 PAGINATION */
.pagination{
  padding:10px;
  text-align:center;
}
</style>
</head>
<body>

<!-- 🔥 TITLE BAR -->
<div class="titleBar">
  <div class="titleLeft">
    <img src="guitar.png">
    <h2>Lazzarus Prime Rocksmith Requests</h2>
  </div>
  <div class="socialLinks">
    <a href="index.html">🏠 Home</a>
    <a href="artists.html">🎸 Artists</a>
    <a href="https://www.twitch.tv/lazzarus_prime" target="_blank">Twitch</a>
    <a href="https://discord.gg/WCg5sktJNM" target="_blank">Discord</a>
    <a href="https://lazzarus-prime-shop.fourthwall.com/" target="_blank">Merch</a>
    <a href="https://www.instagram.com/lazzarus__prime/" target="_blank">Instagram</a>
    <a href="https://streamlabs.com/lazzarus_prime/tip" target="_blank">Donations</a>
  </div>
</div>

<!-- 🔥 TOP BAR -->
<div class="topBar">
  <button onclick="window.location.href='index.html'">🏠 Back to Songs</button>
  <input type="text" id="search" placeholder="Search artist..." oninput="handleSearch()">
  <button id="clearBtn" class="clearBtn" onclick="clearSearch()">✖</button>
</div>

<!-- 🔹 ALPHABET NAVIGATION -->
<div id="alphabet"></div>

<h1>🎸 Artists</h1>

<!-- 🔹 PAGINATION TOP -->
<div class="pagination" id="paginationTop"></div>

<!-- 🔹 ARTIST GRID -->
<div id="artistGrid"></div>

<!-- 🔹 PAGINATION BOTTOM -->
<div class="pagination" id="paginationBottom"></div>

<script>
let songs=[]
let artists=[]
let filteredArtists=[]
let currentPage=1
const artistsPerPage=12

// Load songs.json and build artist list
async function init(){
  const res=await fetch("songs.json")
  songs=await res.json()
  
  const map={}
  songs.forEach(s=>{
    if(!map[s.artist]) map[s.artist]=0
    map[s.artist]++
  })
  
  artists=Object.entries(map).map(([name,count])=>({name,count}))
  artists.sort((a,b)=>b.count-a.count)
  
  filteredArtists=artists
  buildAlphabet()
  renderArtists()
}

// Render artists grid with pagination
function renderArtists(){
  const grid=document.getElementById("artistGrid")
  grid.innerHTML=""
  const start=(currentPage-1)*artistsPerPage
  const end=start+artistsPerPage
  filteredArtists.slice(start,end).forEach(a=>{
    const div=document.createElement("div")
    div.className="artist-card"
    div.innerHTML=`
      <div class="artist-name">${a.name}</div>
      <div class="song-count">${a.count} songs</div>
    `
    div.onclick=()=>filterByArtist(a.name)
    grid.appendChild(div)
  })
  renderPagination()
}

// Filter by artist search
function handleSearch(){
  const q=document.getElementById("search").value.toLowerCase()
  filteredArtists=artists.filter(a=>a.name.toLowerCase().includes(q))
  currentPage=1
  renderArtists()
  toggleClear()
}

function toggleClear(){
  document.getElementById("clearBtn").style.display=document.getElementById("search").value?"inline":"none"
}

function clearSearch(){
  document.getElementById("search").value=""
  filteredArtists=artists
  currentPage=1
  renderArtists()
  toggleClear()
}

// Jump to artist starting with letter
function jumpToLetter(letter){
  const idx=filteredArtists.findIndex(a=>a.name.toLowerCase().startsWith(letter.toLowerCase()))
  if(idx===-1) return
  currentPage=Math.floor(idx/artistsPerPage)+1
  renderArtists()
}

// Build alphabet nav
function buildAlphabet(){
  const div=document.getElementById("alphabet")
  div.innerHTML=""
  "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(letter=>{
    const b=document.createElement("button")
    b.innerText=letter
    b.onclick=()=>jumpToLetter(letter)
    div.appendChild(b)
  })
}

// Pagination
function renderPagination(){
  const totalPages=Math.ceil(filteredArtists.length/artistsPerPage)||1
  const top=document.getElementById("paginationTop")
  const bottom=document.getElementById("paginationBottom")
  [top,bottom].forEach(container=>{
    container.innerHTML=""
    if(currentPage>1){
      const prev=document.createElement("button")
      prev.innerText="◀ Prev"
      prev.onclick=()=>{currentPage--; renderArtists()}
      container.appendChild(prev)
    }
    const label=document.createElement("span")
    label.innerText=` Page ${currentPage} / ${totalPages} `
    container.appendChild(label)
    if(currentPage<totalPages){
      const next=document.createElement("button")
      next.innerText="Next ▶"
      next.onclick=()=>{currentPage++; renderArtists()}
      container.appendChild(next)
    }
  })
}

// Filter by clicking an artist card
function filterByArtist(name){
  document.getElementById("search").value=name
  filteredArtists=artists.filter(a=>a.name===name)
  currentPage=1
  renderArtists()
  toggleClear()
}

init()
</script>
</body>
</html>
