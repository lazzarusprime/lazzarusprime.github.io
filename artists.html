<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artists - Lazzarus Prime</title>

<style>
body{
  font-family:Segoe UI,Arial;
  background:#0f0f0f;
  color:white;
  margin:0;
  text-align:center;
}
/* 🔥 TITLE BAR */
.titleBar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#141414;
  padding:12px;
  border-bottom:2px solid #222;
  flex-wrap:wrap;
}
.titleLeft{
  display:flex;
  align-items:center;
  gap:10px;
}
.titleBar img{
  width:40px;
}
.socialLinks{
  display:flex;
  gap:15px;
  flex-wrap:wrap;
}
.socialLinks a{
  color:#aaa;
  text-decoration:none;
  font-size:14px;
  transition:.15s;
}
.socialLinks a:hover{
  color:#f1c40f;
  text-shadow:
  0 0 5px #f1c40f,
  0 0 10px #f1c40f,
  0 0 15px #f1c40f;
}

/* 🔥 TOP BAR */
.topBar{
  display:flex;
  gap:6px;
  padding:10px;
  background:#181818;
  position:sticky;
  top:0;
  z-index:100;
  flex-wrap:wrap;
  justify-content:center;
}
.topBar input{
  flex:1;
  padding:8px;
  border-radius:6px;
  border:none;
  min-width:180px;
}
.clearBtn{
  display:none;
  background:#333;
}
button{
  background:#272727;
  color:white;
  border:none;
  padding:7px 12px;
  border-radius:6px;
  cursor:pointer;
}
button:hover{
  background:#444;
}

#alphabet{
  display:flex;
  flex-wrap:wrap;
  gap:5px;
  justify-content:center;
  padding:10px;
}

#artistGrid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:20px;
  padding:20px;
}
.artist-card{
  background:#0b0b0b;
  border:2px solid #f1c40f;
  border-radius:12px;
  padding:20px;
  cursor:pointer;
  transition:all 0.2s ease-in-out;
  box-shadow:0 0 10px #f1c40f;
}
.artist-card:hover{
  transform:scale(1.05);
  background:#f1c40f;
  color:black;
  box-shadow:
    0 0 20px #f1c40f,
    0 0 40px #f1c40f,
    0 0 60px #f1c40f;
}
.artist-name{
  font-size:18px;
  font-weight:bold;
}
.song-count{
  font-size:12px;
  opacity:0.7;
  margin-top:5px;
}
.pagination{
  padding:10px;
}
</style>
</head>
<body>

<!-- 🔥 TITLE BAR WITH GUITAR AND SOCIAL LINKS -->
<div class="titleBar">
  <div class="titleLeft">
    <img src="guitar.png">
    <h2>Lazzarus Prime Rocksmith Requests</h2>
  </div>
  <div class="socialLinks">
    <a href="https://www.twitch.tv/lazzarus_prime" target="_blank">🎸 Twitch</a>
    <a href="https://discord.gg/WCg5sktJNM" target="_blank">💬 Discord</a>
    <a href="https://lazzarus-prime-shop.fourthwall.com/" target="_blank">🛒 Merch</a>
    <a href="https://www.instagram.com/lazzarus__prime/" target="_blank">📸 Instagram</a>
    <a href="https://streamlabs.com/lazzarus_prime/tip" target="_blank">💰 Donations</a>
  </div>
</div>

<!-- 🔥 SEARCH BAR & BACK BUTTON -->
<div class="topBar">
  <button onclick="window.location.href='index.html'">🏠 Back to Songs</button>
  <input type="text" id="search" placeholder="Search artist...">
  <button id="clearBtn" class="clearBtn" onclick="clearSearch()">✖</button>
</div>

<!-- 🔹 ALPHABET NAVIGATION -->
<div id="alphabet"></div>

<h1>🎸 Artists</h1>

<div id="artistGrid"></div>
<div class="pagination" id="pagination"></div>

<script>
// 🔹 SONG DATA
let songs = []
let artists = []
let filteredArtists = []
let currentPage = 1
const artistsPerPage = 12

// 🔹 NORMALIZER
const artistFixes={
"metalica":"Metallica",
"greenday":"Green Day",
"acdc":"AC/DC",
"guns n roses":"Guns N' Roses"
}
function normalizeArtist(name){
  if(!name)return "Unknown"
  let cleaned=name.trim().toLowerCase()
  cleaned=cleaned.replace(/\s+/g," ")
  if(artistFixes[cleaned])return artistFixes[cleaned]
  return cleaned.replace(/\b\w/g,c=>c.toUpperCase())
}

// 🔹 LOAD SONGS
fetch("songs.json")
.then(r=>r.json())
.then(data=>{
  songs = data.map(s=>({artist: normalizeArtist(s.artist), song: s.song}))
  buildArtistList()
  buildAlphabet()
  renderArtists()
})

// 🔹 BUILD CLEAN ARTIST LIST
function buildArtistList(){
  const map = {}
  songs.forEach(s=>{
    if(!map[s.artist]) map[s.artist]=0
    map[s.artist]++
  })
  artists = Object.keys(map).sort((a,b)=>a.localeCompare(b))
  filteredArtists = artists
}

// 🔹 RENDER ALPHABET
function buildAlphabet(){
  const container = document.getElementById("alphabet")
  container.innerHTML=""
  "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(letter=>{
    const btn = document.createElement("button")
    btn.innerText=letter
    btn.onclick=()=>filterByLetter(letter)
    container.appendChild(btn)
  })
}

// 🔹 FILTER BY LETTER
function filterByLetter(letter){
  filteredArtists = artists.filter(a=>a.toUpperCase().startsWith(letter))
  currentPage=1
  renderArtists()
}

// 🔹 RENDER ARTISTS WITH PAGINATION
function renderArtists(){
  const grid = document.getElementById("artistGrid")
  grid.innerHTML=""
  const start = (currentPage-1)*artistsPerPage
  const end = start + artistsPerPage
  const pageArtists = filteredArtists.slice(start,end)
  pageArtists.forEach(artist=>{
    const count = songs.filter(s=>s.artist===artist).length
    const card = document.createElement("div")
    card.className="artist-card"
    card.innerHTML=`<div class="artist-name">${artist}</div><div class="song-count">${count} songs</div>`
    card.onclick=()=>window.location.href=`index.html?artist=${encodeURIComponent(artist)}`
    grid.appendChild(card)
  })
  renderPagination()
}

// 🔹 PAGINATION CONTROLS
function renderPagination(){
  const container = document.getElementById("pagination")
  container.innerHTML=""
  const totalPages = Math.ceil(filteredArtists.length / artistsPerPage) || 1
  if(currentPage>1){
    const prev = document.createElement("button")
    prev.innerText="◀ Prev"
    prev.onclick=()=>{currentPage--; renderArtists()}
    container.appendChild(prev)
  }
  const label = document.createElement("span")
  label.innerText=" Page "+currentPage+" / "+totalPages+" "
  container.appendChild(label)
  if(currentPage<totalPages){
    const next = document.createElement("button")
    next.innerText="Next ▶"
    next.onclick=()=>{currentPage++; renderArtists()}
    container.appendChild(next)
  }
}

// 🔹 SEARCH
const searchInput = document.getElementById("search")
const clearBtn = document.getElementById("clearBtn")

searchInput.addEventListener("input",e=>{
  const q = e.target.value.toLowerCase()
  filteredArtists = artists.filter(a=>a.toLowerCase().includes(q))
  currentPage=1
  renderArtists()
  toggleClearButton()
})

function toggleClearButton(){
  clearBtn.style.display = searchInput.value ? "inline" : "none"
}
function clearSearch(){
  searchInput.value=""
  filteredArtists = artists
  currentPage=1
  renderArtists()
  toggleClearButton()
}

// 🔹 INITIAL STATE
toggleClearButton()
</script>

</body>
</html>
