<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lazzarus Prime Artists</title>
<style>
/* same CSS as index.html to keep Top Artists styling consistent */
body{
  font-family:Segoe UI,Arial;
  background:#0f0f0f;
  color:white;
  margin:0;
}
.titleBar{display:flex;justify-content:space-between;align-items:center;background:#141414;padding:12px;border-bottom:2px solid #222;flex-wrap:wrap}
.titleLeft{display:flex;align-items:center;gap:10px}
.titleBar img{width:40px}
.socialLinks{display:flex;gap:15px;flex-wrap:wrap}
.socialLinks a{color:#aaa;text-decoration:none;font-size:14px;transition:.15s}
.socialLinks a:hover{color:#f1c40f;text-shadow:0 0 5px #f1c40f,0 0 10px #f1c40f,0 0 15px #f1c40f}
.topBar{display:flex;gap:6px;padding:10px;background:#181818;position:sticky;top:0;z-index:100;flex-wrap:wrap;justify-content:center}
.topBar input{flex:1;padding:8px;border-radius:6px;border:none;min-width:180px}
.clearBtn{display:none;background:#333}
button{background:#272727;color:white;border:none;padding:7px 12px;border-radius:6px;cursor:pointer}
button:hover{background:#444}
#artistStats{padding:10px;background:#151515;border-top:1px solid #222;border-bottom:1px solid #222;text-align:left}
#artistStats h3{cursor:pointer;margin:0}
#artistList{display:none;margin-top:5px}
#artistList div{padding:4px 0;cursor:pointer;transition:.15s}
#artistList div:hover{color:#f1c40f;text-shadow:0 0 5px #f1c40f,0 0 10px #f1c40f,0 0 15px #f39c12;transform:scale(1.05)}
</style>
</head>
<body>

<div class="titleBar">
  <div class="titleLeft">
    <img src="guitar.png">
    <h2>Lazzarus Prime Artists</h2>
  </div>
  <div class="socialLinks">
    <a href="index.html">🏠 Home</a>
    <a href="artists.html">🎸 Artists</a>
    <a href="https://www.twitch.tv/lazzarus_prime" target="_blank">Twitch</a>
    <a href="https://discord.gg/WCg5sktJNM" target="_blank">Discord</a>
    <a href="https://lazzarus-prime-shop.fourthwall.com/" target="_blank">Merch</a>
    <a href="https://www.instagram.com/lazzarus__prime/" target="_blank">Instagram</a>
    <a href="https://streamlabs.com/lazzarus_prime/tip" target="_blank">Donations</a>
  </div>
</div>

<div class="topBar">
  <button onclick="window.location.href='index.html'">🏠 Home</button>
  <button onclick="window.location.href='artists.html'">🎸 Artists</button>
  <input id="searchBox" placeholder="Search artist..." oninput="handleSearchInput()">
  <button id="clearBtn" class="clearBtn" onclick="clearSearch()">✖</button>
</div>

<div id="artistStats">
  <h3 id="artistToggle">🎸 Top Artists In Library ▶</h3>
  <div id="artistList"></div>
</div>

<script>
let songs=[]
async function init(){
  const response=await fetch("songs.json")
  songs=await response.json()
  buildArtistStats()
  document.getElementById("artistStats").style.display="block"
}
function buildArtistStats(){
  const map={}
  songs.forEach(s=>{
    if(!map[s.artist]) map[s.artist]=0
    map[s.artist]++
  })
  const sorted=Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,10)
  const div=document.getElementById("artistList")
  div.innerHTML=""
  sorted.forEach(([artist,count])=>{
    let row=document.createElement("div")
    row.innerText=artist+" ("+count+")"
    row.onclick=()=>filterArtist(artist)
    div.appendChild(row)
  })
  document.getElementById("artistToggle").onclick=()=>{
    const list=document.getElementById("artistList")
    if(list.style.display==="none"||list.style.display===""){list.style.display="block";document.getElementById("artistToggle").innerText="🎸 Top Artists In Library ▼"}
    else{list.style.display="none";document.getElementById("artistToggle").innerText="🎸 Top Artists In Library ▶"}
  }
}
function handleSearchInput(){
  const q=document.getElementById("searchBox").value.toLowerCase()
  filterArtist(q)
  toggleClearButton()
}
function toggleClearButton(){
  document.getElementById("clearBtn").style.display=document.getElementById("searchBox").value?"inline":"none"
}
function clearSearch(){document.getElementById("searchBox").value="";filterArtist("");toggleClearButton()}
function filterArtist(artist){artist=artist.toLowerCase();const div=document.getElementById("artistList");Array.from(div.children).forEach(row=>{row.style.display=row.innerText.toLowerCase().includes(artist)||artist===""?"block":"none"})}
init()
</script>

</body>
</html>
