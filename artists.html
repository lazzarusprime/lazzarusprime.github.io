<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lazzarus Prime - Artists</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',Segoe UI,Arial;background:#0f0f0f;color:white;margin:0;overflow-x:hidden}

.titleBar{display:flex;justify-content:space-between;align-items:center;background:#141414;padding:10px 14px;border-bottom:2px solid #222;flex-wrap:wrap;gap:8px}
.titleLeft{display:flex;align-items:center;gap:10px}
.titleBar img{width:36px;height:36px;filter:drop-shadow(0 0 6px rgba(241,196,15,.4))}
.titleLeft h2{margin:0;font-weight:900;text-transform:uppercase;font-size:clamp(14px,2.5vw,22px);background:linear-gradient(to bottom,#fff 20%,#f1c40f 45%,#b8860b 85%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 5px rgba(241,196,15,.6))}
.socialLinks{display:flex;gap:10px;flex-wrap:wrap}
.socialLinks a{color:#aaa;text-decoration:none;font-size:13px;transition:.15s;white-space:nowrap;padding:4px 8px;border-radius:4px}
.socialLinks a:hover{color:#f1c40f;text-shadow:0 0 5px #f1c40f;background:#1a1a1a}

.topBar{display:flex;gap:6px;padding:8px 10px;background:#181818;position:sticky;top:0;z-index:100;flex-wrap:wrap;justify-content:center;align-items:center;border-bottom:1px solid #333}
.topBar input{flex:1;padding:9px 12px;border-radius:6px;border:none;min-width:150px;background:white;color:black;font-size:14px}
.nav-btn{background:#2a2a2a;color:white;border:1px solid #444;padding:9px 14px;border-radius:6px;cursor:pointer;font-weight:700;text-transform:uppercase;font-size:12px;transition:.2s;white-space:nowrap}
.nav-btn:hover,.nav-btn:active{background:#444;border-color:#f1c40f;color:#f1c40f}
.nav-btn.spinning{pointer-events:none;border-color:#f1c40f;color:#f1c40f;background:#444}

#genreBar{display:flex;flex-wrap:wrap;gap:5px;padding:8px 10px;background:#141414;border-bottom:1px solid #222;justify-content:center}
.genre-btn{background:#1e1e1e;color:#bbb;border:1px solid #333;padding:5px 12px;border-radius:16px;cursor:pointer;font-size:11px;font-weight:600;transition:.2s;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
.genre-btn:hover{border-color:#f1c40f;color:#f1c40f}
.genre-btn.active{background:#f1c40f22;border-color:#f1c40f;color:#f1c40f}

#alphabet{display:flex;flex-wrap:wrap;gap:4px;padding:8px 10px;justify-content:center}

#artistStats{background:#151515;border-bottom:1px solid #222;transition:.3s}
#artistToggle{cursor:pointer;margin:0;padding:10px 14px;font-size:14px;font-weight:700;user-select:none}
#artistList{display:none;padding:10px 14px;border-top:1px solid #222;animation:slideDown .3s ease-out;columns:2;gap:20px}
@media(max-width:500px){#artistList{columns:1}}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
#artistList div{padding:4px 0;cursor:pointer;transition:.15s;break-inside:avoid;font-size:13px}
#artistList div:hover{color:#f1c40f;padding-left:4px}
.flame-effect{animation:warmPulse .6s ease-out}
@keyframes warmPulse{0%{box-shadow:0 0 0 transparent}50%{box-shadow:inset 0 0 30px rgba(241,196,15,.15);border-color:#f1c40f}100%{box-shadow:0 0 0 transparent}}

#activeFilters{display:none;padding:7px 12px;background:#181818;border-bottom:1px solid #222;font-size:13px;color:#888;text-align:center}
#activeFilters span{color:#f1c40f}
#activeFilters button{background:transparent;color:#888;border:1px solid #444;padding:2px 8px;border-radius:4px;cursor:pointer;font-size:12px;margin-left:8px}

.listHeader{display:flex;justify-content:space-between;align-items:center;padding:6px 12px;border-bottom:1px solid #1a1a1a}
.listHeader h3{margin:0;font-family:'Bebas Neue',sans-serif;font-size:18px;color:#666;letter-spacing:.5px}
.resultsCount{font-size:12px;color:#555}

/* ─── Sort Bar ─── */
#sortBar{display:flex;gap:6px;padding:8px 12px;background:#141414;border-bottom:1px solid #222;align-items:center}
#sortBar span{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:.5px;font-weight:700}
.sort-btn{background:transparent;color:#666;border:1px solid #333;padding:4px 10px;border-radius:12px;cursor:pointer;font-size:11px;font-weight:700;text-transform:uppercase;transition:.2s}
.sort-btn:hover{border-color:#f1c40f;color:#f1c40f}
.sort-btn.active{background:#f1c40f22;border-color:#f1c40f;color:#f1c40f}

/* ─── Artist card grid ─── */
.artistGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;padding:14px}

.artistCard{background:#181818;border:1px solid #222;border-radius:8px;cursor:pointer;transition:.2s;overflow:hidden;display:flex;flex-direction:column}
.artistCard:hover{border-color:#f1c40f;transform:translateY(-3px);box-shadow:0 6px 20px rgba(241,196,15,.12)}
.artistCard:active{transform:translateY(0)}

.artistCardArt{width:100%;aspect-ratio:1;object-fit:cover;background:#111;display:block}
.artistCardArtPlaceholder{width:100%;aspect-ratio:1;background:linear-gradient(135deg,#1a1a1a,#222);display:flex;align-items:center;justify-content:center;font-size:36px;color:#333}

.artistCardBody{padding:10px 10px 8px}
.artistCardName{font-weight:700;font-size:14px;color:#fff;margin-bottom:4px;line-height:1.2}
.artistCardCount{font-size:11px;color:#888;font-weight:600;letter-spacing:.3px}
.artistCardGenre{font-size:10px;color:#555;margin-top:3px}

.pagination{padding:12px;text-align:center;background:#111;border-bottom:1px solid #222}

footer{text-align:center;padding:20px;color:#333;font-size:12px;border-top:1px solid #1a1a1a}
footer a{color:#555;text-decoration:none;transition:.15s}
footer a:hover{color:#f1c40f}

@media(max-width:600px){
  .titleBar{padding:8px 10px}
  .socialLinks a{font-size:12px}
  .topBar{gap:5px;padding:6px 8px}
  .nav-btn{padding:8px 10px;font-size:11px}
  .topBar input{font-size:13px;padding:8px 10px}
  .artistGrid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;padding:10px}
  .artistCardBody{padding:8px}
  .artistCardName{font-size:13px}
}
@media(max-width:380px){.artistGrid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<div class="titleBar">
  <div class="titleLeft">
    <img src="guitar.png" alt="Guitar">
    <h2>Lazzarus Prime — Artists</h2>
  </div>
  <div class="socialLinks">
    <a href="https://www.twitch.tv/lazzarus_prime" target="_blank">🎸 Twitch</a>
    <a href="https://discord.gg/WCg5sktJNM" target="_blank">💬 Discord</a>
    <a href="https://lazzarus-prime-shop.fourthwall.com/" target="_blank">👕 Merch</a>
    <a href="https://www.instagram.com/lazzarus__prime/" target="_blank">📸 Insta</a>
    <a href="https://streamlabs.com/lazzarus_prime/tip" target="_blank">💰 Donate</a>

</div>

<div class="topBar">
  <button class="nav-btn" onclick="location.href='index.html'">🏠 Home</button>
  <button class="nav-btn" onclick="location.href='artists.html'">🎸 Artists</button>
  <button class="nav-btn" onclick="location.href='stats.html'">📊 Stats</button>
  <button class="nav-btn" onclick="randomArtist(this)">🎲 Random</button>
  <input id="searchBox" placeholder="Search artist..." oninput="handleSearch()">
</div>

<div id="genreBar"></div>

<div id="activeFilters">
  Showing: <span id="filterLabel"></span>
  <button onclick="clearAll()">✕ Clear</button>
</div>

<div id="alphabet"></div>

<div id="artistStats">
  <h3 id="artistToggle"><span>🎸 Top Artists In Library</span> <span style="float:right">▶</span></h3>
  <div id="artistList"></div>
</div>

<div id="sortBar">
  <span>Sort:</span>
  <button class="sort-btn active" id="sortAlpha" onclick="setSort('alpha')">A–Z</button>
  <button class="sort-btn" id="sortCount" onclick="setSort('count')">Most Songs</button>
</div>

<div id="paginationTop" class="pagination"></div>
<div class="listHeader">
  <h3>ALL ARTISTS</h3>
  <span id="resultsCount" class="resultsCount"></span>
</div>
<div class="artistGrid" id="artistGrid"></div>
<div id="paginationBottom" class="pagination"></div>

<footer>
  <a href="index.html">Song Library</a> &nbsp;·&nbsp;
  <a href="stats.html">Stats</a> &nbsp;·&nbsp;
  <a href="https://discord.gg/WCg5sktJNM" target="_blank">Discord</a>
</footer>

<script>
let allArtists = [], filteredArtists = [], currentPage = 1;
const perPage = 80;
let activeGenre = null, currentSort = 'alpha';

const GENRE_MAP = {
  "Metal": ["Metallica","Megadeth","Slayer","Pantera","Iron Maiden","Black Sabbath","Ozzy Osbourne","Judas Priest","Anthrax","Sepultura","Tool","System of A Down","Slipknot","Korn","Disturbed","Avenged Sevenfold","Five Finger Death Punch","Killswitch Engage","Lamb of God","Gojira","Opeth","Dream Theater","Queensryche","Accept","Motorhead","Whitesnake","Dio","Rainbow","Deep Purple","Twisted Sister","Skid Row","Poison","Ratt","Motley Crue","White Zombie","Rob Zombie","Marilyn Manson","Alice in Chains","Soundgarden","Stone Temple Pilots","Audioslave","Velvet Revolver","Creed","Nickelback","Breaking Benjamin","Three Days Grace","Seether","Staind","Puddle Of Mudd","Mudvayne","Crossfade","Trapt","Nonpoint","Taproot","Cradle of Filth","Periphery","Animals As Leaders","DragonForce","Queens of the Stone Age","Royal Blood","Ghost","Volbeat","Airbourne","Rival Sons","Helmet","Alter Bridge","Danzig","Rage Against The Machine","Prophets of Rage","Muse","Bush","Fuel","Chevelle","Filter","The Tea Party","The Cult","Blue Oyster Cult","Rush","Godsmack","Papa Roach","Linkin Park","Limp Bizkit","Deftones","Incubus","Finger Eleven","Our Lady Peace","Theory of A Deadman","Shinedown","Hinder","Drowning Pool","P.O.D.","Rise Against","Pennywise","Bad Religion","Rancid","Sum 41","Billy Talent","Paramore","My Chemical Romance","Asking Alexandria","Ice Nine Kills","Suicidal Tendencies","Primus","Alice Cooper","Warrant","Tesla","Extreme","Mr. Big","Winger","Dokken","Scorpions","Triumph","Kansas","Boston","Styx","Foghat","Bachman Turner Overdrive","Grand Funk Railroad","Mountain","Ted Nugent","Hoobastank","Sick Puppies","Green Day","Offspring"],
  "Classic Rock": ["Led Zeppelin","The Rolling Stones","Rolling Stones","The Who","Pink Floyd","Aerosmith","Eagles","Fleetwood Mac","The Doors","Doors","Jimi Hendrix","Cream","Eric Clapton","Jeff Beck","Peter Frampton","Foreigner","Journey","REO Speedwagon","Heart","Cheap Trick","Tom Petty","Allman Brothers","Lynyrd Skynyrd","ZZ Top","Van Halen","Queen","AC/DC","ACDC","The Beatles","Beatles","David Bowie","Rod Stewart","Elton John","Bruce Springsteen","Bob Dylan","Neil Young","Paul Simon","Beach Boys","The Kinks","Kinks","T. Rex","Thin Lizzy","Bad Company","Free","Traffic","Steve Winwood","Genesis","Peter Gabriel","Phil Collins","Yes","King Crimson","Emerson Lake","Budgie","Blue Oyster Cult","Rush","Steppenwolf","Foghat","Bachman Turner Overdrive","April Wine","Guess Who","Trooper","Loverboy","Kim Mitchell","Chilliwack","Sloan","Bryan Adams","Blue Rodeo","Tragically Hip","Matthew Good","Moist","Glorious Sons","Sheepdogs","Sass Jordan","Big Wreck","Jeff Healey","Santana","Steve Miller Band","Steely Dan","Toto","Chicago","Electric Light Orchestra","ELO","Golden Earring","Jethro Tull","Uriah Heep","Supertramp","Crosby Stills","America","Jackson Browne","James Taylor","Gordon Lightfoot","Jim Croce"],
  "Pop": ["Taylor Swift","Katy Perry","Ariana Grande","Lady Gaga","Beyonce","Rihanna","Madonna","Michael Jackson","Britney Spears","Justin Timberlake","Ed Sheeran","Adele","Dua Lipa","Harry Styles","Olivia Rodrigo","Billie Eilish","Camila Cabello","Halsey","Shawn Mendes","Miley Cyrus","Sia","Ellie Goulding","Natasha Bedingfield","Alanis Morissette","Avril Lavigne","Kelly Clarkson","Kesha","Gwen Stefani","No Doubt","Pink","Christina Aguilera","Celine Dion","Whitney Houston","Mariah Carey","Cyndi Lauper","Duran Duran","INXS","Roxette","Backstreet Boys","One Direction","5 Seconds of Summer","Carly Rae Jepsen","Lorde","Vance Joy","Train","Matchbox Twenty","OneRepublic","Coldplay","Arcade Fire","Metric","City and Colour","Lumineers","Counting Crows","Gin Blossoms","BLACKPINK","BTS","YOASOBI","Lana Del Rey","MGMT","Foster the People","Imagine Dragons","Twenty One Pilots","Gorillaz","Beck"],
  "R&B Soul": ["Marvin Gaye","Stevie Wonder","Aretha Franklin","James Brown","Otis Redding","Sam Cooke","Al Green","Ray Charles","Curtis Mayfield","Isaac Hayes","Sly and The Family Stone","Earth Wind and Fire","Kool and The Gang","Tower of Power","Isley Brothers","Four Tops","Temptations","Commodores","Lionel Richie","Diana Ross","Gladys Knight","Tina Turner","Mary J Blige","Alicia Keys","John Legend","Bruno Mars","Anderson Paak","Thundercat","Vulfpeck","Khruangbin","Amy Winehouse","Sade","Lauryn Hill","Fugees","TLC","Janet Jackson","Donna Summer","Gloria Gaynor","Bee Gees"],
  "Hip Hop": ["Eminem","Jay-Z","Jay Z","Kendrick Lamar","Kanye West","Drake","Post Malone","2Pac","NWA","Ice Cube","Dr. Dre","Snoop Dogg","Nas","Biggie","Wu Tang Clan","Beastie Boys","Run DMC","Public Enemy","LL Cool J","Cypress Hill","DMX","Busta Rhymes","50 Cent","Fort Minor","Afroman","Coolio","Childish Gambino","Anderson Paak","Wiz Khalifa","Mac Miller","Cardi B","Limp Bizkit","Kid Rock","LMFAO","Flo Rida","Pitbull"],
  "Blues": ["BB King","B.B. King","Albert King","Muddy Waters","Howlin Wolf","Robert Johnson","John Lee Hooker","Eric Clapton","Jeff Beck","Stevie Ray Vaughan","Stevie Ray Vaughn","Jonny Lang","Kenny Wayne Shepherd","Buddy Guy","Joe Cocker","George Thorogood","Blues Brothers","Jack White","White Stripes","Black Keys","Ben Harper","John Mayer","Bonnie Raitt","Gary Clark Jr.","Derek Trucks"],
  "Country": ["Johnny Cash","Dolly Parton","Willie Nelson","Waylon Jennings","Garth Brooks","Alan Jackson","George Strait","Kenny Rogers","Hank Williams","Patsy Cline","Loretta Lynn","Glen Campbell","Alabama","Chris Stapleton","Kacey Musgraves","Luke Combs","Carrie Underwood","Rascal Flatts","Dixie Chicks","Brooks and Dunn","Shania Twain","Zac Brown Band","Sturgill Simpson","Gordon Lightfoot","Jim Croce","John Denver","Lumineers","Mumford and Sons"],
  "Funk Disco": ["James Brown","Sly and The Family Stone","Earth Wind and Fire","Kool and The Gang","Parliament","Funkadelic","Prince","Rick James","Ohio Players","Tower of Power","War","Commodores","Donna Summer","Gloria Gaynor","Bee Gees","KC and The Sunshine Band","Daft Punk","Jamiroquai","Bruno Mars","Mark Ronson","Vulfpeck","Khruangbin","Fatboy Slim"],
  "Indie Alt": ["Radiohead","Pixies","Sonic Youth","Modest Mouse","The Shins","Arcade Fire","Tame Impala","Mac DeMarco","Courtney Barnett","PJ Harvey","St. Vincent","Fiona Apple","Interpol","Bloc Party","Franz Ferdinand","The Strokes","Yeah Yeah Yeahs","Cage The Elephant","MGMT","Foster the People","Lorde","Gorillaz","Beck","Massive Attack","Portishead","American Football","Hot Mulligan","The Wonder Years","Death Cab for Cutie","Fleet Foxes","Bon Iver","Vampire Weekend","Foals","Alt-J","Royal Blood"],
  "Punk": ["Ramones","The Clash","Sex Pistols","Dead Kennedys","Black Flag","Misfits","Husker Du","Green Day","The Offspring","Blink 182","Menzingers","NOFX","NoFX","Bad Religion","Pennywise","Rancid","Operation Ivy","Rise Against","Sum 41","Simple Plan","Billy Talent","The Flatliners","Hot Water Music","Propagandhi","Anti-Flag","Social Distortion","Dropkick Murphys","Flogging Molly"],
  "Reggae": ["Bob Marley","Jimmy Cliff","Steel Pulse","UB40","Sublime","311","No Doubt","Ska-P","The Interrupters","Reel Big Fish","Less Than Jake","Streetlight Manifesto"]
};
const GENRE_EMOJI = {"Metal":"🤘","Classic Rock":"🎸","Pop":"🎤","R&B Soul":"🎵","Hip Hop":"🎤","Blues":"🟡","Country":"🌎","Funk Disco":"🕺","Indie Alt":"🌿","Punk":"🎙️","Reggae":"🌴"};

const _gc = {};
function assignGenre(artist) {
  if (_gc[artist] !== undefined) return _gc[artist];
  const lower = artist.toLowerCase();
  for (const [genre, list] of Object.entries(GENRE_MAP)) {
    if (list.some(a => lower === a.toLowerCase())) { _gc[artist]=genre; return genre; }
  }
  for (const [genre, list] of Object.entries(GENRE_MAP)) {
    if (list.some(a => lower.includes(a.toLowerCase()) || a.toLowerCase().includes(lower))) { _gc[artist]=genre; return genre; }
  }
  _gc[artist]=null; return null;
}

async function init() {
  try {
    const data = await (await fetch("songs.json")).json();
    const artistMap = {};
    data.forEach(s => {
      if (!artistMap[s.artist]) {
        artistMap[s.artist] = { name:s.artist, count:0, art:s.art||null, genre:s.genre||assignGenre(s.artist) };
      }
      artistMap[s.artist].count++;
      if (!artistMap[s.artist].art && s.art) artistMap[s.artist].art = s.art;
    });
    allArtists = Object.values(artistMap).sort((a,b)=>a.name.localeCompare(b.name,undefined,{sensitivity:'base'}));
    filteredArtists = [...allArtists];
    buildGenreBar(); buildAlphabet(); buildArtistStats(); renderGrid();
  } catch(e) { console.error(e); }
}

function setSort(type) {
  currentSort = type;
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('sort' + (type==='alpha'?'Alpha':'Count')).classList.add('active');
  applySort(filteredArtists);
  currentPage = 1; renderGrid();
}

function applySort(arr) {
  if (currentSort === 'alpha') {
    arr.sort((a,b)=>a.name.localeCompare(b.name,undefined,{sensitivity:'base'}));
  } else {
    arr.sort((a,b)=>b.count - a.count);
  }
}

function buildGenreBar() {
  const bar = document.getElementById("genreBar"); bar.innerHTML = "";
  for (const genre of Object.keys(GENRE_MAP)) {
    const btn = document.createElement("button"); btn.className = "genre-btn";
    btn.textContent = (GENRE_EMOJI[genre]||"") + " " + genre;
    btn.onclick = () => toggleGenre(genre, btn); bar.appendChild(btn);
  }
}

function toggleGenre(genre, btn) {
  if (activeGenre === genre) { activeGenre = null; document.querySelectorAll('.genre-btn').forEach(b=>b.classList.remove('active')); clearAll(); return; }
  activeGenre = genre;
  document.querySelectorAll('.genre-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active');
  document.getElementById("searchBox").value = "";
  const list = GENRE_MAP[genre].map(a=>a.toLowerCase());
  filteredArtists = allArtists.filter(a => { const l=a.name.toLowerCase(); return list.some(g=>l===g||l.includes(g)||g.includes(l)); });
  applySort(filteredArtists);
  currentPage = 1;
  document.getElementById("activeFilters").style.display = "block";
  document.getElementById("filterLabel").textContent = (GENRE_EMOJI[genre]||"") + " " + genre + " (" + filteredArtists.length + " artists)";
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById("artistGrid"); grid.innerHTML = "";
  const start = (currentPage-1)*perPage;
  const page  = filteredArtists.slice(start, start+perPage);
  document.getElementById("resultsCount").textContent =
    filteredArtists.length !== allArtists.length ? filteredArtists.length + " artists" : allArtists.length + " artists total";

  const frag = document.createDocumentFragment();
  page.forEach(a => {
    const card = document.createElement("div"); card.className = "artistCard";
    card.onclick = () => location.href = "index.html?search=" + encodeURIComponent(a.name);
    const emoji = a.genre ? (GENRE_EMOJI[a.genre]||"🎵") : "🎵";
    const artHtml = a.art
      ? `<img class="artistCardArt" src="${a.art}" alt="${esc(a.name)}" loading="lazy" onerror="this.style.display='none';this.nextSibling.style.display='flex'"><div class="artistCardArtPlaceholder" style="display:none">${emoji}</div>`
      : `<div class="artistCardArtPlaceholder">${emoji}</div>`;
    card.innerHTML = artHtml + `<div class="artistCardBody">
      <div class="artistCardName">${esc(a.name)}</div>
      <div class="artistCardCount">${a.count} ${a.count===1?"song":"songs"}</div>
      ${a.genre ? `<div class="artistCardGenre">${GENRE_EMOJI[a.genre]||""} ${a.genre}</div>` : ""}
    </div>`;
    frag.appendChild(card);
  });
  grid.appendChild(frag);
  renderPagination();
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function renderPagination() {
  const total = Math.ceil(filteredArtists.length/perPage)||1;
  ["paginationTop","paginationBottom"].forEach(id=>{
    const c=document.getElementById(id); c.innerHTML="";
    if(currentPage>1){const b=document.createElement("button");b.textContent="◀ Prev";b.className="nav-btn";b.style.padding="6px 12px";b.onclick=()=>{currentPage--;renderGrid();window.scrollTo(0,0)};c.appendChild(b)}
    const l=document.createElement("span");l.textContent=` Page ${currentPage} / ${total} `;l.style.cssText="color:#555;font-size:13px";c.appendChild(l);
    if(currentPage<total){const b=document.createElement("button");b.textContent="Next ▶";b.className="nav-btn";b.style.padding="6px 12px";b.onclick=()=>{currentPage++;renderGrid();window.scrollTo(0,0)};c.appendChild(b)}
  });
}

function buildAlphabet() {
  const div=document.getElementById("alphabet"); div.innerHTML="";
  "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(letter=>{
    const b=document.createElement("button"); b.textContent=letter; b.className="nav-btn"; b.style.cssText="padding:5px 9px;font-size:11px";
    b.onclick=()=>jumpToLetter(letter); div.appendChild(b);
  });
}

function jumpToLetter(letter) {
  document.getElementById("searchBox").value=""; activeGenre=null;
  document.querySelectorAll('.genre-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById("activeFilters").style.display="none";
  filteredArtists=[...allArtists]; applySort(filteredArtists);
  const idx=filteredArtists.findIndex(a=>a.name.replace(/^the\s/i,'').toLowerCase().startsWith(letter.toLowerCase()));
  if(idx===-1){renderGrid();return}
  currentPage=Math.floor(idx/perPage)+1; renderGrid(); window.scrollTo({top:0,behavior:'smooth'});
}

function buildArtistStats() {
  const sorted=[...allArtists].sort((a,b)=>b.count-a.count).slice(0,10);
  const list=document.getElementById("artistList"); const sc=document.getElementById("artistStats"); list.innerHTML="";
  sorted.forEach(a=>{
    const row=document.createElement("div");
    row.innerHTML=`${esc(a.name)} <span style="color:#555">(${a.count})</span>`;
    row.onclick=()=>location.href="index.html?search="+encodeURIComponent(a.name); list.appendChild(row);
  });
  document.getElementById("artistToggle").onclick=()=>{
    const hidden=list.style.display==="none"||list.style.display==="";
    sc.classList.remove("flame-effect"); void sc.offsetWidth; sc.classList.add("flame-effect");
    list.style.display=hidden?"block":"none";
    document.getElementById("artistToggle").querySelector('span:last-child').textContent=hidden?"▼":"▶";
  };
}

function handleSearch() {
  const q=document.getElementById("searchBox").value.toLowerCase(); activeGenre=null;
  document.querySelectorAll('.genre-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById("activeFilters").style.display="none";
  filteredArtists=allArtists.filter(a=>a.name.toLowerCase().includes(q));
  applySort(filteredArtists);
  currentPage=1; renderGrid();
}

function clearAll() {
  document.getElementById("searchBox").value=""; activeGenre=null;
  document.querySelectorAll('.genre-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById("activeFilters").style.display="none";
  filteredArtists=[...allArtists]; applySort(filteredArtists); currentPage=1; renderGrid();
}

function slotSpin(btn, onDone) {
  const frames = ['🎰','🃏','🎯','🎲','🎰','🎯','🃏','🎲','🎰','🎲'];
  let i = 0;
  btn.classList.add('spinning');
  const fast = setInterval(() => { btn.textContent = frames[i++%frames.length]+' Random'; }, 60);
  setTimeout(() => {
    clearInterval(fast);
    let j = 0;
    const slow = setInterval(() => { btn.textContent = frames[j++%frames.length]+' Random'; }, 120);
    setTimeout(() => { clearInterval(slow); btn.textContent='🎲 Random'; btn.classList.remove('spinning'); onDone(); }, 480);
  }, 600);
}

function randomArtist(btn) {
  if(!allArtists.length) return;
  const a=allArtists[Math.floor(Math.random()*allArtists.length)];
  if(btn){ slotSpin(btn, ()=>{ location.href="index.html?search="+encodeURIComponent(a.name); }); }
  else { location.href="index.html?search="+encodeURIComponent(a.name); }
}

document.addEventListener('keydown', e => {
  if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
    e.preventDefault(); document.getElementById('searchBox').focus();
  }
});

init();
</script>
</body>
