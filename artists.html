<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lazzarus Prime Rocksmith Artists</title>
<style>
  body{ font-family:Segoe UI,Arial; background:#0f0f0f; color:white; margin:0; }
  .titleBar{ display:flex; justify-content:space-between; align-items:center; background:#141414; padding:12px; border-bottom:2px solid #222; flex-wrap:wrap; }
  .titleLeft{ display:flex; align-items:center; gap:10px; }
  .titleBar img{ width:40px; }

  /* MATCHING HEADER TEXT */
  .titleLeft h2 { 
    margin: 0; 
    font-weight: 900; 
    text-transform: uppercase; 
    background: linear-gradient(to bottom, #fff 20%, #f1c40f 45%, #b8860b 85%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 5px rgba(241, 196, 15, 0.6));
  }

  .socialLinks{ display:flex; gap:15px; flex-wrap:wrap; }
  .socialLinks a{ color:#aaa; text-decoration:none; font-size:14px; transition:.15s; }
  .socialLinks a:hover{ color:#f1c40f; text-shadow:0 0 5px #f1c40f; }

  .topBar{ display:flex; gap:6px; padding:10px; background:#181818; position:sticky; top:0; z-index:100; flex-wrap:wrap; justify-content:center; }
  .topBar input{ flex:1; padding:8px; border-radius:6px; border:none; min-width:180px; background: white; color: black; }

  button{ background:#272727; color:white; border:none; padding:7px 12px; border-radius:6px; cursor:pointer; font-weight: 600; transition: .2s; }
  button:hover{ background:#444; }

  #alphabet{ display:flex; flex-wrap:wrap; gap:5px; padding:10px; justify-content:center; }
  
  .artistContainer {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
    padding: 20px;
  }
  .artistContainer div {
    padding: 15px;
    background: #181818;
    border: 1px solid #222;
    border-radius: 8px;
    cursor: pointer;
    transition: .15s;
    text-align: center;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .artistContainer div:hover {
    background: #222;
    color: #f1c40f;
    border-color: #f1c40f;
    transform: translateY(-2px);
  }
  .artistName { font-weight: bold; font-size: 15px; margin-bottom: 4px; }
  .artistCount { font-size: 12px; color: #888; }

  .pagination { padding: 20px; text-align: center; background: #111; }
</style>
</head>
<body>

<div class="titleBar">
  <div class="titleLeft">
    <img src="guitar.png">
    <h2>Lazzarus Prime Rocksmith Requests</h2>
  </div>
  <div class="socialLinks">
    <a href="https://www.twitch.tv/lazzarus_prime" target="_blank">🎸 Twitch</a>
    <a href="https://discord.gg/WCg5sktJNM" target="_blank">💬 Discord</a>
    <a href="https://lazzarus-prime-shop.fourthwall.com/" target="_blank">👕 Merch</a>
    <a href="https://www.instagram.com/lazzarus__prime/" target="_blank">📸 Instagram</a>
    <a href="https://streamlabs.com/lazzarus_prime/tip" target="_blank">💰 Donations</a>
  </div>
</div>

<div class="topBar">
  <button onclick="window.location.href='index.html'">🏠 Home</button>
  <button onclick="window.location.href='artists.html'">🎸 Artists</button>
  <button onclick="randomArtist()">🎲 Random</button>
  <input id="searchBox" placeholder="Search artist..." oninput="handleSearchInput()">
</div>

<div id="alphabet"></div>

<div id="paginationTop" class="pagination"></div>

<h3 style="padding:10px">All Artists (Alphabetical)</h3>
<div class="artistContainer" id="allArtists"></div>

<div id="paginationBottom" class="pagination"></div>

<script>
let allUniqueArtists = []; 
let filteredArtists = [];
let currentPage = 1;
const artistsPerPage = 60;

async function init() {
  try {
    const response = await fetch("songs.json");
    const songs = await response.json();
    const map = {};
    songs.forEach(s => { if(!map[s.artist]) map[s.artist] = 0; map[s.artist]++; });
    
    allUniqueArtists = Object.keys(map)
      .sort((a, b) => a.localeCompare(b, undefined, {sensitivity: 'base'}))
      .map(name => ({ name: name, count: map[name] }));
      
    filteredArtists = [...allUniqueArtists];
    buildAlphabet();
    renderArtists();
  } catch (e) { console.error("Error:", e); }
}

function buildAlphabet() {
  const div = document.getElementById("alphabet");
  div.innerHTML = "";
  "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").forEach(letter => {
    let b = document.createElement("button");
    b.innerText = letter;
    b.onclick = () => jumpToLetter(letter);
    div.appendChild(b);
  });
}

function jumpToLetter(letter) {
  document.getElementById("searchBox").value = "";
  filteredArtists = [...allUniqueArtists];
  const idx = filteredArtists.findIndex(a => a.name.toLowerCase().startsWith(letter.toLowerCase()));
  if (idx === -1) { renderArtists(); return; }
  currentPage = Math.floor(idx / artistsPerPage) + 1;
  renderArtists();
  window.scrollTo(0, 0);
}

function renderArtists() {
  const container = document.getElementById("allArtists");
  container.innerHTML = "";
  const start = (currentPage - 1) * artistsPerPage;
  const pageArtists = filteredArtists.slice(start, start + artistsPerPage);
  pageArtists.forEach(artist => {
    const div = document.createElement("div");
    div.onclick = () => selectArtist(artist.name);
    div.innerHTML = `
      <span class="artistName">${artist.name}</span>
      <span class="artistCount">${artist.count} ${artist.count === 1 ? 'song' : 'songs'}</span>
    `;
    container.appendChild(div);
  });
  renderPagination();
}

function renderPagination() {
  const totalPages = Math.ceil(filteredArtists.length / artistsPerPage) || 1;
  const top = document.getElementById("paginationTop");
  const bottom = document.getElementById("paginationBottom");
  [top, bottom].forEach(container => {
    container.innerHTML = "";
    if (currentPage > 1) {
      let prev = document.createElement("button");
      prev.innerText = "◀ Prev";
      prev.onclick = () => { currentPage--; renderArtists(); window.scrollTo(0,0); };
      container.appendChild(prev);
    }
    let label = document.createElement("span");
    label.innerText = ` Page ${currentPage} / ${totalPages} `;
    container.appendChild(label);
    if (currentPage < totalPages) {
      let next = document.createElement("button");
      next.innerText = "Next ▶";
      next.onclick = () => { currentPage++; renderArtists(); window.scrollTo(0,0); };
      container.appendChild(next);
    }
  });
}

function handleSearchInput() {
  const q = document.getElementById("searchBox").value.toLowerCase();
  filteredArtists = allUniqueArtists.filter(a => a.name.toLowerCase().includes(q));
  currentPage = 1;
  renderArtists();
}

function selectArtist(artistName) {
  window.location.href = `index.html?search=${encodeURIComponent(artistName)}`;
}

function randomArtist() {
  if(!allUniqueArtists.length) return;
  const random = allUniqueArtists[Math.floor(Math.random()*allUniqueArtists.length)];
  selectArtist(random.name);
}

init();
</script>
</body>
</html>
