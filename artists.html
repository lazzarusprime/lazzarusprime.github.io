<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lazzarus Prime Artists</title>
<style>
body{font-family:Segoe UI,Arial;background:#0f0f0f;color:white;margin:0;}
.titleBar{display:flex;justify-content:space-between;align-items:center;background:#141414;padding:12px;border-bottom:2px solid #222;flex-wrap:wrap;}
.titleLeft{display:flex;align-items:center;gap:10px;}
.titleBar img{width:40px;}
.socialLinks{display:flex;gap:15px;flex-wrap:wrap;}
.socialLinks a{color:#aaa;text-decoration:none;font-size:14px;transition:.15s;}
.socialLinks a:hover{color:#f1c40f;text-shadow:0 0 5px #f1c40f,0 0 10px #f1c40f,0 0 15px #f1c40f;}
.topBar{display:flex;gap:6px;padding:10px;background:#181818;position:sticky;top:0;z-index:100;flex-wrap:wrap;justify-content:center;}
.topBar input{flex:1;padding:8px;border-radius:6px;border:none;min-width:180px;}
#artistStats{padding:10px;background:#151515;border-top:1px solid #222;border-bottom:1px solid #222;text-align:left;}
#artistStats h3{cursor:pointer;margin:0;}
#artistList{display:none;margin-top:5px;}
#artistList div{padding:4px 0;cursor:pointer;transition:.15s;transform-origin:top left;}
#artistList div:hover{color:#f1c40f;text-shadow:0 0 5px #f1c40f,0 0 10px #f1c40f,0 0 15px #f39c12;transform:scale(1.05) translateX(0);}
.artistContainer{display:flex;flex-direction:column;padding:10px;}
.artistContainer div{padding:6px 0;border-bottom:1px solid #222;cursor:pointer;transition:.15s;}
.artistContainer div:hover{color:#f1c40f;text-shadow:0 0 5px #f1c40f,0 0 10px #f1c40f;}
.pagination{padding:10px;text-align:center;}
</style>
</head>
<body>

<div class="titleBar">
  <div class="titleLeft">
    <img src="guitar.png">
    <h2>Lazzarus Prime Rocksmith Artists</h2>
  </div>
  <div class="socialLinks">
    <a href="index.html">🏠 Home</a>
    <a href="artists.html">🎸 Artists</a>
    <a href="https://www.twitch.tv/lazzarus_prime" target="_blank">Twitch</a>
    <a href="https://discord.gg/WCg5sktJNM" target="_blank">Discord</a>
    <a href="https://lazzarus-prime-shop.fourthwall.com/" target="_blank">Merch</a>
    <a href="https://www.instagram.com/lazzarus__prime/" target="_blank">Instagram</a>
    <a href="https://streamlabs.com/lazzarus_prime/tip" target="_blank">Donations</a>
  </div>
</div>

<div class="topBar">
  <input id="searchBox" placeholder="Search artist..." oninput="handleSearchInput()">
</div>

<div id="artistStats">
  <h3 id="artistToggle">🎸 Top Artists In Library ▶</h3>
  <div id="artistList"></div>
</div>

<h3 style="padding:10px">All Artists</h3>
<div class="artistContainer" id="allArtists"></div>

<div id="paginationTop" class="pagination"></div>
<div id="paginationBottom" class="pagination"></div>

<script>
let songs=[], filteredArtists=[], currentPage=1;

async function init(){
  const response = await fetch("songs.json")
  songs = await response.json()
  buildArtistStats()
  buildAllArtists()
}

function buildArtistStats(){
  const map={}
  songs.forEach(s=>{if(!map[s.artist]) map[s.artist]=0; map[s.artist]++})
  const sorted=Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,10)
  const list=document.getElementById("artistList")
  list.innerHTML=""
  sorted.forEach(([artist,count])=>{
    let row=document.createElement("div")
    row.innerText=artist+" ("+count+")"
    row.onclick=()=>filterArtist(artist)
    row.onmouseenter=()=>highlightArtist(artist)
    row.onmouseleave=()=>clearHighlight()
    list.appendChild(row)
  })
  document.getElementById("artistToggle").onclick=()=>{
    if(list.style.display==="none"||list.style.display===""){
      list.style.display="block"
      document.getElementById("artistToggle").innerText="🎸 Top Artists In Library ▼"
    }else{
      list.style.display="none"
      document.getElementById("artistToggle").innerText="🎸 Top Artists In Library ▶"
    }
  }
}

function buildAllArtists(){
  const map={}
  songs.forEach(s=>{if(!map[s.artist]) map[s.artist]=0})
  filteredArtists=Object.keys(map).sort()
  renderArtists()
}

function renderArtists(){
  const container=document.getElementById("allArtists")
  container.innerHTML=""
  filteredArtists.forEach(artist=>{
    const div=document.createElement("div")
    div.innerText=artist
    div.onclick=()=>filterArtist(artist)
    div.onmouseenter=()=>highlightArtist(artist)
    div.onmouseleave=()=>clearHighlight()
    container.appendChild(div)
  })
}

function handleSearchInput(){
  const q=document.getElementById("searchBox").value.toLowerCase()
  filteredArtists=Object.keys(songs.reduce((acc,s)=>{acc[s.artist]=1;return acc},{}) )
    .filter(a=>a.toLowerCase().includes(q))
    .sort()
  renderArtists()
}

function filterArtist(artist){
  alert(`Filter songs by artist: ${artist} (redirect to index or search)`)
}

function highlightArtist(artist){
  document.querySelectorAll(".songArtist, .artistContainer div, #artistList div").forEach(el=>{
    if(el.innerText.includes(artist)) el.style.background="#1a1a1a"
  })
}
function clearHighlight(){
  document.querySelectorAll(".songArtist, .artistContainer div, #artistList div").forEach(el=>{
    el.style.background="none"
  })
}

init()
</script>
</body>
</html>
